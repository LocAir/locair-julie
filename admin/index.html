// ── Zones d'intervention + disponibilité (multi-ville) ────────────────────
// Distinct de transporteurs.city_id (ville de rattachement, équipe/paie) :
// transporteur_villes couvre plusieurs zones possibles pour la répartition
// automatique des missions ; transporteur_disponibilites précise jour ×
// moment. Aucune ligne de dispo = disponible tous les jours, tous moments
// (comportement historique inchangé pour un transporteur jamais restreint).
const JOURS_LABELS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
function villesCheckboxesHtml(prefix, selectedIds){
  const sel = new Set((selectedIds||[]).map(String));
  if(!CITIES_CACHE.length) return '<p class="sub" style="margin:0">Aucune ville configurée.</p>';
  return `<div class="ville-checks">${CITIES_CACHE.map(c => `
    <label><input type="checkbox" id="${prefix}-ville-${c.id}" ${sel.has(String(c.id))?'checked':''}/> ${escHtml(c.name)}</label>
  `).join('')}</div>`;
}
function collectVillesForm(prefix){
  return CITIES_CACHE.map(c => c.id).filter(id => document.getElementById(`${prefix}-ville-${id}`)?.checked);
}
function dispoFormHtml(prefix, dispoRows){
  const byJour = {};
  (dispoRows||[]).forEach(d => { byJour[d.jour] = d.moment; });
  const rows = [0,1,2,3,4,5,6].map(j => {
    const val = byJour[j] || '';
    return `<div class="dispo-row">
      <span class="dispo-day">${JOURS_LABELS[j]}</span>
      <select id="${prefix}-jour-${j}">
        <option value="" ${val===''?'selected':''}>Indisponible</option>
        <option value="matin" ${val==='matin'?'selected':''}>Matin</option>
        <option value="apres_midi" ${val==='apres_midi'?'selected':''}>Après-midi</option>
        <option value="journee" ${val==='journee'?'selected':''}>Toute la journée</option>
      </select>
    </div>`;
  }).join('');
  return `
    <div class="dispo-grid" id="${prefix}-dispo-grid">${rows}</div>
    <div class="periods" style="margin-top:8px">
      <button type="button" onclick="applyDispoPreset('${prefix}','semaine')">Semaine</button>
      <button type="button" onclick="applyDispoPreset('${prefix}','weekend')">Week-end</button>
      <button type="button" onclick="applyDispoPreset('${prefix}','tous')">Tous les jours</button>
    </div>`;
}
function applyDispoPreset(prefix, preset){
  for(let j=0;j<=6;j++){
    const sel = document.getElementById(`${prefix}-jour-${j}`);
    if(!sel) continue;
    if(preset==='semaine') sel.value = (j>=1 && j<=5) ? 'journee' : '';
    else if(preset==='weekend') sel.value = (j===0 || j===6) ? 'journee' : '';
    else sel.value = ''; // 'tous' — vide toutes les lignes = disponible tous les jours
  }
}
function collectDispoForm(prefix){
  const rows = [];
  for(let j=0;j<=6;j++){
    const sel = document.getElementById(`${prefix}-jour-${j}`);
    if(sel && sel.value) rows.push({jour:j, moment:sel.value});
  }
  return rows;
}
function editZonesDispo(id){
  const t = TRANSPORTEURS_CACHE.find(x => x.id === id);
  if(!t) return;
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:420px;max-height:85vh;overflow-y:auto">
      <h2 style="margin-bottom:14px">🌍 Zones & disponibilité — ${escHtml(t.nom)}</h2>
      <label>Villes d'intervention</label>
      ${villesCheckboxesHtml('zd', t.villes)}
      <label style="margin-top:16px">Disponibilité</label>
      ${dispoFormHtml('zd', t.disponibilites)}
      <div class="modal-actions" style="margin-top:18px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Enregistrer</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = async () => {
    const villes = collectVillesForm('zd');
    const disponibilites = collectDispoForm('zd');
    okBtn.disabled = true;
    try{
      const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id:t.id, villes, disponibilites})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      closeModal();
      loadTransporteursEquipe();
      showToast('Zones et disponibilité mises à jour', 'success');
    }catch(e){
      okBtn.disabled = false;
      showToast(`Non enregistré : ${e.message}`, 'error');
    }
  };
}

async function loadTransporteursEquipe(){
  const zone = document.getElementById('transp-view-content');
  if(!zone) return;
  zone.innerHTML = loading();
  try{
    const [tr, lr] = await Promise.all([

    ]);
    const d = await tr.json();
    if(!tr.ok) throw new Error(d.error||'Erreur');
    TRANSPORTEURS_CACHE = d.transporteurs || [];
    const ld = await lr.json().catch(()=>({livraisons:[]}));

    const testCardHtml = `
      <div class="card" style="border-color:var(--blue)">

        ${testTransp ? `
          <div class="row-meta" style="margin-bottom:14px">Code : <strong style="font-size:16px">${escHtml(testTransp.pin)}</strong></div>
          <button class="btn btn-blue btn-block" onclick="window.open('/transporteur','_blank','noopener')">Ouvrir l'espace transporteur ↗</button>

        ` : `<button class="btn btn-blue btn-block" onclick="createTestTransporteur()">Créer mon compte de test</button>`}

    const list = (d.transporteurs||[]).filter(t => t.nom !== TEST_TRANSPORTEUR_NOM).map(t => `
      <div class="row-item">
        <div class="row-top">
          <span class="row-title">${escHtml(t.nom)}</span>
          <span class="chip ${t.actif?'actif':'annulee'}">${t.actif?'actif':'inactif'}</span>
        </div>
        <div class="row-meta">${escHtml(t.telephone||'—')}${t.email?' · '+escHtml(t.email):''}</div>
        <div class="row-meta">Code : <strong>${escHtml(t.pin||'—')}</strong> · ${euros(t.taux_livraison_cents)}/livraison · ${euros(t.taux_recuperation_cents)}/récupération</div>
        ${CITIES_CACHE.length>1?`<div class="row-meta">🌍 ${(t.villes&&t.villes.length) ? t.villes.map(id => escHtml((CITIES_CACHE.find(c=>c.id===id)||{}).name||'?')).join(', ') : 'Aucune zone'}</div>`:''}
        <div class="day-progress" style="margin:12px 0 0;padding:0">${chargeJourHtml(t.id, ld.livraisons)}</div>
        <div class="row-actions">
          <button class="btn btn-grey" onclick="toggleTransporteur(${t.id}, ${!t.actif}, this)">${t.actif?'Désactiver':'Réactiver'}</button>
          <button class="btn btn-grey" onclick="editRates(${t.id}, ${t.taux_livraison_cents}, ${t.taux_recuperation_cents})">Modifier taux</button>
          <button class="btn btn-grey" onclick="resetPin(${t.id})">Changer le code</button>
          <button class="btn btn-grey" onclick="editEmail(${t.id}, '${(t.email||'').replace(/'/g,"\\'")}')">${t.email?'Modifier':'Ajouter'} l'email</button>
          <button class="btn btn-grey" onclick="editZonesDispo(${t.id})">🌍 Zones & disponibilité</button>
        </div>
      </div>`).join('') || '<p class="empty">Aucun transporteur.</p>';

    zone.innerHTML = testCardHtml + list + `
      <div class="card">
        <h2>Ajouter un transporteur</h2>
        <label for="t-nom">Nom</label>
        <input type="text" id="t-nom" placeholder="Osama"/>
        <label for="t-tel">Téléphone</label>
        <input type="tel" id="t-tel" placeholder="06…"/>

        </div>
        ${CITIES_CACHE.length>1?`
        <label style="margin-top:14px">Villes d'intervention</label>

        ${dispoFormHtml('t-new', [])}

async function addTransporteur(){
  const nom = document.getElementById('t-nom').value.trim();
  const telephone = document.getElementById('t-tel').value.trim();
  const email = document.getElementById('t-email').value.trim();
  const taux_livraison_cents = Math.round((parseFloat(document.getElementById('t-liv').value)||0)*100);
  const taux_recuperation_cents = Math.round((parseFloat(document.getElementById('t-rec').value)||0)*100);
  const errEl = document.getElementById('transp-err');
  errEl.style.display='none';
  if(!nom){ errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
  const extra = CITIES_CACHE.length>1
    ? { villes: collectVillesForm('t-new'), disponibilites: collectDispoForm('t-new') }
    : {};
  try{
    const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'create', nom, telephone, email, taux_livraison_cents, taux_recuperation_cents, ...extra})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadTransporteursEquipe();
    showInfo('Transporteur ajouté', `Code personnel à lui communiquer :\n\n${d.pin}\n\nCe code lui permet de se connecter sur /transporteur.`);
  }catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}
async function toggleTransporteur(id, actif, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, actif})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadTransporteursEquipe();
  }catch(e){
    if(btnEl) btnEl.disabled = false;
    showToast(e.message, 'error');
  }
}

        action:'update', id,

// ── Suivi en direct (carte gratuite OpenStreetMap) ───────────────────────────
// Trajet affiché en ligne droite (pas d'itinéraire routier) et ETA estimé à
// vitesse moyenne — pas de clé API, pas de coût. Voir supabase/README.md pour
// upgrade éventuel vers un vrai itinéraire (Google/Mapbox) plus tard.
let LIVE_MAP = null, LIVE_MARKER = null, LIVE_DEST_MARKER = null, LIVE_LINE = null, LIVE_POLL = null, LIVE_DEST_COORDS = null;

function haversineKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocodeAddress(address){
  try{
    const q = encodeURIComponent(address);
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=fr&q=${q}`);
    const d = await r.json();
    if(d && d[0]) return {lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}

async function openLiveMap(transporteurId, transporteurNom, adresse){
  const overlay = document.createElement('div');
  overlay.className = 'map-overlay';
  overlay.id = 'map-overlay';
  const avgLiv = avgDureeSurPlaceForTransporteur(transporteurId, 'livraison');
  const avgRec = avgDureeSurPlaceForTransporteur(transporteurId, 'recuperation');
  const statsLines = [
    avgLiv ? `📦 Livraison : ${avgLiv.avg} min en moyenne sur place (${avgLiv.n} mission${avgLiv.n>1?'s':''})` : '',
    avgRec ? `🔄 Récupération : ${avgRec.avg} min en moyenne sur place (${avgRec.n} mission${avgRec.n>1?'s':''})` : '',
  ].filter(Boolean);
  overlay.innerHTML = `
    <div class="map-modal">
      <div class="map-modal-head"><h2>🔴 ${escHtml(transporteurNom)} en direct</h2><button onclick="closeLiveMap()">✕</button></div>
      ${statsLines.length?`<div class="map-stats">${statsLines.join('<br/>')}</div>`:''}
      <div id="live-map"></div>
      <div class="map-eta" id="map-eta">Chargement…</div>
    </div>`;
  document.body.appendChild(overlay);

  LIVE_DEST_COORDS = await geocodeAddress(adresse + ', France');

  setTimeout(() => {
    LIVE_MAP = L.map('live-map', {zoomControl:true, attributionControl:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19, subdomains:'abcd',
    }).addTo(LIVE_MAP);

    if(LIVE_DEST_COORDS){
      LIVE_DEST_MARKER = L.marker([LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng], {
        icon: L.divIcon({className:'', html:'<div class="map-pin-teardrop"><span>🏠</span></div>', iconSize:[32,32], iconAnchor:[16,32]}),
      }).addTo(LIVE_MAP);
    }

    refreshLivePosition(transporteurId);
    LIVE_POLL = setInterval(() => refreshLivePosition(transporteurId), 8000);
  }, 50);
}

async function refreshLivePosition(transporteurId){
  const etaEl = document.getElementById('map-eta');
  if(!etaEl) return; // la modale a été fermée entre-temps
  try{
    const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'position', transporteur_id: transporteurId})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Position indisponible pour le moment');

    const point = [d.lat, d.lng];
    if(!LIVE_MARKER){
      LIVE_MARKER = L.marker(point, {
        icon: L.divIcon({className:'', html:'<div class="map-pin-live">🛵</div>', iconSize:[34,34], iconAnchor:[17,17]}),
      }).addTo(LIVE_MAP);
    } else {
      LIVE_MARKER.setLatLng(point);
    }

    const bounds = LIVE_DEST_COORDS ? L.latLngBounds([point, [LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng]]) : L.latLngBounds([point, point]);
    LIVE_MAP.fitBounds(bounds, {padding: [40,40], maxZoom: 16});

    if(LIVE_DEST_COORDS){
      if(LIVE_LINE) LIVE_MAP.removeLayer(LIVE_LINE);
      LIVE_LINE = L.polyline([point, [LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng]], {color:'#1b3a5f', weight:3, dashArray:'6,8'}).addTo(LIVE_MAP);
    }

    const ageSec = Math.round((Date.now() - new Date(d.position_at).getTime()) / 1000);
    const stale = ageSec > 90;
    let etaTxt = '';
    if(LIVE_DEST_COORDS){
      const km = haversineKm(point[0], point[1], LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng);
      const minutes = Math.max(1, Math.round(km / 22 * 60)); // ~22 km/h en ville — estimation, pas de trafic réel
      etaTxt = `<strong>~${minutes} min</strong> (${km.toFixed(1)} km, estimation)`;
    }
    etaEl.innerHTML = `<span class="${stale?'map-stale':''}">${stale ? '⚠️ Signal perdu — dernière position il y a '+Math.round(ageSec/60)+' min' : 'Mis à jour il y a '+ageSec+'s'}</span><span>${etaTxt}</span>`;
  }catch(e){
    etaEl.innerHTML = `<span class="map-stale">⚠️ ${escHtml(e.message)}</span>`;
  }
}

function closeLiveMap(){
  if(LIVE_POLL) clearInterval(LIVE_POLL);
  LIVE_POLL = null;
  if(LIVE_MAP){ LIVE_MAP.remove(); LIVE_MAP = null; }
  LIVE_MARKER = null; LIVE_DEST_MARKER = null; LIVE_LINE = null; LIVE_DEST_COORDS = null;
  const o = document.getElementById('map-overlay');
  if(o) o.remove();
}

// ── Démarrage ─────────────────────────────────────────────────────────────────
(function init(){
  initAdminWebauthnLoginButton();
  if(TOKEN){
    document.getElementById('a-login').classList.add('hidden');
    document.getElementById('a-app').classList.remove('hidden');
    document.getElementById('a-logout-btn').classList.remove('hidden');
    switchAdminTab('accueil');
    // Sans ça, les badges (missions non assignées, virements) et le bandeau
    // permanent ne se remettaient à jour qu'après une saisie de mot de passe —
    // donc jamais après un simple rechargement de page avec une session déjà
    // active (l'écran ne bouge plus jusqu'à une déconnexion/reconnexion).
    loadAlerts();
    loadCitySwitcher();
    setupAdminPush();
    clearAppBadge();
    if(!window._alertsInterval) window._alertsInterval = setInterval(loadAlerts, 45000);
    if(!window._autoRefreshInterval) window._autoRefreshInterval = setInterval(autoRefreshTick, 18000);
    maybeOfferAdminFaceId();
  }
})();
</script>
