<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Espace admin — Loc'Air</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="manifest" href="/admin/manifest.json"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Loc'Air Admin"/>
<meta name="theme-color" content="#1b3a5f"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  /* Palette identique à index.html (site vitrine) — voir --root du site pour la référence */
  --blue:#1b3a5f; --blue-d:#142d4a; --blue-lt:#dce8f5;
  --black:#141e30; --black2:#1e2d45; --bg:#eef1f5; --white:#ffffff;
  --grey:#5a6577; --grey2:#6b7785; --grey-soft:#8b93a3; --rule:#dde3ea; --gold:#c5a96c; --gold-lt:#f3ead9;
  --green:#2d6a4f; --green-bg:#e6f0ea;
  --red:#9b2c1a; --red-bg:#f8e9e6;
  --amber:#9c6a17; --amber-bg:#f6eed9;
  --navy:#0d1829;
  --disp:'Cormorant Garamond',Georgia,serif;
  --body:'Inter',system-ui,sans-serif;
  --r-sm:8px; --r:12px; --r-lg:20px;
  --sh-xs:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
  --sh-sm:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --sh-md:0 8px 40px rgba(0,0,0,.09),0 2px 10px rgba(0,0,0,.05);
  --sh-lg:0 24px 80px rgba(0,0,0,.11),0 6px 24px rgba(0,0,0,.06);
  --sh-blue:0 6px 24px rgba(27,58,95,.32);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--black);font-family:var(--body);font-size:14.5px;-webkit-font-smoothing:antialiased;min-height:100vh;letter-spacing:-.005em}
::selection{background:var(--gold-lt);color:var(--black)}
.wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px}
.logo{font-family:var(--disp);font-size:23px;font-weight:600;color:var(--blue);margin-bottom:26px;letter-spacing:.01em;display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.logout-link{font-family:var(--body);font-size:12.5px;font-weight:700;color:var(--grey);background:none;border:none;cursor:pointer;letter-spacing:normal}
.logout-link:hover{color:var(--red)}
.forgot-link{display:block;width:100%;text-align:center;font-family:var(--body);font-size:13px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;padding:6px}
.logo em{font-style:normal;color:var(--gold)}
.eyebrow{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--grey);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--blue);flex-shrink:0}

.login-screen{min-height:calc(100vh - 80px);display:flex;align-items:center;justify-content:center}
.login-card{max-width:380px;width:100%;box-shadow:var(--sh-lg)}

.card{background:var(--white);border:1px solid var(--rule);border-radius:var(--r-lg);padding:26px 24px;box-shadow:var(--sh-sm);margin-bottom:16px}
h1{font-family:var(--disp);font-size:26px;font-weight:600;margin-bottom:6px;letter-spacing:.005em}
h2{font-family:var(--disp);font-size:19px;font-weight:600;margin-bottom:14px;color:var(--black)}
.sub{font-size:13.5px;color:var(--grey);margin-bottom:20px;line-height:1.55}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grey);margin-bottom:6px}
input[type=text],input[type=password],input[type=number],input[type=tel],select,textarea{
  width:100%;padding:12px 14px;border:1.5px solid #c2bbaa;border-radius:var(--r-sm);font-size:14.5px;
  font-family:var(--body);background:var(--white);color:var(--black);outline:none;margin-bottom:14px;
  transition:border-color .15s ease, box-shadow .15s ease;
  text-overflow:ellipsis;
}
textarea{resize:vertical;min-height:70px;line-height:1.5}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}
.btn{padding:11px 20px;border:none;border-radius:100px;font-family:var(--body);font-size:13.5px;font-weight:700;letter-spacing:.005em;cursor:pointer}
.btn-blue{background:var(--blue);color:#fff;box-shadow:var(--sh-xs)}
.btn-blue:hover:not(:disabled){background:var(--blue-d)}
.btn-green{background:var(--green);color:#fff;box-shadow:var(--sh-xs)}
.btn-red{background:var(--white);color:var(--red);border:1.5px solid #e3c3bc}
.btn-red:hover:not(:disabled){background:var(--red-bg)}
.btn-grey{background:var(--white);color:var(--grey);border:1.5px solid var(--rule)}
.btn-grey:hover:not(:disabled){border-color:var(--grey-soft);color:var(--black)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-block{width:100%}
.err{background:var(--red-bg);color:var(--red);border-radius:var(--r-sm);padding:11px 14px;font-size:13px;margin-top:10px;display:none;line-height:1.5}
.hidden{display:none !important}

.tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:20px;padding-bottom:2px;mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%);-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%)}
.tabs button{flex-shrink:0;padding:9px 15px;border-radius:100px;border:1.5px solid transparent;background:transparent;font-weight:600;font-size:13px;color:var(--grey);cursor:pointer;transition:background-color .15s ease, color .15s ease}
.tabs button:hover{background:rgba(20,30,48,.04);color:var(--black)}
.tabs button.on{background:var(--blue);color:#fff;box-shadow:var(--sh-xs)}
.tabs button.on:hover{background:var(--blue-d)}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;margin-left:6px;border-radius:100px;background:var(--red);color:#fff;font-size:10.5px;font-weight:800;line-height:1;vertical-align:2px}
/* Caché par défaut (mobile) : dans la bande horizontale scrollable, un
   groupe accordéon prend de la place sans rien apporter — visible
   seulement une fois la barre verticale (tiroir mobile ou desktop). Le
   chevron/ouverture est géré nativement par <details>/<summary> (même
   mécanique que .tools-group dans transporteur/index.html), aucun JS de
   toggle n'est nécessaire. */
.tabs-group{display:none}
.tabs-group summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--grey-soft);padding:9px 15px;white-space:nowrap}
.tabs-group summary::-webkit-details-marker{display:none}
.tabs-group summary::after{content:"›";font-size:15px;font-weight:400;text-transform:none;letter-spacing:0;line-height:1;color:var(--grey-soft);transition:transform .15s ease}
.tabs-group[open] summary::after{transform:rotate(90deg)}
.tabs-group-body{display:flex;flex-direction:column;gap:5px}
.tabs-group-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}

.resa-details{margin-top:4px}
.resa-details summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--grey);padding:3px 0;user-select:none}
.resa-details summary::-webkit-details-marker{display:none}
.resa-details summary::after{content:"▾";font-size:9px;transition:transform .15s ease}
.resa-details[open] summary::after{transform:rotate(180deg)}
.resa-details-body{padding:4px 0 2px}

/* Menu ☰ mobile : la barre horizontale scrollable cachait des onglets sans
   affordance claire (juste un léger fondu de 28px) — sur mobile elle devient
   un tiroir latéral qu'on ouvre explicitement, avec tous les onglets et
   labels de groupe visibles d'un coup, plutôt que de compter sur un scroll
   qu'une bonne partie des utilisateurs ne découvre jamais. */
.mobile-menu-btn{display:none}
.mobile-menu-backdrop{display:none}
@media (max-width:859px){
  .mobile-menu-btn{
    display:flex;align-items:center;gap:9px;width:100%;
    padding:11px 16px;margin-bottom:16px;
    border-radius:var(--r);border:1.5px solid var(--rule);background:var(--white);
    font-family:var(--body);font-weight:700;font-size:14px;color:var(--black);
    cursor:pointer;box-shadow:var(--sh-xs);position:relative;
  }
  .mobile-menu-dot{width:8px;height:8px;border-radius:50%;background:var(--red);margin-left:2px}
  .mobile-menu-backdrop{
    display:none;position:fixed;inset:0;background:rgba(20,30,48,.45);z-index:199;
  }
  .mobile-menu-backdrop.show{display:block}
  .tabs{
    position:fixed;top:0;left:0;bottom:0;z-index:200;width:min(80vw,300px);
    background:var(--bg);flex-direction:column;overflow-x:visible;overflow-y:auto;
    margin-bottom:0;padding:20px 14px;gap:6px;
    mask-image:none;-webkit-mask-image:none;
    transform:translateX(-105%);transition:transform .25s ease;
    box-shadow:2px 0 28px rgba(0,0,0,.18);
  }
  .tabs.mobile-open{transform:translateX(0)}
  .tabs button{width:100%;text-align:left;padding:12px 16px;border-radius:12px}
  .tabs-group{display:block}
}

/* Sélecteur de ville/zone — visible seulement dès 2 villes actives (voir
   loadCitySwitcher), sinon inutile pour une exploitation mono-ville. */
.city-switcher{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:var(--white);border:1px solid var(--rule);border-radius:var(--r);box-shadow:var(--sh-xs)}
.city-switcher label{margin:0;flex-shrink:0}
.city-switcher select{width:auto;flex:1;padding:8px 12px;margin:0}
.a-search{position:relative;margin-bottom:16px}
.a-search input{width:100%;padding:12px 16px;border:1.5px solid var(--rule);border-radius:var(--r);font-size:14.5px;background:var(--white)}
.a-search-results{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--white);border:1.5px solid var(--rule);border-radius:var(--r);box-shadow:var(--sh-lg);max-height:60vh;overflow-y:auto;z-index:60}
.a-search-group-title{font-size:11px;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.03em;padding:10px 14px 4px}
.a-search-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;cursor:pointer;border-top:1px solid var(--rule)}
.a-search-row:hover{background:var(--bg)}
.a-search-row-main{font-weight:700;font-size:13.5px}
.a-search-row-sub{font-size:12px;color:var(--grey)}
.a-search-empty{padding:16px 14px;color:var(--grey);font-size:13px}
.a-search-recent{padding:6px 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.a-search-recent button{font-size:12px;padding:4px 10px;border-radius:100px;border:1px solid var(--rule);background:var(--bg);cursor:pointer;color:var(--grey)}

.periods{display:flex;gap:4px;margin-bottom:18px;background:var(--bg);padding:4px;border-radius:100px}
.periods button{flex:1;padding:8px;border-radius:100px;border:none;background:transparent;font-weight:600;font-size:12.5px;color:var(--grey);cursor:pointer;transition:background-color .15s ease,color .15s ease}
.periods button.on{background:var(--white);color:var(--black);box-shadow:var(--sh-xs)}

/* Rangée de filtres nombreuse (ex. 8 filtres Livraisons) : scroll horizontal
   plutôt que le flex:1 de .periods qui écrase le texte. Ne réutilise pas
   .tabs (son bloc mobile en fait un tiroir fixe hors-écran par défaut). */
.filter-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;mask-image:linear-gradient(to right,#000 calc(100% - 20px),transparent 100%);-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 20px),transparent 100%)}
.filter-scroll button{flex-shrink:0;padding:8px 14px;border-radius:100px;border:1.5px solid var(--rule);background:var(--white);font-weight:600;font-size:12.5px;color:var(--grey);cursor:pointer;white-space:nowrap;transition:background-color .15s ease,color .15s ease,border-color .15s ease}
.filter-scroll button.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-tile{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh-xs)}
.stat-tile .n{font-family:var(--disp);font-size:32px;font-weight:400;color:var(--black);font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1.1}
.stat-tile .l{font-size:11px;color:var(--grey);font-weight:600;margin-top:8px;letter-spacing:.03em;text-transform:uppercase}
.stat-tile.warn .n{color:var(--red)}

.morning-banner{background:var(--blue);color:#fff;border-radius:var(--r-lg);padding:18px 44px 18px 20px;margin-bottom:16px;box-shadow:var(--sh-blue);position:relative}
.morning-banner .mb-title{font-family:var(--disp);font-size:17px;font-weight:600;margin-bottom:6px}
.morning-banner .mb-text{font-size:13px;line-height:1.6;opacity:.92}
.morning-banner .mb-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#fff;opacity:.7;cursor:pointer;font-size:15px;padding:6px}
.morning-banner .mb-close:hover{opacity:1}

.week-header{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
.week-header:first-child{margin-top:0}
.week-header .wk-label{font-family:var(--disp);font-size:16px;font-weight:600}
.week-header .wk-ca{font-size:12px;color:var(--grey);font-weight:600}
.cal-day-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--rule);font-size:13.5px}
.cal-day-item:last-of-type{border-bottom:none}
.cal-day-item .cal-day-name{font-weight:600;color:var(--black)}
.cal-day-item .cal-day-sub{color:var(--grey);font-size:12.5px}

.section-title{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grey-soft);margin:24px 2px 10px}
.row-item{padding:16px 18px;border:1px solid var(--rule);border-radius:var(--r);margin-bottom:10px;background:var(--white);box-shadow:var(--sh-xs)}
.row-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px}
.row-title{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:0}
.row-meta{font-size:12.5px;color:var(--grey);line-height:1.6}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px 4px 8px;border-radius:100px;background:var(--bg);color:var(--grey)}
.chip::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.chip.confirmee,.chip.fait,.chip.verse,.chip.actif,.chip.terminee{background:var(--green-bg);color:var(--green)}
.chip.en_attente,.chip.a_faire,.chip.acceptee,.chip.demande,.chip.en_route{background:var(--amber-bg);color:var(--amber)}
.chip.annulee,.chip.probleme,.chip.refusee{background:var(--red-bg);color:var(--red)}
.chip.en_location{background:var(--blue-lt);color:var(--blue)}
.chip.inactif{background:var(--bg);color:var(--grey)}
.chip.type-livraison{background:var(--blue-lt);color:var(--blue)}
.chip.type-recuperation{background:var(--amber-bg);color:var(--amber)}
.chip.type-changement{background:var(--gold-lt);color:#8a6d2f}

/* Carte réservation : hiérarchie client → dates → prix, au lieu d'une seule
   ligne de métadonnées à parser. Le prix reprend le traitement typographique
   des tuiles chiffrées de l'Accueil (police --disp) pour rester cohérent. */
.resa-addr{font-size:12.5px;color:var(--grey);margin-bottom:8px;display:flex;align-items:baseline;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.resa-dates{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:4px 10px;font-size:13px;padding-bottom:8px;margin-bottom:8px;border-bottom:1px dashed var(--rule)}
.resa-date-range{font-weight:700;color:var(--black);white-space:nowrap}
.resa-rel{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--grey);white-space:nowrap;flex-shrink:0}
.resa-rel.urgent{color:var(--red)}
.resa-bottom{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:2px}
.resa-price{font-family:var(--disp);font-size:23px;font-weight:600;color:var(--black);letter-spacing:-.01em;white-space:nowrap;flex-shrink:0}
.resa-sub{font-size:11px;color:var(--grey-soft);text-align:right;min-width:0;line-height:1.5}

.row-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.row-actions .btn{padding:8px 13px;font-size:12.5px}
/* Menu "⋯" pour les actions secondaires/rares d'une carte — garde les 1-3
   actions les plus utilisées visibles en permanence, range le reste
   (édition ponctuelle, actions destructives) derrière un clic plutôt que de
   les afficher toutes au même poids visuel. */
.more-actions{position:relative;display:inline-block}
.more-actions summary{list-style:none;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:100px;border:1.5px solid var(--rule);background:var(--white);font-size:18px;font-weight:700;color:var(--grey)}
.more-actions summary::-webkit-details-marker{display:none}
.more-actions[open] summary{background:var(--bg);border-color:var(--grey-soft)}
.more-actions-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:50;background:var(--white);border:1px solid var(--rule);border-radius:var(--r-sm);box-shadow:var(--sh-md);min-width:200px;padding:6px;display:flex;flex-direction:column;gap:2px}
.more-actions-menu button,.more-actions-menu a{display:block;width:100%;text-align:left;padding:10px 12px;border-radius:8px;border:none;background:none;font-family:var(--body);font-size:13.5px;font-weight:600;color:var(--black);cursor:pointer;text-decoration:none}
.more-actions-menu button:hover,.more-actions-menu a:hover{background:var(--bg)}
.more-actions-menu button.danger,.more-actions-menu a.danger{color:var(--red)}
.empty{text-align:center;color:var(--grey);padding:44px 20px;font-size:14px}
.inline-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Affectation par glisser-déposer — deux colonnes toujours côte à côte, y
   compris sur mobile (le geste est volontairement gauche/droite, un
   empilement vertical le casserait). */
.affect-hint{background:var(--blue-lt);color:var(--blue);font-size:12.5px;font-weight:600;border-radius:var(--r-sm);padding:10px 13px;margin-bottom:14px;line-height:1.4}
.affect-cols{display:flex;gap:8px;align-items:flex-start}
.affect-col{flex:1;min-width:0}
.affect-col-title{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--grey-soft);margin-bottom:8px;padding:0 2px}
.affect-unassigned-zone{background:var(--bg);border:1.5px dashed var(--rule);border-radius:var(--r);padding:8px;min-height:70px}
.affect-transp-zone{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:8px;margin-bottom:8px;box-shadow:var(--sh-xs);transition:background-color .15s ease,border-color .15s ease}
.affect-transp-zone.affect-drop-hover,.affect-unassigned-zone.affect-drop-hover{border-color:var(--blue);background:var(--blue-lt)}
.affect-transp-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:12.5px;margin-bottom:6px;padding:0 2px}
.affect-transp-count{background:var(--bg);color:var(--grey);font-size:10.5px;font-weight:800;border-radius:100px;padding:2px 7px;flex-shrink:0}
.affect-transp-body{min-height:36px}
.affect-empty-hint{font-size:11px;color:var(--grey-soft);text-align:center;padding:8px 2px}
.affect-card{background:var(--white);border:1px solid var(--rule);border-radius:var(--r-sm);padding:8px 9px;margin-bottom:6px;cursor:grab;touch-action:none;user-select:none;box-shadow:var(--sh-xs)}
.affect-card.dirty{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-lt)}
.affect-card-top{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;font-weight:700;color:var(--blue);gap:6px}
.affect-card-cren{font-size:10.5px;color:var(--grey);font-weight:600;white-space:nowrap;flex-shrink:0}
.affect-card-name{font-size:12.5px;font-weight:700;color:var(--black);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.affect-card-addr{font-size:10.5px;color:var(--grey);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.affect-ghost{position:fixed;top:0;left:0;z-index:500;pointer-events:none;box-shadow:var(--sh-lg);opacity:.95;transform:rotate(-2deg)}
.affect-confirm-bar{position:sticky;bottom:14px;display:flex;align-items:center;gap:8px;background:var(--black);color:#fff;border-radius:100px;padding:8px 8px 8px 16px;box-shadow:var(--sh-lg);margin-top:16px}
.affect-confirm-bar span{flex:1;font-weight:700;font-size:12.5px}
.affect-confirm-bar .btn{padding:8px 14px;font-size:12px}

.stock-gauge{height:12px;border-radius:100px;background:var(--green-bg);overflow:hidden;margin-bottom:14px}
.stock-gauge-fill{height:100%;background:var(--blue);border-radius:100px;transition:width .4s ease}

.day-progress .dp-top{display:flex;justify-content:space-between;font-size:11.5px;color:var(--grey);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.day-progress .dp-bar{height:8px;border-radius:100px;background:var(--bg);overflow:hidden}
.day-progress .dp-fill{height:100%;border-radius:100px;background:var(--blue);transition:width .4s ease}
.day-progress .dp-fill.over{background:var(--red)}
.stock-legend{display:flex;gap:20px;font-size:13px;color:var(--black);font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px}
.dot-green{background:var(--green)}
.dot-blue{background:var(--blue)}

/* Modales (remplacent confirm()/prompt()/alert() natifs du navigateur) */
@keyframes overlayFadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPopIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}
.modal-overlay{position:fixed;inset:0;background:rgba(13,24,41,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px);animation:overlayFadeIn .18s ease}
.modal-box{background:var(--white);border-radius:var(--r-lg);padding:26px 24px;max-width:380px;width:100%;box-shadow:var(--sh-lg);animation:modalPopIn .2s cubic-bezier(.22,.61,.36,1)}
.modal-box h2{font-size:18px}
.modal-msg{font-size:14.5px;line-height:1.55;color:var(--black);margin-bottom:20px}
.modal-msg strong{color:var(--blue)}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.modal-actions .btn{flex:1}
.modal-actions-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ville-checks{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:4px}
.ville-checks label{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--black);margin:0}
.dispo-grid{display:flex;flex-direction:column;gap:6px}
.dispo-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dispo-row .dispo-day{font-size:13px;color:var(--grey);flex:1}
.dispo-row select{width:auto;flex:1.3;padding:8px 10px;margin:0;font-size:13px}

.toast-wrap{position:fixed;left:0;right:0;bottom:24px;display:flex;justify-content:center;z-index:300;pointer-events:none}
.toast{background:var(--black);color:#fff;padding:13px 20px;border-radius:100px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-md);opacity:0;transform:translateY(12px);transition:opacity .25s ease, transform .25s ease;max-width:90vw}
.toast.show{opacity:1;transform:translateY(0)}
.toast.toast-error{background:var(--red)}
.toast.toast-success{background:var(--green)}

.map-overlay{position:fixed;inset:0;background:rgba(13,24,41,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(2px);animation:overlayFadeIn .18s ease}
.map-modal{background:#fff;border-radius:20px;max-width:560px;width:100%;overflow:hidden;box-shadow:0 24px 64px rgba(13,24,41,.35);animation:modalPopIn .2s cubic-bezier(.22,.61,.36,1)}
.map-modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px}
.map-modal-head h2{margin:0;font-family:var(--disp);font-weight:600;font-size:19px}
.map-modal-head button{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--grey);line-height:1}
.media-modal-body{background:#0d1829;display:flex;align-items:center;justify-content:center;max-height:70vh}
.media-modal-body img,.media-modal-body video{width:100%;max-height:70vh;object-fit:contain;display:block}
.media-modal-foot{display:flex;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--rule)}
.media-modal-foot a{color:var(--grey);font-size:12.5px;font-weight:600}
#live-map{height:380px;width:100%;background:#e8e6e0}
.map-stats{padding:0 20px 14px;font-size:12.5px;color:var(--grey);line-height:1.6}
.map-eta{padding:14px 20px;font-size:13.5px;color:var(--grey);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--rule)}
.map-eta strong{color:var(--black);font-size:15px;font-variant-numeric:tabular-nums}
.map-stale{color:var(--amber) !important;font-weight:700}

/* Marqueurs personnalisés (remplace les pins Leaflet par défaut) */
.map-pin-live{
  width:34px;height:34px;border-radius:50%;background:var(--blue);border:3px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;
  box-shadow:0 3px 10px rgba(13,24,41,.4);
}
.map-pin-live::after{
  content:'';position:absolute;inset:-9px;border-radius:50%;border:2px solid var(--blue);
  animation:pinPulse 2s ease-out infinite;
}
@keyframes pinPulse{0%{transform:scale(.65);opacity:.7}100%{transform:scale(1.7);opacity:0}}
.map-pin-teardrop{
  width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:var(--gold);box-shadow:0 3px 10px rgba(13,24,41,.35);
  display:flex;align-items:center;justify-content:center;
}
.map-pin-teardrop span{transform:rotate(45deg);font-size:15px}
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 8px 28px rgba(13,24,41,.22)}
.leaflet-popup-content{font-family:var(--body);margin:12px 14px;font-size:13.5px;line-height:1.5}
.spinner-wrap{display:flex;justify-content:center;padding:50px 0}
.spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--rule);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.btn,.tabs button,.periods button,.row-item,.stat-tile{transition:box-shadow .15s ease, transform .1s ease, background-color .15s ease, border-color .15s ease}
.btn:active:not(:disabled){transform:scale(.98)}
.row-item:hover{box-shadow:var(--sh-sm);border-color:#cfc6b3}

/* ── Version ordinateur : barre latérale fixe + contenu plus large ── */
@media (min-width:860px){
  .wrap{max-width:1120px;padding:32px 32px 80px}
  .a-layout{display:flex;align-items:flex-start;gap:28px}
  .tabs{flex-direction:column;overflow-x:visible;width:200px;flex-shrink:0;position:sticky;top:32px;gap:8px;mask-image:none;-webkit-mask-image:none}
  .tabs button{width:100%;text-align:left;padding:12px 16px;border-radius:12px}
  .tabs-group{display:block}
  .a-content{flex:1;min-width:0}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .card{padding:28px}
  .row-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;align-items:start}
  .row-grid .row-item{margin-bottom:0}
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = (p) => '/api/' + p;
// localStorage plutôt que sessionStorage : le mot de passe admin ne périme
// jamais côté serveur (comparé tel quel à ADMIN_PASSWORD à chaque requête),
// donc pas de raison de le redemander à chaque fermeture de l'onglet/app.
let TOKEN = localStorage.getItem('a_token') || '';
// Rôle du compte connecté (Module 7, Partie 31) — 'administrateur' par
// défaut : c'est toujours le rôle du mot de passe historique partagé, donc
// une session déjà ouverte avant l'ajout des comptes équipe reste correcte
// sans avoir à se reconnecter.
let ROLE = localStorage.getItem('a_role') || 'administrateur';
let NOM_COMPTE = localStorage.getItem('a_nom') || '';

function authHeaders(){ return {'Content-Type':'application/json','x-admin-token':TOKEN}; }
function setSession(token, role, nom){
  TOKEN = token; ROLE = role || 'administrateur'; NOM_COMPTE = nom || '';
  localStorage.setItem('a_token', TOKEN);
  localStorage.setItem('a_role', ROLE);
  localStorage.setItem('a_nom', NOM_COMPTE);
}
function applyRoleVisibility(){
  document.querySelectorAll('[data-tab="equipe"]').forEach(b => b.classList.toggle('hidden', ROLE !== 'administrateur'));
}

// ── Ville/zone sélectionnée (multi-ville) ─────────────────────────────────
// Plutôt que de retoucher chaque site d'appel fetch(API('admin-...'), ...)
// un par un (des dizaines), un seul point d'interception : city_id est
// injecté automatiquement dans le corps de toute requête POST vers un
// endpoint admin-* qui ne le précise pas déjà explicitement. 'all' (vue
// agrégée) n'est compris que par admin-dashboard.js — les autres endpoints
// le traitent comme absent et retombent sur la première ville active
// (resolveAdminCity), donc aucun risque à l'envoyer partout.
// Vide par défaut (jamais 'all') : tant qu'aucune préférence n'est connue,
// le corps de requête n'est pas touché et chaque endpoint retombe sur son
// comportement pré-multi-ville (resolveAdminCity → première ville active) —
// donc zéro changement pour une exploitation à une seule ville tant que
// l'admin n'a jamais vu/touché le sélecteur (ex. premier chargement jamais
// fait sur cet appareil). 'all' n'est choisi explicitement que s'il y a
// réellement plusieurs villes actives (voir loadCitySwitcher).
let CITY_ID = localStorage.getItem('a_city_id') || '';
let CITIES_CACHE = [];
const _rawFetch = window.fetch.bind(window);
window.fetch = function(url, opts){
  if(CITY_ID && opts && opts.method === 'POST' && typeof url === 'string' && url.indexOf('/api/admin-') !== -1 && typeof opts.body === 'string'){
    try{
      const parsed = JSON.parse(opts.body);
      if(parsed.city_id === undefined){
        parsed.city_id = CITY_ID;
        opts = Object.assign({}, opts, { body: JSON.stringify(parsed) });
      }
    }catch(e){}
  }
  return _rawFetch(url, opts);
};
function setSelectedCityId(id){
  CITY_ID = id;
  localStorage.setItem('a_city_id', id);
  if(CURRENT_TAB) switchAdminTab(CURRENT_TAB);
}
async function loadCitySwitcher(){
  try{
    const r = await fetch(API('admin-cities'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list', city_id:'all'})});
    const d = await r.json();
    if(!r.ok) return;
    CITIES_CACHE = (d.cities||[]).filter(c => c.actif);
    const sel = document.getElementById('a-city-select');
    if(!sel) return;
    const showAll = CITIES_CACHE.length > 1;
    sel.innerHTML = (showAll ? `<option value="all">🌍 Toutes les villes</option>` : '')
      + CITIES_CACHE.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
    const knownIds = new Set(CITIES_CACHE.map(c => String(c.id)));
    const storedValid = CITY_ID === 'all' ? showAll : knownIds.has(CITY_ID);
    if(!storedValid){
      // Pas de préférence connue/valide : une seule ville → la sélectionner
      // silencieusement (comportement inchangé) ; plusieurs → vue agrégée.
      CITY_ID = showAll ? 'all' : (CITIES_CACHE[0] ? String(CITIES_CACHE[0].id) : '');
    }
    sel.value = CITY_ID;
    document.getElementById('a-city-switcher').classList.toggle('hidden', CITIES_CACHE.length < 2);
    localStorage.setItem('a_city_id', CITY_ID);
    // La ville n'était pas encore connue au moment du premier chargement de
    // l'onglet (ce fetch est asynchrone, lancé en parallèle) — on rejoue le
    // chargement maintenant qu'elle l'est, seulement si elle a changé.
    if(showAll && CURRENT_TAB) switchAdminTab(CURRENT_TAB);
  }catch(e){}
}

// ── Recherche globale (Module 7, Partie 4) : une seule barre pour retrouver
// un client/une commande/un climatiseur/un transporteur/un partenaire, sans
// naviguer d'onglet en onglet. "Récentes" gardées en local (pas de nouvelle
// table pour un simple confort de navigation).
let SEARCH_DEBOUNCE = null;
function adminSearchFocus(){
  if(!document.getElementById('a-search-input').value.trim()) renderSearchRecent();
}
function adminSearchInput(val){
  clearTimeout(SEARCH_DEBOUNCE);
  const q = val.trim();
  if(q.length < 2){ renderSearchRecent(); return; }
  SEARCH_DEBOUNCE = setTimeout(() => runAdminSearch(q), 250);
}
function getRecentSearches(){
  try{ return JSON.parse(localStorage.getItem('a_search_recent') || '[]'); }catch(e){ return []; }
}
function saveRecentSearch(q){
  const recent = [q, ...getRecentSearches().filter(x => x!==q)].slice(0, 5);
  localStorage.setItem('a_search_recent', JSON.stringify(recent));
}
function renderSearchRecent(){
  const box = document.getElementById('a-search-results');
  const recent = getRecentSearches();
  if(!recent.length){ box.classList.add('hidden'); return; }
  box.innerHTML = `<div class="a-search-group-title">Dernières recherches</div>
    <div class="a-search-recent">${recent.map(q => `<button onclick="document.getElementById('a-search-input').value='${escHtml(q).replace(/'/g,"\\'")}';runAdminSearch('${escHtml(q).replace(/'/g,"\\'")}')">${escHtml(q)}</button>`).join('')}</div>`;
  box.classList.remove('hidden');
}
async function runAdminSearch(q){
  try{
    const r = await fetch(API('admin-search'), {method:'POST', headers:authHeaders(), body:JSON.stringify({q})});
    const d = await r.json();
    if(!r.ok) return;
    renderSearchResults(d, q);
    saveRecentSearch(q);
  }catch(e){}
}
const SEARCH_GROUPS = [
  {key:'commandes', title:'Commandes', icon:'🧾'},
  {key:'clients', title:'Clients', icon:'👤'},
  {key:'climatiseurs', title:'Climatiseurs', icon:'📦'},
  {key:'transporteurs', title:'Transporteurs', icon:'👷'},
  {key:'partenaires', title:'Ambassadeurs', icon:'🤝'},
];
function renderSearchResults(d, q){
  const box = document.getElementById('a-search-results');
  let html = '', total = 0;
  for(const g of SEARCH_GROUPS){
    const items = d[g.key]||[];
    if(!items.length) continue;
    total += items.length;
    html += `<div class="a-search-group-title">${g.icon} ${g.title}</div>` + items.map(it => searchRowHtml(g.key, it)).join('');
  }
  box.innerHTML = total ? html : `<div class="a-search-empty">Aucun résultat pour "${escHtml(q)}".</div>`;
  box.classList.remove('hidden');
}
function searchRowHtml(type, it){
  if(type==='commandes') return `<div class="a-search-row" onclick="goToSearchResult('commandes', ${it.id}, ${it.city_id}, null, '${(it.ref||'').replace(/'/g,"\\'")}')">
    <span><span class="a-search-row-main">${escHtml((it.prenom||'')+' '+(it.nom||''))}</span><br><span class="a-search-row-sub">${escHtml(it.ref)} · ${frDate(it.date_debut)} → ${frDate(it.date_fin)}</span></span>
    <span class="chip ${it.statut}">${(typeof RESA_LABEL!=='undefined'&&RESA_LABEL[it.statut])||it.statut}</span></div>`;
  if(type==='clients') return `<div class="a-search-row" onclick="goToSearchResult('clients', ${it.id}, ${it.city_id})">

// ── Notifications push + badge d'app ──────────────────────────────────────
// Règle générale de l'app (voulue pour tous les espaces, actuels et à venir) :
// app fermée + événement important → notification sur le téléphone ET badge
// sur l'icône de l'app. Le transporteur avait déjà les notifications, ni lui
// ni l'admin n'avaient le badge — les deux sont complétés ici. Un seul
// abonnement suffit tant qu'il n'a pas expiré — on retente à chaque
// connexion par simplicité, le serveur fait juste un upsert.
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}
async function setupAdminPush(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try{
    const reg = await navigator.serviceWorker.register('/admin/sw.js');
    const keyRes = await fetch(API('admin-push-vapid-key'));
    const { publicKey } = await keyRes.json();
    if(!publicKey) return; // VAPID pas encore configuré côté serveur

    const permission = await Notification.requestPermission();
    if(permission !== 'granted') return;

    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(publicKey) });
    }
    await fetch(API('admin-push-subscribe'), {
      method:'POST', headers:authHeaders(),
      body: JSON.stringify({ subscription: sub }),
    });
  }catch(e){ /* pas bloquant : l'app marche très bien sans push */ }
}

// ── Face ID / empreinte (WebAuthn) ────────────────────────────────────────────
function bufToBase64url(buf){
  const bytes = new Uint8Array(buf);
  let str = '';
  for(const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64urlToBuf(b64url){
  const pad = '='.repeat((4 - b64url.length % 4) % 4);
  const base64 = (b64url + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  const buf = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) buf[i] = raw.charCodeAt(i);
  return buf.buffer;
}
async function hasPlatformAuthenticator(){
  if(!window.PublicKeyCredential || !PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) return false;
  try{ return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }catch(e){ return false; }
}
async function initAdminWebauthnLoginButton(){
  if(!(await hasPlatformAuthenticator())) return;
  document.getElementById('a-webauthn-login-btn')?.classList.remove('hidden');
  // Comme une app bancaire : Face ID se déclenche tout seul à l'ouverture si
  // déjà activé sur cet appareil, pas besoin de taper sur le bouton.
  if(localStorage.getItem('a_faceid')==='actif') loginWithAdminFaceId(true);
}
async function maybeOfferAdminFaceId(){
  if(localStorage.getItem('a_faceid')) return; // déjà activé ou refusé sur cet appareil
  if(await hasPlatformAuthenticator()) document.getElementById('a-faceid-offer')?.classList.remove('hidden');
}
function dismissAdminFaceIdOffer(){
  localStorage.setItem('a_faceid', 'refuse');
  document.getElementById('a-faceid-offer')?.classList.add('hidden');
}
async function setupAdminFaceId(){
  const errEl = document.getElementById('a-faceid-err');
  const btn = document.getElementById('a-faceid-setup-btn');
  errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = 'Activation…'; }
  try{
    const optRes = await fetch(API('admin-webauthn-register-options'), {method:'POST', headers:authHeaders(), body:'{}'});
    const options = await optRes.json();
    if(!optRes.ok) throw new Error(options.error||'Erreur');

    const publicKey = {
      ...options,
      challenge: base64urlToBuf(options.challenge),
      user: { ...options.user, id: base64urlToBuf(options.user.id) },
      excludeCredentials: (options.excludeCredentials||[]).map(c => ({...c, id: base64urlToBuf(c.id)})),
    };
    const cred = await navigator.credentials.create({ publicKey });
    const response = {
      id: cred.id, rawId: bufToBase64url(cred.rawId), type: cred.type,
      response: {
        clientDataJSON: bufToBase64url(cred.response.clientDataJSON),
        attestationObject: bufToBase64url(cred.response.attestationObject),
        transports: cred.response.getTransports ? cred.response.getTransports() : undefined,
      },
      clientExtensionResults: cred.getClientExtensionResults ? cred.getClientExtensionResults() : {},
    };

    const verRes = await fetch(API('admin-webauthn-register-verify'), {method:'POST', headers:authHeaders(), body: JSON.stringify({ response })});
    const verData = await verRes.json();
    if(!verRes.ok) throw new Error(verData.error||'Erreur');

    localStorage.setItem('a_faceid', 'actif');
    document.getElementById('a-faceid-offer').innerHTML = '<p class="sub">✅ Face ID / empreinte activé pour cet appareil.</p>';
  }catch(e){
    errEl.textContent = "Impossible d'activer — réessaie plus tard";
    errEl.style.display = 'block';
    if(btn){ btn.disabled = false; btn.textContent = 'Activer'; }
  }
}
async function loginWithAdminFaceId(auto){
  const errEl = document.getElementById('a-webauthn-login-err');
  const btn = document.getElementById('a-webauthn-login-btn');
  errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = 'Connexion…'; }
  try{
    const optRes = await fetch(API('admin-webauthn-login-options'), {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const options = await optRes.json();
    if(!optRes.ok) throw new Error(options.error||'Erreur');

    const publicKey = {
      ...options,
      challenge: base64urlToBuf(options.challenge),
      allowCredentials: (options.allowCredentials||[]).map(c => ({...c, id: base64urlToBuf(c.id)})),
    };
    const assertion = await navigator.credentials.get({ publicKey });
    const response = {
      id: assertion.id, rawId: bufToBase64url(assertion.rawId), type: assertion.type,
      response: {
        clientDataJSON: bufToBase64url(assertion.response.clientDataJSON),
        authenticatorData: bufToBase64url(assertion.response.authenticatorData),
        signature: bufToBase64url(assertion.response.signature),
        userHandle: assertion.response.userHandle ? bufToBase64url(assertion.response.userHandle) : undefined,
      },
      clientExtensionResults: assertion.getClientExtensionResults ? assertion.getClientExtensionResults() : {},
    };

    const verRes = await fetch(API('admin-webauthn-login-verify'), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ response })});
    const d = await verRes.json();
    if(!verRes.ok) throw new Error(d.error||'Connexion refusée.');

    // La biométrie ne redonne toujours que le mot de passe historique (voir
    // admin-webauthn-login-verify.js) — pas encore de Face ID par membre de
    // l'équipe, donc toujours le rôle "administrateur" ici.
    onAdminLoginSuccess(d.token, 'administrateur', '');
    maybeOfferAdminFaceId();
  }catch(e){
    // Déclenchement automatique à l'ouverture : un échec/annulation ne doit
    // pas afficher une erreur sans qu'un tap explicite ait eu lieu — l'écran
    // de connexion normal reste simplement affiché, prêt à réessayer.
    if(!auto){
      errEl.textContent = e.message || 'Connexion refusée.';
      errEl.style.display = 'block';
    }
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = '🔓 Face ID / empreinte'; }
  }
}

// wa.me exige un numéro international sans "0" ni "+" — même conversion que

// Génère et télécharge un CSV côté navigateur (aucun appel serveur) à partir
// d'un tableau d'objets déjà en cache — évite d'ajouter un endpoint juste
// pour une extraction ponctuelle vers Excel/compta.
function downloadCsv(filename, rows, columns){
  const esc = v => {
    const s = v==null ? '' : String(v);
    return /[",\n;]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const header = columns.map(c=>c.label).join(';');
  const lines = rows.map(r => columns.map(c=>esc(typeof c.value==='function'?c.value(r):r[c.value])).join(';'));
  const csv = '﻿'+[header, ...lines].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function closeModal(){

function confirmAction(message, onYes, opts={}){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box">
      <p class="modal-msg">${escHtml(message)}</p>

      </div>
    </div>`;
  document.body.appendChild(overlay);
  const cancel = () => { closeModal(); if(opts.onCancel) opts.onCancel(); };
  overlay.addEventListener('click', e => { if(e.target===overlay) cancel(); });
  const [cancelBtn, yesBtn] = overlay.querySelectorAll('.btn');
  cancelBtn.onclick = cancel;
  yesBtn.onclick = () => { closeModal(); onYes(); };
}

function promptAction({title, label, value='', placeholder='', type='text'}, onSubmit){
  closeModal();

  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box">

    const r = await fetch(API('admin-alerts'), {method:'POST', headers:authHeaders(), body:'{}'});
    const d = await r.json();
    if(!r.ok) return;
    updateTabBadge('reservations', d.reservations);
    updateTabBadge('livraisons', d.livraisons);
    updateTabBadge('virements', d.virements);
    updateTabBadge('partenaire_virements', d.partenaire_virements);
    updateTabBadge('virements_total', (d.virements||0) + (d.partenaire_virements||0) + (d.partenaire_litiges||0));
    updateTabBadge('incidents', d.incidents);
    // Les groupes Piloter/Gérer/Suivre sont des accordéons repliés par
    // défaut (gain de place) — sans ça une alerte cachée dans un groupe
    // fermé passerait inaperçue. On déplie automatiquement le groupe
    // concerné et on pose un point rouge sur son titre, même logique que
    // le point sur le bouton ☰ juste en dessous.
    updateGroupAlert('piloter', (d.reservations||0) + (d.livraisons||0) > 0);
    updateGroupAlert('gerer',   (d.virements||0) + (d.partenaire_virements||0) + (d.partenaire_litiges||0) > 0);
    updateGroupAlert('suivre',  (d.incidents||0) > 0);
    renderAlertsBanner(d);
    renderVirementMondayBanner();
    // Point rouge sur le bouton ☰ (mobile) : sur la barre horizontale
    // scrollable, les badges des onglets cachés passaient inaperçus — ce
    // point signale qu'il y a quelque chose à traiter dans le menu sans
    // avoir à l'ouvrir pour le découvrir.
    const anyAlert = (d.reservations||0) + (d.livraisons||0) + (d.virements||0) + (d.partenaire_virements||0) + (d.partenaire_litiges||0) + (d.incidents||0) > 0;
    document.getElementById('mobile-menu-dot')?.classList.toggle('hidden', !anyAlert);
  }catch(e){}
}
function updateTabBadge(tab, count){
  const el = document.getElementById('badge-'+tab);
  if(!el) return;
  if(count>0){ el.textContent = count; el.classList.remove('hidden'); }
  else{ el.classList.add('hidden'); }
}
function updateGroupAlert(group, hasAlert){
  const dot = document.getElementById('group-dot-'+group);
  dot?.classList.toggle('hidden', !hasAlert);
  if(hasAlert){
    const details = document.querySelector(`.tabs-group[data-group="${group}"]`);
    if(details) details.open = true;
  }
}

// Bandeau permanent multi-alertes — visible sur tous les onglets, se met à jour
// automatiquement. Chaque alerte est cliquable et redirige vers l'onglet concerné.
function renderAlertsBanner(d){
  const zone = document.getElementById('alerts-banner-zone');
  if(!zone) return;
  // Deux paliers seulement, alignés sur le code couleur déjà utilisé ailleurs
  // dans l'admin (chip.probleme/annulee = rouge, chip.en_attente/demande =
  // ambre) plutôt que 4 couleurs inventées à la volée — et triés du plus
  // urgent au moins urgent pour donner une vraie hiérarchie à la pile.
  const alerts = [];
  if(d.retards > 0)       alerts.push({sev:1, msg:`🚨 ${d.retards} mission${d.retards>1?'s':''} en retard`, fn:"goToRetards()"});
  if(d.non_assignees > 0) alerts.push({sev:1, msg:`⚠️ ${d.non_assignees} mission${d.non_assignees>1?'s':''} non assignée${d.non_assignees>1?'s':''} sous 72h`, fn:"goToUnassigned()"});
  if(d.incidents > 0)     alerts.push({sev:1, msg:`🧯 ${d.incidents} incident${d.incidents>1?'s':''} ouvert${d.incidents>1?'s':''}`, fn:"switchAdminTab('incidents')"});
  if(d.reservations > 0)  alerts.push({sev:2, msg:`🧾 ${d.reservations} réservation${d.reservations>1?'s':''} à traiter`, fn:"switchAdminTab('reservations')"});
  const totalVirementsDemandes = (d.virements||0) + (d.partenaire_virements||0);
  if(totalVirementsDemandes > 0) alerts.push({sev:2, msg:`💶 ${totalVirementsDemandes} virement${totalVirementsDemandes>1?'s':''} demandé${totalVirementsDemandes>1?'s':''}`, fn:"switchAdminTab('virements')"});
  if(d.partenaire_litiges > 0) alerts.push({sev:1, msg:`⚠️ ${d.partenaire_litiges} commission${d.partenaire_litiges>1?'s':''} ambassadeur versée${d.partenaire_litiges>1?'s':''} pour une résa annulée/remboursée`, fn:"switchAdminTab('virements')"});
  if(d.stock_indisponible > 0) alerts.push({sev:2, msg:`📦 ${d.stock_indisponible} climatiseur${d.stock_indisponible>1?'s':''} en panne ou en maintenance`, fn:"switchAdminTab('stock')"});
  alerts.sort((a,b) => a.sev-b.sev);
  zone.innerHTML = alerts.map(a =>
    `<div onclick="${a.fn}" style="background:${a.sev===1?'var(--red)':'var(--amber)'};color:#fff;padding:10px 16px;border-radius:var(--r);font-weight:700;font-size:13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
      <span>${a.msg}</span><span style="font-size:11px">Voir →</span>
    </div>`
  ).join('');
}

function goToRetards(){ LIVRAISONS_FILTER = 'en_retard'; switchAdminTab('livraisons'); }

// ── Actualisation automatique de l'onglet ouvert ──────────────────────────────
// Ce que voit l'admin ne doit pas se figer pendant qu'un livreur avance sur le
// terrain ou qu'une autre personne modifie quelque chose ailleurs. Réservations
// et Livraisons se rafraîchissent "en silence" (juste la liste, pas tout
// l'écran) pour ne jamais couper une recherche ou un formulaire en cours ; les
// autres onglets se rechargent normalement, mais seulement si l'admin n'est pas
// en train de taper ou de répondre à une confirmation.
async function silentRefreshReservations(){
  try{
    const [r, lr] = await Promise.all([
      fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
    ]);
    if(!r.ok) return;
    const d = await r.json();
    RESERVATIONS_CACHE = d.reservations || [];
    const ld = await lr.json().catch(()=>null);
    if(ld) LIVRAISONS_CACHE = ld.livraisons || [];
    if(RESERVATIONS_VIEW==='liste') renderReservations(); else renderReservationsCalendrier();
  }catch(e){}
}
async function silentRefreshLivraisons(){
  try{
    const [lr, tr] = await Promise.all([
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
    ]);
    if(!lr.ok) return;
    const ld = await lr.json();
    const td = await tr.json().catch(()=>null);
    LIVRAISONS_CACHE = ld.livraisons || [];
    if(td) TRANSPORTEURS_CACHE = td.transporteurs || TRANSPORTEURS_CACHE;
    renderLivraisons();
  }catch(e){}
}

  reservations:  silentRefreshReservations,
  livraisons:    silentRefreshLivraisons,

  partenaires:   () => PARTENAIRES_VIEW==='equipe' ? loadPartenairesEquipe() : loadPartenairesRevenus(),

function isUserBusy(){
  if(document.getElementById('modal-overlay-el')) return true; // confirmation/prompt en cours
  if(document.querySelector('#tab-transporteurs details[open]')) return true; // détail des missions ouvert
  if(document.querySelector('#tab-partenaires details[open]')) return true; // détail des réservations ouvert
  if(document.querySelector('#tab-virements details[open]')) return true; // détail ouvert dans la vue consolidée
  const tag = (document.activeElement && document.activeElement.tagName || '').toLowerCase();
  return tag==='input' || tag==='textarea' || tag==='select';
}
async function autoRefreshTick(){
  if(document.getElementById('a-app').classList.contains('hidden')) return; // pas connecté

}

// ── Board du jour (installations / récupérations) ────────────────────────────
// Vue opérationnelle "coup d'œil" — seulement ce qui sert à exécuter la
// journée (créneau, client, adresse, unité, livreur assigné, statut). Pas la
// durée de location, pas l'email, pas le prix : ça, c'est le rôle de l'onglet
// Réservations, pas celui d'un board logistique du jour.
function boardRowHtml(m){
  const res = m.reservation || {};
  const isAutre = m.type === 'autre';
  const nom = isAutre ? (m.titre || 'Mission libre') : ((res.prenom||'')+' '+(res.nom||''));
  const adresse = isAutre ? (m.adresse_libre||'—') : (res.adresse||'—');
  const numeros = (m.appareil_numeros||[]).join(', ');
  return `
    <div class="row-item" style="padding:12px 14px;margin-bottom:8px">
      <div class="row-top">
        <span class="row-title">${escHtml(m.creneau||'—')} · ${escHtml(nom)}</span>
        <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
      </div>
      <div class="row-meta">${escHtml(adresse)}${numeros?' · Climatiseur n°'+escHtml(numeros):''}${m.transporteur?' · '+escHtml(m.transporteur.nom):' · Non assigné'}</div>
    </div>`;
}
// Le code postal est déjà présent dans l'adresse (le site utilise l'autocomplete
// officiel BAN, qui renvoie "12 Rue de la Paix 06000 Nice") — pas besoin d'un
// champ séparé. Grouper par code postal aide à visualiser les missions qui se
// trouvent dans la même zone, sans dépendre d'une API de routage payante.
function postalCode(adresse){
  const m = String(adresse||'').match(/\b(\d{5})\b/);
  return m ? m[1] : null;
}
function groupByPostal(items, getAdresse){
  const groups = {};
  items.forEach(m => {
    const cp = postalCode(getAdresse(m)) || 'Autre';
    (groups[cp] = groups[cp] || []).push(m);
  });
  return Object.keys(groups).sort().map(cp => ({cp, items: groups[cp]}));
}
function boardSectionHtml(items){
  return groupByPostal(items, m => m.type==='autre' ? m.adresse_libre : (m.reservation||{}).adresse).map(g => `
    <div class="row-meta" style="font-size:11px;color:var(--grey-soft);font-weight:700;margin:10px 0 6px 2px">📮 ${escHtml(g.cp)} (${g.items.length})</div>
    ${g.items.map(boardRowHtml).join('')}`).join('');
}
function boardHtml(livraisons){
  const todayStr = new Date().toISOString().slice(0,10);
  const today = (livraisons||[]).filter(m => m.date_prevue===todayStr && m.statut!=='annule' && m.statut!=='refusee');
  const installs   = today.filter(m => m.type==='livraison');
  const pickups    = today.filter(m => m.type==='recuperation');
  const changements = today.filter(m => m.type==='changement');
  const autres     = today.filter(m => m.type==='autre');
  if(!installs.length && !pickups.length && !changements.length && !autres.length) return '';
  return `
    <div class="card">
      <h2>📋 Aujourd'hui</h2>
      ${installs.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin-bottom:4px">🏠 Installations (${installs.length})</div>${boardSectionHtml(installs)}`:''}
      ${pickups.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin:${installs.length?'16px':'0'} 0 4px">🔄 Récupérations (${pickups.length})</div>${boardSectionHtml(pickups)}`:''}
      ${changements.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin:${(installs.length||pickups.length)?'16px':'0'} 0 4px">🔁 Remplacements (${changements.length})</div>${boardSectionHtml(changements)}`:''}
      ${autres.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin:${(installs.length||pickups.length||changements.length)?'16px':'0'} 0 4px">🧳 Missions libres (${autres.length})</div>${boardSectionHtml(autres)}`:''}
    </div>`;
}

// ── Bandeau matinal (performances de la veille) ──────────────────────────────
// Message provisoire — Aly précisera le texte définitif plus tard. Affiché une
// seule fois par jour (marqueur localStorage daté), pas à chaque rechargement.
function morningBannerHtml(hier){
  if(!hier) return '';
  const todayStr = new Date().toISOString().slice(0,10);
  if(localStorage.getItem('a_morning_seen') === todayStr) return '';
  const incidentsTxt = hier.incidents>0 ? `, ${hier.incidents} incident${hier.incidents>1?'s':''}` : '';
  return `
    <div class="morning-banner" id="morning-banner-el">
      <button class="mb-close" onclick="dismissMorningBanner()">✕</button>
      <div class="mb-title">👋 Bonjour Aly</div>
      <div class="mb-text">Hier : ${hier.ca_euros.toFixed(0)} € de CA, ${hier.nb_reservations} réservation${hier.nb_reservations>1?'s':''}, ${hier.missions_terminees} mission${hier.missions_terminees>1?'s':''} terminée${hier.missions_terminees>1?'s':''}${incidentsTxt}.</div>
    </div>`;
}
function dismissMorningBanner(){
  localStorage.setItem('a_morning_seen', new Date().toISOString().slice(0,10));
  const el = document.getElementById('morning-banner-el');
  if(el) el.remove();
}

// ── Rappel virements du lundi ─────────────────────────────────────────────────
// Purement côté client (pas d'appel serveur) : chaque lundi à partir de 8h,
// tant qu'il n'a pas été vu ou traité CE lundi précis (marqueur localStorage
// daté sur le lundi courant, pas juste "aujourd'hui" — sinon il réapparaîtrait
// les autres jours de la même semaine après un rechargement). Complète
// l'alerte réactive existante ("virement demandé par le livreur") par un
// rappel proactif hebdomadaire, même si personne n'a rien demandé.
function currentMondayKey(){
  const d = new Date();
  const day = d.getDay(); // 0=dimanche .. 6=samedi
  const diffToMonday = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diffToMonday);
  return d.toISOString().slice(0, 10);
}
function renderVirementMondayBanner(){
  const zone = document.getElementById('virement-monday-banner-zone');
  if(!zone) return;
  const now = new Date();
  const isMondayMorningOrLater = now.getDay() === 1 && now.getHours() >= 8;
  const mondayKey = currentMondayKey();
  if(!isMondayMorningOrLater || localStorage.getItem('a_virement_monday_seen') === mondayKey){
    zone.innerHTML = '';
    return;
  }
  zone.innerHTML = `
    <div class="morning-banner" id="virement-monday-banner-el" style="background:linear-gradient(150deg,var(--blue) 0%,var(--blue-d) 60%,#0a1424 100%)">
      <button class="mb-close" onclick="dismissVirementMondayBanner()">✕</button>
      <div class="mb-title">💶 C'est lundi</div>
      <div class="mb-text">Pense aux virements de la semaine (transporteurs et ambassadeurs).</div>
      <button class="btn btn-blue btn-block" style="margin-top:14px" onclick="goToVirements()">Voir les virements à faire →</button>
    </div>`;
}
function dismissVirementMondayBanner(){
  localStorage.setItem('a_virement_monday_seen', currentMondayKey());
  document.getElementById('virement-monday-banner-el')?.remove();
}
function goToVirements(){
  dismissVirementMondayBanner();
  switchAdminTab('virements');
}

// ── CHECKLIST BOX ────────────────────────────────────────────────────────────
// Vue journalière, par transporteur, du matériel à récupérer au box avant de
// partir en tournée — même calcul que côté transporteur (api/_lib/checklistBox.js),
// synchronisé avec les missions du jour sélectionné. Lecture seule ici : la
// prise en charge (validation) reste un geste du transporteur lui-même.
let CHECKLIST_DATE = new Date().toISOString().slice(0,10);
async function loadChecklistBox(){
  const zone = document.getElementById('tab-checklist');
  zone.innerHTML = loading();
  try{
    const r = await fetch(API('admin-checklist'), {method:'POST', headers:authHeaders(), body:JSON.stringify({date:CHECKLIST_DATE})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    CHECKLIST_DATE = d.date;
    renderChecklistBox(d);
  }catch(e){
    zone.innerHTML = `<p class="empty">Erreur : ${escHtml(e.message)}</p>`;
  }
}
function changeChecklistDate(delta){
  const d = new Date(CHECKLIST_DATE+'T00:00:00');
  d.setDate(d.getDate()+delta);
  CHECKLIST_DATE = d.toISOString().slice(0,10);
  loadChecklistBox();
}
function renderChecklistBox(d){
  const zone = document.getElementById('tab-checklist');
  const dateLabel = new Date(d.date+'T00:00:00').toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

      <div style="display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px">

      `<span class="chip en_location">❄️ n°${x.numero}${x.kit==='velux'?' 🪟':''}</span>`).join('');
    const items = [];
    if(c.kits.universel) items.push(`🧰 ${c.kits.universel} kit${c.kits.universel>1?'s':''} calfeutrage universel`);
    if(c.kits.velux) items.push(`🪟 ${c.kits.velux} kit${c.kits.velux>1?'s':''} calfeutrage Vélux`);
    if(c.install_count){
      items.push(`📡 ${c.install_count} télécommande${c.install_count>1?'s':''}`);
      items.push(`🧵 ${c.install_count} rouleau${c.install_count>1?'x':''} velcro`);
      items.push(`📘 ${c.install_count} notice${c.install_count>1?'s':''}`);
      items.push(`✉️ ${c.install_count} enveloppe${c.install_count>1?'s':''} Loc'Air`);
    }
    if(c.fixe){
      items.push(`🛒 ${c.fixe.diable} diable`);
      items.push(`🎒 ${c.fixe.sac_transport} sac de transport`);
      items.push(`🪣 ${c.fixe.bac_vidange_petit} bac vidange (petit)`);
      items.push(`🪣 ${c.fixe.bac_vidange_grand} bac vidange (grand)`);
      items.push(`🧷 ${c.fixe.velcro_secours} velcro de secours`);
      items.push(`🔋 ${c.fixe.boite_piles} boîte de piles`);
      items.push(`🧽 ${c.fixe.microfibre} microfibre`);
      items.push(`🧻 ${c.fixe.lingette} boîte de lingettes`);
    }
    return `
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
          <span style="font-family:var(--disp);font-weight:600;font-size:17px">👷 ${escHtml(c.nom)}</span>
          <span class="chip ${c.validated?'actif':'a_faire'}">${c.validated?'✅ Prise en charge':'⏳ Pas encore prise en charge'}</span>
        </div>
        <div class="row-meta" style="margin-bottom:10px">${c.nb_missions} mission${c.nb_missions>1?'s':''}</div>
        ${climatiseurPills?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">${climatiseurPills}</div>`:''}
        <div class="row-meta">${items.join(' · ')}</div>

  }).join('');
}

// ── STOCK ─────────────────────────────────────────────────────────────────────
const APPAREIL_STATUT_LABEL = {disponible:'Disponible', panne:'En panne', maintenance:'Maintenance', nettoyage:'Nettoyage', loue:'Loué', vendu:'Vendu'};
const APPAREIL_STATUT_CHIP  = {disponible:'actif', panne:'annulee', maintenance:'a_faire', nettoyage:'a_faire', loue:'en_location', vendu:'terminee'};
const LOCALISATION_LABEL = {stock_principal:'📍 Stock principal', vehicule_transporteur:'🚚 Véhicule transporteur', chez_client:'🏠 Chez le client', maintenance:'🔧 Maintenance', autre:'Autre'};
const MOUVEMENT_TYPE_LABEL = {
  entree_parc:'Entrée dans le parc', attribution_reservation:'Attribution réservation',
  preparation_livraison:'Préparation livraison', depart_entrepot:'Départ entrepôt',
  livraison_client:'Livraison client', installation:'Installation', recuperation:'Récupération',

  remise_disponibilite:'Remise en disponibilité', autre:'Autre',
};

let STOCK_FILTRES = {};
// ── Offre Privilège (Step 2) : l'admin fixe le prix d'une offre déjà
// détectée par le cron quotidien — tant qu'aucun prix n'est fixé, le client
// ne voit rien. Réservé aux rôles finances, comme les virements.
let OFFRES_PRIVILEGE_CACHE = [];
function offresPrivilegeHtml(){
  if(!OFFRES_PRIVILEGE_CACHE.length) return '';
  return `
    <div class="card">
      <h2>⭐ Offres Privilège</h2>
      <p class="sub" style="margin-bottom:12px">Ces climatiseurs ont été très loués et sont actuellement chez un client — tu peux leur proposer de les garder au lieu de les rendre.</p>
      ${OFFRES_PRIVILEGE_CACHE.map(o => `
        <div class="row-item">

            <span class="row-title">Climatiseur n°${o.appareil?.numero ?? '—'}</span>
            <span class="chip ${o.statut==='acceptee'?'terminee':(o.statut==='proposee'?'en_location':'a_faire')}">${o.statut==='acceptee'?'Achetée par le client':(o.statut==='proposee'?'Proposée au client':'En attente de prix')}</span>
          </div>
          <div class="row-meta">${o.nb_locations} locations effectuées${o.reservation?' · '+escHtml((o.reservation.prenom||'')+' '+(o.reservation.nom||''))+' ('+escHtml(o.reservation.ref||'')+')':''}</div>
          ${o.statut==='proposee'||o.statut==='acceptee'?`<div class="row-meta">Prix ${o.statut==='acceptee'?'payé':'proposé'} : ${euros(o.prix_vente_cents)}</div>`:''}

            ${o.statut==='eligible'?`<button class="btn btn-blue" onclick="genererOffrePrivilege(${o.id}, ${o.appareil?.numero ?? 0})">Fixer un prix et proposer</button>`:''}
            ${o.statut==='eligible'||o.statut==='proposee'?`<button class="btn btn-grey" onclick="annulerOffrePrivilege(${o.id})">Retirer l'offre</button>`:''}
            ${o.statut==='acceptee'?`<button class="btn btn-red" onclick="rembourserOffrePrivilege(${o.id}, ${o.appareil?.numero ?? 0}, ${o.prix_vente_cents})">💳 Rembourser l'achat</button>`:''}
          </div>
        </div>`).join('')}

// Tarif standard de l'Offre Privilège, le même pour tous les climatiseurs —
// pré-rempli pour ne pas avoir à le ressaisir à chaque fois, mais reste
// modifiable si un cas particulier le justifie.
const OFFRE_PRIVILEGE_PRIX_DEFAUT_EUROS = 350;
function genererOffrePrivilege(id, numero){
  promptAction({title:`Climatiseur n°${numero} — Offre Privilège`, label:'Prix de vente (€)', value:String(OFFRE_PRIVILEGE_PRIX_DEFAUT_EUROS)}, async (value) => {
    const prix = parseFloat((value||'').replace(',','.'));
    if(!prix || prix<=0) return showToast('Prix invalide', 'error');
    try{
      const r = await fetch(API('admin-offres-privilege'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'proposer', id, prix_vente_cents:Math.round(prix*100)})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadStock();
      showToast('Offre proposée au client', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}
function annulerOffrePrivilege(id){
  confirmAction("Retirer cette offre ? Le client ne la verra plus (ou plus du tout, si elle n'a jamais été proposée).", async () => {
    try{
      const r = await fetch(API('admin-offres-privilege'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'annuler', id})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadStock();
      showToast('Offre retirée', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}
// Rembourse un achat Offre Privilège déjà payé (le client change d'avis).
// Même logique que rembourserReservation : ne fait que déclencher Stripe +
// l'historiser ici — c'est le webhook charge.refunded qui remet ensuite le
// climatiseur "disponible" et l'offre "refusee" une fois confirmé par Stripe.
function rembourserOffrePrivilege(id, numero, prixCents){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:400px">
      <h2 style="margin-bottom:6px">💳 Rembourser l'achat</h2>
      <p class="sub" style="margin-bottom:16px">Climatiseur n°${numero} — l'argent repart vraiment vers le client via Stripe. Une fois confirmé, l'appareil redevient disponible dans le parc.</p>
      <label for="remb-op-montant">Montant à rembourser (€)</label>
      <input type="text" inputmode="decimal" id="remb-op-montant" value="${(prixCents/100).toFixed(2)}"/>
      <label for="remb-op-raison" style="margin-top:14px">Raison (obligatoire)</label>
      <textarea id="remb-op-raison" rows="3" placeholder="Ex. le client a changé d'avis…"></textarea>
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-red">Rembourser</button>
      </div>
      <div class="err" id="remb-op-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = () => {
    const montant = parseFloat(document.getElementById('remb-op-montant').value.replace(',','.'));
    const raison = document.getElementById('remb-op-raison').value.trim();
    const errEl = document.getElementById('remb-op-err');
    errEl.style.display = 'none';
    if(!montant || montant <= 0){ errEl.textContent = 'Montant invalide'; errEl.style.display='block'; return; }
    if(!raison){ errEl.textContent = 'Indique la raison du remboursement'; errEl.style.display='block'; return; }
    confirmAction(`Confirmer le remboursement de ${montant.toFixed(2)} € ? Cette action est irréversible.`, async () => {
      okBtn.disabled = true;
      try{
        const resp = await fetch(API('admin-offres-privilege'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
          action:'rembourser', id, montant_cents: Math.round(montant*100), raison,
        })});
        const d = await resp.json();
        if(!resp.ok) throw new Error(d.error||'Erreur');
        closeModal();
        loadStock();
        showToast('Remboursement envoyé', 'success');
      }catch(e){
        okBtn.disabled = false;
        showToast(e.message, 'error');
      }
    }, {danger:true, yesLabel:'Oui, rembourser'});
  };
}
async function loadStock(silent){

// Historique des mouvements d'un appareil (Module 6, Partie 5).

// historique, réservations/clients associés, missions, incidents, entretien,
// et statistiques de rentabilité — un seul overlay, deux appels en parallèle.
async function voirFicheAppareil(id, numero){
  closeModal();
  const overlay = document.createElement('div');

  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `<div class="modal-box" style="max-width:520px"><h2>📋 Climatiseur n°${numero}</h2><p class="empty">Chargement…</p></div>`;

  const box = overlay.querySelector('.modal-box');

    const [rDetail, rStats] = await Promise.all([
      fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'detail', appareil_id:id})}),
      fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'stats', appareil_id:id})}),
    ]);
    const d = await rDetail.json();
    if(!rDetail.ok) throw new Error(d.error||'Erreur');

// Nombre de nuits + urgence relative à côté des dates — évite le calcul mental
// pour prioriser d'un coup d'œil parmi une longue liste.
function nightsLabel(dateDebut, dateFin){
  const nights = Math.round((new Date(dateFin+'T00:00:00') - new Date(dateDebut+'T00:00:00')) / 86400000);
  return nights>0 ? `${nights} nuit${nights>1?'s':''}` : '';
}
function relLabel(dateDebut){
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((new Date(dateDebut+'T00:00:00') - today) / 86400000);
  if(diffDays===0) return "aujourd'hui";
  if(diffDays===1) return 'demain';
  if(diffDays===-1) return 'hier';
  if(diffDays>1 && diffDays<=13) return `dans ${diffDays} j`;
  if(diffDays>13) return `dans ${Math.round(diffDays/7)} sem.`;
  if(diffDays<-1) return `il y a ${Math.abs(diffDays)} j`;
  return "aujourd'hui";
}
// Livraison aujourd'hui ou demain = à traiter en priorité, mérite d'être en rouge
// plutôt que dans le même or discret que le reste des dates à venir.
function isUrgent(dateDebut){
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((new Date(dateDebut+'T00:00:00') - today) / 86400000);
  return diffDays>=0 && diffDays<=1;
}
// MANUEL-xxx/PROLONG-xxx sont des identifiants techniques générés en interne,
// jamais vus par le client — aucun intérêt à les afficher. LOC-xxx est le vrai
// numéro de commande envoyé au client dans son email de confirmation, utile si
// un client rappelle en le citant.
function isInternalRef(ref){
  return !ref || /^(MANUEL|PROLONG)-/.test(ref);
}
// Qui s'occupe de la livraison / récupération d'une réservation — lit le
// cache Livraisons déjà chargé (LIVRAISONS_CACHE), quelle que soit la
// dernière page qui l'a alimenté (Livraisons, Réservations ou Calendrier
// le rafraîchissent tous désormais). Vide tant que rien n'a encore chargé
// de missions dans cette session.
function agentLineHtml(resId){
  const missions = (typeof LIVRAISONS_CACHE!=='undefined' ? LIVRAISONS_CACHE : [])
    .filter(m => m.reservation && m.reservation.id===resId && m.statut!=='annule' && !m.masquee);
  if(!missions.length) return '';
  const liv = missions.find(m => m.type==='livraison');
  const rec = missions.find(m => m.type==='recuperation');
  const nomOf = m => m.transporteur ? escHtml(m.transporteur.nom) : '<span style="color:var(--red);font-weight:700">Non assigné</span>';
  // Le même livreur fait très souvent les deux — une seule ligne au lieu de
  // répéter son nom deux fois (utile surtout sur mobile où chaque ligne compte).
  const parts = [];
  if(liv && rec && liv.transporteur && rec.transporteur && liv.transporteur.id === rec.transporteur.id){
    parts.push(`🚚 Livraison + récupération : ${nomOf(liv)}`);
  }else{
    if(liv) parts.push(`📦 Livraison : ${nomOf(liv)}`);
    if(rec) parts.push(`🔄 Récupération : ${nomOf(rec)}`);
  }
  return parts.length ? `<div class="row-meta" style="margin-top:4px">${parts.join(' · ')}</div>` : '';
}

// public (index.html), pour qu'Aly puisse saisir intégralement une réservation
// prise par téléphone (ex. personne âgée peu à l'aise avec le site) sans rien
// perdre par rapport à ce qu'un client aurait rempli lui-même.
// Mêmes codes/montants que le site public (index.html _PROMO_FIXED,
// api/checkout.js PROMO_CODES) — à tenir synchronisé si un code est ajouté.
const NR_PROMO_CODES = {'LOCAIR10':10, 'LOCA10':10};
let _nrPromoDiscount = 0;
// Applique/retire la remise sur le prix déjà saisi plutôt que de reconstruire
// tout le calcul à partir de zéro — un prix négocié à la main pour d'autres
// raisons (geste commercial, tarif spécial) n'est jamais écrasé.
function onNrParrainInput(){
  const inp = document.getElementById('nr-parrain');
  const prixEl = document.getElementById('nr-prix');
  const fb = document.getElementById('nr-parrain-fb');
  if(!inp || !prixEl || !fb) return;
  const val = inp.value.trim().toUpperCase();
  const prevDiscount = _nrPromoDiscount;
  const newDiscount = NR_PROMO_CODES[val] || 0;
  if(val && !newDiscount){
    fb.textContent = 'Code non reconnu'; fb.style.color = 'var(--red)'; fb.style.display = 'block';
    return;
  }
  if(newDiscount !== prevDiscount){
    const restored = (parseFloat(prixEl.value)||0) + prevDiscount;
    const applied  = Math.max(0, restored - newDiscount);
    prixEl.value = applied ? (Math.round(applied*100)/100) : '';
    _nrPromoDiscount = newDiscount;
  }
  if(newDiscount){ fb.textContent = `✓ Code valide — ${newDiscount} € déduits`; fb.style.color = 'var(--green)'; fb.style.display = 'block'; }
  else fb.style.display = 'none';
}

// Formulaire "Créer une prolongation" — reprend le formulaire du site
// (/prolongation, api/prolong-lookup.js + api/prolong-pay.js) : retrouver la
// réservation d'origine par email (+ référence), puis choisir la nouvelle
// date de fin. Même grille tarifaire et même format de code promo
// (PRENOM + 10/20/30) que /prolongation — à tenir synchronisé si la grille
// ou le format de code changent là-bas.
let PROLONG_ORIG = null;
function prCalcBase(d){ d=Math.max(1,d); if(d<=7) return d*20; if(d<=14) return 7*20+(d-7)*18; if(d<=21) return 7*20+7*18+(d-14)*17; return 7*20+7*18+7*17+(d-21)*16; }
function prDiffDays(a,b){ return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000); }
function prAddDay(iso){ const d=new Date(iso+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+1); return d.toISOString().slice(0,10); }
function prDiscountPct(code, prenom){
  if(!code || !prenom) return 0;
  const norm = prenom.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Za-z]/g,'').toUpperCase();
  if(!norm || !code.startsWith(norm)) return 0;
  const pct = parseInt(code.slice(norm.length));
  return [10,20,30].includes(pct) ? pct : 0;
}

    PROLONG_ORIG = d;

function resetProlongLookup(){ PROLONG_ORIG = null; renderReservationsToolbar(); }
function onProlongInputChange(){
  const o = PROLONG_ORIG;
  const newDate = document.getElementById('pr-newdate')?.value;
  const promoEl = document.getElementById('pr-promo');
  const fb = document.getElementById('pr-promo-fb');
  const note = document.getElementById('pr-price-note');
  const prixEl = document.getElementById('pr-prix');
  if(!o || !newDate || newDate <= o.date_fin){ if(note) note.style.display = 'none'; if(fb) fb.style.display = 'none'; return; }
  const ext = prDiffDays(o.date_fin, newDate);
  const totalDays = o.orig_days + ext;
  const base = (prCalcBase(totalDays) - prCalcBase(o.orig_days)) * (o.quantite || 1);
  const code = (promoEl?.value || '').trim().toUpperCase();
  const pct = prDiscountPct(code, o.prenom);
  const discAmt = Math.round(base * pct / 100);
  const price = Math.max(0, base - discAmt);
  if(prixEl) prixEl.value = price;
  if(note){ note.textContent = `+ ${ext} jour${ext>1?'s':''} → ${price} €${pct?` (code −${pct}%, −${discAmt} €)`:''}`; note.style.display = 'block'; }
  if(fb){
    if(!code) fb.style.display = 'none';
    else if(pct>0){ fb.textContent = `✓ Code valide — −${pct}% appliqués`; fb.style.color = 'var(--green)'; fb.style.display = 'block'; }
    else { fb.textContent = 'Code non reconnu'; fb.style.color = 'var(--red)'; fb.style.display = 'block'; }
  }
}

// Date qui détermine l'urgence d'une réservation : tant que la livraison n'a
// pas encore eu lieu (date_debut pas encore passée), c'est elle qui presse ;

function resaUrgencyDate(r){
