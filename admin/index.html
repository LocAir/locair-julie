<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Espace admin — Loc'Air</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="manifest" href="/admin/manifest.json"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Loc'Air Admin"/>
<meta name="theme-color" content="#1b3a5f"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  /* Palette identique à index.html (site vitrine) — voir --root du site pour la référence */
  --blue:#1b3a5f; --blue-d:#142d4a; --blue-lt:#dce8f5;
  --black:#141e30; --black2:#1e2d45; --bg:#ede8e0; --white:#f4f0ea;
  --grey:#5a6577; --grey2:#6b7785; --grey-soft:#8b93a3; --rule:#ddd8cf; --gold:#c5a96c; --gold-lt:#f3ead9;
  --green:#2d6a4f; --green-bg:#e6f0ea;
  --red:#9b2c1a; --red-bg:#f8e9e6;
  --amber:#9c6a17; --amber-bg:#f6eed9;
  --navy:#0d1829;
  --disp:'Cormorant Garamond',Georgia,serif;
  --body:'Inter',system-ui,sans-serif;
  --r-sm:8px; --r:12px; --r-lg:20px;
  --sh-xs:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
  --sh-sm:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --sh-md:0 8px 40px rgba(0,0,0,.09),0 2px 10px rgba(0,0,0,.05);
  --sh-lg:0 24px 80px rgba(0,0,0,.11),0 6px 24px rgba(0,0,0,.06);
  --sh-blue:0 6px 24px rgba(27,58,95,.32);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--black);font-family:var(--body);font-size:14.5px;-webkit-font-smoothing:antialiased;min-height:100vh;letter-spacing:-.005em}
::selection{background:var(--gold-lt);color:var(--black)}
.wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px}
.logo{font-family:var(--disp);font-size:23px;font-weight:600;color:var(--blue);margin-bottom:26px;letter-spacing:.01em;display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.logout-link{font-family:var(--body);font-size:12.5px;font-weight:700;color:var(--grey);background:none;border:none;cursor:pointer;letter-spacing:normal}
.logout-link:hover{color:var(--red)}
.logo em{font-style:normal;color:var(--gold)}
.eyebrow{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--grey);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--gold);flex-shrink:0}

.login-screen{min-height:calc(100vh - 80px);display:flex;align-items:center;justify-content:center}
.login-card{max-width:380px;width:100%;box-shadow:var(--sh-lg)}

.card{background:var(--white);border:1px solid var(--rule);border-radius:var(--r-lg);padding:26px 24px;box-shadow:var(--sh-sm);margin-bottom:16px}
h1{font-family:var(--disp);font-size:26px;font-weight:600;margin-bottom:6px;letter-spacing:.005em}
h2{font-family:var(--disp);font-size:19px;font-weight:600;margin-bottom:14px;color:var(--black)}
.sub{font-size:13.5px;color:var(--grey);margin-bottom:20px;line-height:1.55}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grey-soft);margin-bottom:6px}
input[type=text],input[type=password],input[type=number],input[type=tel],select{
  width:100%;padding:12px 14px;border:1.5px solid var(--rule);border-radius:var(--r-sm);font-size:14.5px;
  font-family:var(--body);background:var(--white);color:var(--black);outline:none;margin-bottom:14px;
  transition:border-color .15s ease, box-shadow .15s ease;
  text-overflow:ellipsis;
}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt)}
.btn{padding:11px 18px;border:none;border-radius:var(--r-sm);font-family:var(--body);font-size:13.5px;font-weight:700;letter-spacing:.005em;cursor:pointer}
.btn-blue{background:var(--blue);color:#fff;box-shadow:var(--sh-xs)}
.btn-blue:hover:not(:disabled){background:var(--blue-d)}
.btn-green{background:var(--green);color:#fff;box-shadow:var(--sh-xs)}
.btn-red{background:var(--white);color:var(--red);border:1.5px solid #e3c3bc}
.btn-red:hover:not(:disabled){background:var(--red-bg)}
.btn-grey{background:var(--white);color:var(--grey);border:1.5px solid var(--rule)}
.btn-grey:hover:not(:disabled){border-color:var(--grey-soft);color:var(--black)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-block{width:100%}
.err{background:var(--red-bg);color:var(--red);border-radius:var(--r-sm);padding:11px 14px;font-size:13px;margin-top:10px;display:none;line-height:1.5}
.hidden{display:none !important}

.tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:20px;padding-bottom:2px;mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%);-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%)}
.tabs button{flex-shrink:0;padding:9px 15px;border-radius:100px;border:1.5px solid transparent;background:transparent;font-weight:600;font-size:13px;color:var(--grey);cursor:pointer;transition:background-color .15s ease, color .15s ease}
.tabs button:hover{background:rgba(20,30,48,.04);color:var(--black)}
.tabs button.on{background:var(--blue);color:#fff;box-shadow:var(--sh-xs)}
.tabs button.on:hover{background:var(--blue-d)}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;margin-left:6px;border-radius:100px;background:var(--red);color:#fff;font-size:10.5px;font-weight:800;line-height:1;vertical-align:2px}
/* Caché par défaut (mobile) : dans la bande horizontale scrollable, un label
   de groupe ressemble à un bouton cassé et prend de la place sans rien
   apporter — visible seulement une fois la barre verticale (desktop). */
.tabs-group-label{display:none;flex-shrink:0;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--grey-soft);padding:9px 15px 2px;white-space:nowrap}

/* Menu ☰ mobile : la barre horizontale scrollable cachait des onglets sans
   affordance claire (juste un léger fondu de 28px) — sur mobile elle devient
   un tiroir latéral qu'on ouvre explicitement, avec tous les onglets et
   labels de groupe visibles d'un coup, plutôt que de compter sur un scroll
   qu'une bonne partie des utilisateurs ne découvre jamais. */
.mobile-menu-btn{display:none}
.mobile-menu-backdrop{display:none}
@media (max-width:859px){
  .mobile-menu-btn{
    display:flex;align-items:center;gap:9px;width:100%;
    padding:11px 16px;margin-bottom:16px;
    border-radius:var(--r);border:1.5px solid var(--rule);background:var(--white);
    font-family:var(--body);font-weight:700;font-size:14px;color:var(--black);
    cursor:pointer;box-shadow:var(--sh-xs);position:relative;
  }
  .mobile-menu-dot{width:8px;height:8px;border-radius:50%;background:var(--red);margin-left:2px}
  .mobile-menu-backdrop{
    display:none;position:fixed;inset:0;background:rgba(20,30,48,.45);z-index:199;
  }
  .mobile-menu-backdrop.show{display:block}
  .tabs{
    position:fixed;top:0;left:0;bottom:0;z-index:200;width:min(80vw,300px);
    background:var(--bg);flex-direction:column;overflow-x:visible;overflow-y:auto;
    margin-bottom:0;padding:20px 14px;gap:6px;
    mask-image:none;-webkit-mask-image:none;
    transform:translateX(-105%);transition:transform .25s ease;
    box-shadow:2px 0 28px rgba(0,0,0,.18);
  }
  .tabs.mobile-open{transform:translateX(0)}
  .tabs button{width:100%;text-align:left;padding:12px 16px;border-radius:12px}
  .tabs-group-label{display:block}
}

/* Sélecteur de ville/zone — visible seulement dès 2 villes actives (voir
   loadCitySwitcher), sinon inutile pour une exploitation mono-ville. */
.city-switcher{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:var(--white);border:1px solid var(--rule);border-radius:var(--r);box-shadow:var(--sh-xs)}
.city-switcher label{margin:0;flex-shrink:0}
.city-switcher select{width:auto;flex:1;padding:8px 12px;margin:0}

.periods{display:flex;gap:4px;margin-bottom:18px;background:var(--bg);padding:4px;border-radius:var(--r-sm)}
.periods button{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;font-weight:600;font-size:12.5px;color:var(--grey);cursor:pointer;transition:background-color .15s ease,color .15s ease}
.periods button.on{background:var(--white);color:var(--black);box-shadow:var(--sh-xs)}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-tile{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh-xs)}
.stat-tile .n{font-family:var(--disp);font-size:32px;font-weight:400;color:var(--black);font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1.1}
.stat-tile .l{font-size:11px;color:var(--grey);font-weight:600;margin-top:8px;letter-spacing:.03em;text-transform:uppercase}
.stat-tile.warn .n{color:var(--red)}

.morning-banner{background:var(--blue);color:#fff;border-radius:var(--r-lg);padding:18px 44px 18px 20px;margin-bottom:16px;box-shadow:var(--sh-blue);position:relative}
.morning-banner .mb-title{font-family:var(--disp);font-size:17px;font-weight:600;margin-bottom:6px}
.morning-banner .mb-text{font-size:13px;line-height:1.6;opacity:.92}
.morning-banner .mb-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#fff;opacity:.7;cursor:pointer;font-size:15px;padding:6px}
.morning-banner .mb-close:hover{opacity:1}

.week-header{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
.week-header:first-child{margin-top:0}
.week-header .wk-label{font-family:var(--disp);font-size:16px;font-weight:600}
.week-header .wk-ca{font-size:12px;color:var(--grey);font-weight:600}

.row-item{padding:16px 18px;border:1px solid var(--rule);border-radius:var(--r);margin-bottom:10px;background:var(--white);box-shadow:var(--sh-xs)}
.row-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px}
.row-title{font-weight:700;font-size:14.5px;letter-spacing:-.005em}
.row-meta{font-size:12.5px;color:var(--grey);line-height:1.6}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px 4px 8px;border-radius:100px;background:var(--bg);color:var(--grey)}
.chip::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.chip.confirmee,.chip.fait,.chip.verse,.chip.actif,.chip.terminee{background:var(--green-bg);color:var(--green)}
.chip.en_attente,.chip.a_faire,.chip.acceptee,.chip.demande{background:var(--amber-bg);color:var(--amber)}
.chip.annulee,.chip.probleme,.chip.refusee{background:var(--red-bg);color:var(--red)}
.chip.en_location{background:var(--blue-lt);color:var(--blue)}
.chip.type-livraison{background:var(--blue-lt);color:var(--blue)}
.chip.type-recuperation{background:var(--amber-bg);color:var(--amber)}
.chip.type-changement{background:var(--gold-lt);color:#8a6d2f}

/* Carte réservation : hiérarchie client → dates → prix, au lieu d'une seule
   ligne de métadonnées à parser. Le prix reprend le traitement typographique
   des tuiles chiffrées de l'Accueil (police --disp) pour rester cohérent. */
.resa-addr{font-size:12.5px;color:var(--grey);margin-bottom:10px;display:flex;align-items:baseline;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.resa-dates{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:4px 10px;font-size:13px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px dashed var(--rule)}
.resa-date-range{font-weight:700;color:var(--black);white-space:nowrap}
.resa-rel{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--gold);white-space:nowrap;flex-shrink:0}
.resa-rel.urgent{color:var(--red)}
.resa-bottom{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:2px}
.resa-price{font-family:var(--disp);font-size:23px;font-weight:600;color:var(--black);letter-spacing:-.01em;white-space:nowrap;flex-shrink:0}
.resa-sub{font-size:11px;color:var(--grey-soft);text-align:right;min-width:0;line-height:1.5}

.row-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.row-actions .btn{padding:8px 13px;font-size:12.5px}
.empty{text-align:center;color:var(--grey);padding:44px 20px;font-size:14px}
.inline-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.stock-gauge{height:12px;border-radius:100px;background:var(--green-bg);overflow:hidden;margin-bottom:14px}
.stock-gauge-fill{height:100%;background:var(--blue);border-radius:100px;transition:width .4s ease}

.day-progress .dp-top{display:flex;justify-content:space-between;font-size:11.5px;color:var(--grey);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.day-progress .dp-bar{height:8px;border-radius:100px;background:var(--bg);overflow:hidden}
.day-progress .dp-fill{height:100%;border-radius:100px;background:var(--blue);transition:width .4s ease}
.day-progress .dp-fill.over{background:var(--red)}
.stock-legend{display:flex;gap:20px;font-size:13px;color:var(--black);font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px}
.dot-green{background:var(--green)}
.dot-blue{background:var(--blue)}

/* Modales (remplacent confirm()/prompt()/alert() natifs du navigateur) */
.modal-overlay{position:fixed;inset:0;background:rgba(13,24,41,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:var(--white);border-radius:var(--r-lg);padding:26px 24px;max-width:380px;width:100%;box-shadow:var(--sh-lg)}
.modal-box h2{font-size:18px}
.modal-msg{font-size:14.5px;line-height:1.55;color:var(--black);margin-bottom:20px}
.modal-msg strong{color:var(--blue)}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.modal-actions .btn{flex:1}
.modal-actions-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ville-checks{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:4px}
.ville-checks label{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--black);margin:0}
.dispo-grid{display:flex;flex-direction:column;gap:6px}
.dispo-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dispo-row .dispo-day{font-size:13px;color:var(--grey);flex:1}
.dispo-row select{width:auto;flex:1.3;padding:8px 10px;margin:0;font-size:13px}

.toast-wrap{position:fixed;left:0;right:0;bottom:24px;display:flex;justify-content:center;z-index:300;pointer-events:none}
.toast{background:var(--black);color:#fff;padding:13px 20px;border-radius:100px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-md);opacity:0;transform:translateY(12px);transition:opacity .25s ease, transform .25s ease;max-width:90vw}
.toast.show{opacity:1;transform:translateY(0)}
.toast.toast-error{background:var(--red)}
.toast.toast-success{background:var(--green)}

.map-overlay{position:fixed;inset:0;background:rgba(13,24,41,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(2px)}
.map-modal{background:#fff;border-radius:20px;max-width:560px;width:100%;overflow:hidden;box-shadow:0 24px 64px rgba(13,24,41,.35)}
.map-modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px}
.map-modal-head h2{margin:0;font-family:var(--disp);font-weight:600;font-size:19px}
.map-modal-head button{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--grey);line-height:1}
.media-modal-body{background:#0d1829;display:flex;align-items:center;justify-content:center;max-height:70vh}
.media-modal-body img,.media-modal-body video{width:100%;max-height:70vh;object-fit:contain;display:block}
.media-modal-foot{display:flex;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--rule)}
.media-modal-foot a{color:var(--grey);font-size:12.5px;font-weight:600}
#live-map{height:380px;width:100%;background:#e8e6e0}
.map-stats{padding:0 20px 14px;font-size:12.5px;color:var(--grey);line-height:1.6}
.map-eta{padding:14px 20px;font-size:13.5px;color:var(--grey);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--rule)}
.map-eta strong{color:var(--black);font-size:15px;font-variant-numeric:tabular-nums}
.map-stale{color:var(--amber) !important;font-weight:700}

/* Marqueurs personnalisés (remplace les pins Leaflet par défaut) */
.map-pin-live{
  width:34px;height:34px;border-radius:50%;background:var(--blue);border:3px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;
  box-shadow:0 3px 10px rgba(13,24,41,.4);
}
.map-pin-live::after{
  content:'';position:absolute;inset:-9px;border-radius:50%;border:2px solid var(--blue);
  animation:pinPulse 2s ease-out infinite;
}
@keyframes pinPulse{0%{transform:scale(.65);opacity:.7}100%{transform:scale(1.7);opacity:0}}
.map-pin-teardrop{
  width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:var(--gold);box-shadow:0 3px 10px rgba(13,24,41,.35);
  display:flex;align-items:center;justify-content:center;
}
.map-pin-teardrop span{transform:rotate(45deg);font-size:15px}
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 8px 28px rgba(13,24,41,.22)}
.leaflet-popup-content{font-family:var(--body);margin:12px 14px;font-size:13.5px;line-height:1.5}
.spinner-wrap{display:flex;justify-content:center;padding:50px 0}
.spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--rule);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.btn,.tabs button,.periods button,.row-item,.stat-tile{transition:box-shadow .15s ease, transform .1s ease, background-color .15s ease, border-color .15s ease}
.btn:active:not(:disabled){transform:scale(.98)}
.row-item:hover{box-shadow:var(--sh-sm);border-color:#cfc6b3}

/* ── Version ordinateur : barre latérale fixe + contenu plus large ── */
@media (min-width:860px){
  .wrap{max-width:1120px;padding:32px 32px 80px}
  .a-layout{display:flex;align-items:flex-start;gap:28px}
  .tabs{flex-direction:column;overflow-x:visible;width:200px;flex-shrink:0;position:sticky;top:32px;gap:8px;mask-image:none;-webkit-mask-image:none}
  .tabs button{width:100%;text-align:left;padding:12px 16px;border-radius:12px}
  .tabs-group-label{display:block}
  .a-content{flex:1;min-width:0}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .card{padding:28px}
  .row-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;align-items:start}
  .row-grid .row-item{margin-bottom:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span>Loc<em>'Air</em> · Admin</span><button class="logout-link hidden" id="a-logout-btn" onclick="adminLogout()">🚪 Déconnexion</button></div>

  <div id="a-login" class="login-screen">
    <div class="card login-card">
      <div class="eyebrow">Espace propriétaire</div>
      <h1>Content de te revoir</h1>
      <p class="sub">Entre ton mot de passe pour accéder au tableau de bord.</p>
      <button class="btn btn-blue btn-block hidden" id="a-webauthn-login-btn" onclick="loginWithAdminFaceId()" style="margin-bottom:14px">🔓 Face ID / empreinte</button>
      <div class="err" id="a-webauthn-login-err"></div>
      <label for="a-pwd">Mot de passe</label>
      <input type="password" id="a-pwd" autocomplete="current-password"/>
      <button class="btn btn-blue btn-block" id="a-login-btn" onclick="adminLogin()">Se connecter →</button>
      <div class="err" id="a-login-err"></div>
    </div>
  </div>

  <div id="a-app" class="hidden">
    <div id="alerts-banner-zone"></div>
    <div class="card hidden" id="a-faceid-offer" style="margin-bottom:16px">
      <h2 style="margin-bottom:8px">🔓 Connexion plus rapide</h2>
      <p class="sub" style="margin-bottom:16px">Active Face ID / empreinte pour te connecter sans ressaisir ton mot de passe la prochaine fois.</p>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = (p) => '/api/' + p;
// localStorage plutôt que sessionStorage : le mot de passe admin ne périme
// jamais côté serveur (comparé tel quel à ADMIN_PASSWORD à chaque requête),
// donc pas de raison de le redemander à chaque fermeture de l'onglet/app.
let TOKEN = localStorage.getItem('a_token') || '';

function authHeaders(){ return {'Content-Type':'application/json','x-admin-token':TOKEN}; }

// ── Ville/zone sélectionnée (multi-ville) ─────────────────────────────────
// Plutôt que de retoucher chaque site d'appel fetch(API('admin-...'), ...)
// un par un (des dizaines), un seul point d'interception : city_id est
// injecté automatiquement dans le corps de toute requête POST vers un
// endpoint admin-* qui ne le précise pas déjà explicitement. 'all' (vue
// agrégée) n'est compris que par admin-dashboard.js — les autres endpoints
// le traitent comme absent et retombent sur la première ville active
// (resolveAdminCity), donc aucun risque à l'envoyer partout.
// Vide par défaut (jamais 'all') : tant qu'aucune préférence n'est connue,
// le corps de requête n'est pas touché et chaque endpoint retombe sur son
// comportement pré-multi-ville (resolveAdminCity → première ville active) —
// donc zéro changement pour une exploitation à une seule ville tant que
// l'admin n'a jamais vu/touché le sélecteur (ex. premier chargement jamais
// fait sur cet appareil). 'all' n'est choisi explicitement que s'il y a
// réellement plusieurs villes actives (voir loadCitySwitcher).
let CITY_ID = localStorage.getItem('a_city_id') || '';
let CITIES_CACHE = [];
const _rawFetch = window.fetch.bind(window);
window.fetch = function(url, opts){
  if(CITY_ID && opts && opts.method === 'POST' && typeof url === 'string' && url.indexOf('/api/admin-') !== -1 && typeof opts.body === 'string'){
    try{
      const parsed = JSON.parse(opts.body);
      if(parsed.city_id === undefined){
        parsed.city_id = CITY_ID;
        opts = Object.assign({}, opts, { body: JSON.stringify(parsed) });
      }
    }catch(e){}
  }
  return _rawFetch(url, opts);
};
function setSelectedCityId(id){
  CITY_ID = id;
  localStorage.setItem('a_city_id', id);
  if(CURRENT_TAB) switchAdminTab(CURRENT_TAB);
}
async function loadCitySwitcher(){
  try{
    const r = await fetch(API('admin-cities'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list', city_id:'all'})});
    const d = await r.json();
    if(!r.ok) return;
    CITIES_CACHE = (d.cities||[]).filter(c => c.actif);
    const sel = document.getElementById('a-city-select');
    if(!sel) return;
    const showAll = CITIES_CACHE.length > 1;
    sel.innerHTML = (showAll ? `<option value="all">🌍 Toutes les villes</option>` : '')
      + CITIES_CACHE.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
    const knownIds = new Set(CITIES_CACHE.map(c => String(c.id)));
    const storedValid = CITY_ID === 'all' ? showAll : knownIds.has(CITY_ID);
    if(!storedValid){
      // Pas de préférence connue/valide : une seule ville → la sélectionner
      // silencieusement (comportement inchangé) ; plusieurs → vue agrégée.
      CITY_ID = showAll ? 'all' : (CITIES_CACHE[0] ? String(CITIES_CACHE[0].id) : '');
    }
    sel.value = CITY_ID;
    document.getElementById('a-city-switcher').classList.toggle('hidden', CITIES_CACHE.length < 2);
    localStorage.setItem('a_city_id', CITY_ID);
    // La ville n'était pas encore connue au moment du premier chargement de
    // l'onglet (ce fetch est asynchrone, lancé en parallèle) — on rejoue le
    // chargement maintenant qu'elle l'est, seulement si elle a changé.
    if(showAll && CURRENT_TAB) switchAdminTab(CURRENT_TAB);
  }catch(e){}
}

// ── Notifications push + badge d'app ──────────────────────────────────────
// Règle générale de l'app (voulue pour tous les espaces, actuels et à venir) :
// app fermée + événement important → notification sur le téléphone ET badge
// sur l'icône de l'app. Le transporteur avait déjà les notifications, ni lui
// ni l'admin n'avaient le badge — les deux sont complétés ici. Un seul
// abonnement suffit tant qu'il n'a pas expiré — on retente à chaque
// connexion par simplicité, le serveur fait juste un upsert.
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}
async function setupAdminPush(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try{
    const reg = await navigator.serviceWorker.register('/admin/sw.js');
    const keyRes = await fetch(API('admin-push-vapid-key'));
    const { publicKey } = await keyRes.json();
    if(!publicKey) return; // VAPID pas encore configuré côté serveur

    const permission = await Notification.requestPermission();
    if(permission !== 'granted') return;

    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(publicKey) });
    }
    await fetch(API('admin-push-subscribe'), {
      method:'POST', headers:authHeaders(),
      body: JSON.stringify({ subscription: sub }),
    });
  }catch(e){ /* pas bloquant : l'app marche très bien sans push */ }
}
// Le badge indique juste "il y a du nouveau" (pas de compteur exact) — vidé
// dès que l'admin ouvre/revient sur l'app, puisqu'il est alors en train de
// regarder ce qui a changé.
function clearAppBadge(){
  if(navigator.clearAppBadge) navigator.clearAppBadge().catch(()=>{});
}
document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') clearAppBadge(); });

// Nécessaire maintenant que la session est permanente (localStorage) : sans
// ce bouton, la seule façon de sortir du compte sur un appareil serait de
// vider manuellement les données du navigateur.
function adminLogout(){
  confirmAction('Se déconnecter de l\'espace admin sur cet appareil ?', () => {
    localStorage.removeItem('a_token');
    TOKEN = '';
    if(window._alertsInterval){ clearInterval(window._alertsInterval); window._alertsInterval = null; }
    if(window._autoRefreshInterval){ clearInterval(window._autoRefreshInterval); window._autoRefreshInterval = null; }
    document.getElementById('a-app').classList.add('hidden');
    document.getElementById('a-logout-btn').classList.add('hidden');
    document.getElementById('a-login').classList.remove('hidden');
    document.getElementById('a-pwd').value = '';
  });
}

async function adminLogin(){
  const pwd = document.getElementById('a-pwd').value.trim();
  const errEl = document.getElementById('a-login-err');
  const btn = document.getElementById('a-login-btn');
  errEl.style.display='none';
  if(!pwd) return;
  if(btn && btn.disabled) return;
  if(btn){ btn.disabled = true; btn.textContent = 'Connexion…'; }
  try{
    const r = await fetch(API('admin-login'), {method:'POST', headers:{'Content-Type':'application/json','x-admin-token':pwd}, body:'{}'});
    if(!r.ok){ const d=await r.json(); throw new Error(d.error||'Erreur'); }
    TOKEN = pwd;
    localStorage.setItem('a_token', pwd);
    document.getElementById('a-login').classList.add('hidden');
    document.getElementById('a-app').classList.remove('hidden');
    document.getElementById('a-logout-btn').classList.remove('hidden');
    switchAdminTab('accueil');
    loadAlerts();
    loadCitySwitcher();
    setupAdminPush();
    clearAppBadge();
    if(!window._alertsInterval) window._alertsInterval = setInterval(loadAlerts, 45000);
    if(!window._autoRefreshInterval) window._autoRefreshInterval = setInterval(autoRefreshTick, 18000);
    maybeOfferAdminFaceId();
  }catch(e){
    errEl.textContent = e.message;
    errEl.style.display='block';
    if(btn){ btn.disabled = false; btn.textContent = 'Se connecter →'; }
  }
}

// ── Face ID / empreinte (WebAuthn) ────────────────────────────────────────────
function bufToBase64url(buf){
  const bytes = new Uint8Array(buf);
  let str = '';
  for(const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64urlToBuf(b64url){
  const pad = '='.repeat((4 - b64url.length % 4) % 4);
  const base64 = (b64url + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  const buf = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) buf[i] = raw.charCodeAt(i);
  return buf.buffer;
}
async function hasPlatformAuthenticator(){
  if(!window.PublicKeyCredential || !PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) return false;
  try{ return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }catch(e){ return false; }
}
async function initAdminWebauthnLoginButton(){
  if(!(await hasPlatformAuthenticator())) return;
  document.getElementById('a-webauthn-login-btn')?.classList.remove('hidden');
  // Comme une app bancaire : Face ID se déclenche tout seul à l'ouverture si
  // déjà activé sur cet appareil, pas besoin de taper sur le bouton.
  if(localStorage.getItem('a_faceid')==='actif') loginWithAdminFaceId(true);
}
async function maybeOfferAdminFaceId(){
  if(localStorage.getItem('a_faceid')) return; // déjà activé ou refusé sur cet appareil
  if(await hasPlatformAuthenticator()) document.getElementById('a-faceid-offer')?.classList.remove('hidden');
}
function dismissAdminFaceIdOffer(){
  localStorage.setItem('a_faceid', 'refuse');
  document.getElementById('a-faceid-offer')?.classList.add('hidden');
}
async function setupAdminFaceId(){
  const errEl = document.getElementById('a-faceid-err');
  const btn = document.getElementById('a-faceid-setup-btn');
  errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = 'Activation…'; }
  try{
    const optRes = await fetch(API('admin-webauthn-register-options'), {method:'POST', headers:authHeaders(), body:'{}'});
    const options = await optRes.json();
    if(!optRes.ok) throw new Error(options.error||'Erreur');

    const publicKey = {
      ...options,
      challenge: base64urlToBuf(options.challenge),
      user: { ...options.user, id: base64urlToBuf(options.user.id) },
      excludeCredentials: (options.excludeCredentials||[]).map(c => ({...c, id: base64urlToBuf(c.id)})),
    };
    const cred = await navigator.credentials.create({ publicKey });
    const response = {
      id: cred.id, rawId: bufToBase64url(cred.rawId), type: cred.type,
      response: {
        clientDataJSON: bufToBase64url(cred.response.clientDataJSON),
        attestationObject: bufToBase64url(cred.response.attestationObject),
        transports: cred.response.getTransports ? cred.response.getTransports() : undefined,
      },
      clientExtensionResults: cred.getClientExtensionResults ? cred.getClientExtensionResults() : {},
    };

    const verRes = await fetch(API('admin-webauthn-register-verify'), {method:'POST', headers:authHeaders(), body: JSON.stringify({ response })});
    const verData = await verRes.json();
    if(!verRes.ok) throw new Error(verData.error||'Erreur');

    localStorage.setItem('a_faceid', 'actif');
    document.getElementById('a-faceid-offer').innerHTML = '<p class="sub">✅ Face ID / empreinte activé pour cet appareil.</p>';
  }catch(e){
    errEl.textContent = "Impossible d'activer — réessaie plus tard";
    errEl.style.display = 'block';
    if(btn){ btn.disabled = false; btn.textContent = 'Activer'; }
  }
}
async function loginWithAdminFaceId(auto){
  const errEl = document.getElementById('a-webauthn-login-err');
  const btn = document.getElementById('a-webauthn-login-btn');
  errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = 'Connexion…'; }
  try{
    const optRes = await fetch(API('admin-webauthn-login-options'), {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const options = await optRes.json();
    if(!optRes.ok) throw new Error(options.error||'Erreur');

    const publicKey = {
      ...options,
      challenge: base64urlToBuf(options.challenge),
      allowCredentials: (options.allowCredentials||[]).map(c => ({...c, id: base64urlToBuf(c.id)})),
    };
    const assertion = await navigator.credentials.get({ publicKey });
    const response = {
      id: assertion.id, rawId: bufToBase64url(assertion.rawId), type: assertion.type,
      response: {
        clientDataJSON: bufToBase64url(assertion.response.clientDataJSON),
        authenticatorData: bufToBase64url(assertion.response.authenticatorData),
        signature: bufToBase64url(assertion.response.signature),
        userHandle: assertion.response.userHandle ? bufToBase64url(assertion.response.userHandle) : undefined,
      },
      clientExtensionResults: assertion.getClientExtensionResults ? assertion.getClientExtensionResults() : {},
    };

    const verRes = await fetch(API('admin-webauthn-login-verify'), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ response })});
    const d = await verRes.json();
    if(!verRes.ok) throw new Error(d.error||'Connexion refusée.');

    TOKEN = d.token;
    localStorage.setItem('a_token', d.token);
    document.getElementById('a-login').classList.add('hidden');
    document.getElementById('a-app').classList.remove('hidden');
    document.getElementById('a-logout-btn').classList.remove('hidden');
    switchAdminTab('accueil');
    loadAlerts();
    loadCitySwitcher();
    setupAdminPush();
    clearAppBadge();
    if(!window._alertsInterval) window._alertsInterval = setInterval(loadAlerts, 45000);
    if(!window._autoRefreshInterval) window._autoRefreshInterval = setInterval(autoRefreshTick, 18000);
    maybeOfferAdminFaceId();
  }catch(e){
    // Déclenchement automatique à l'ouverture : un échec/annulation ne doit
    // pas afficher une erreur sans qu'un tap explicite ait eu lieu — l'écran
    // de connexion normal reste simplement affiché, prêt à réessayer.
    if(!auto){
      errEl.textContent = e.message || 'Connexion refusée.';
      errEl.style.display = 'block';
    }
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = '🔓 Face ID / empreinte'; }
  }
}
document.getElementById('a-pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') adminLogin(); });

function euros(cents){ return ((cents||0)/100).toFixed(2).replace('.',',') + ' €'; }
function frDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'});
}
function frDateHeure(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
}
function loading(){ return '<div class="spinner-wrap"><div class="spinner"></div></div>'; }
function escHtml(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// wa.me exige un numéro international sans "0" ni "+" — même conversion que
// côté transporteur (une seule ville/pays par déploiement, voir CLAUDE.md).
function waNumber(tel){
  const digits = String(tel||'').replace(/\D/g,'');
  if(!digits) return '';
  return digits.startsWith('0') ? '33'+digits.slice(1) : digits;
}
// Boutons Appeler/WhatsApp réutilisés partout où un numéro client est affiché
// côté admin (Réservations, Livraisons, Clients) — jusqu'ici seul le
// transporteur avait ces raccourcis, l'admin devait recopier le numéro à la
// main pour joindre un client.
function contactButtonsHtml(tel){
  if(!tel) return '';
  const w = waNumber(tel);
  return `<a class="btn btn-grey" style="text-decoration:none" href="tel:${encodeURIComponent(tel)}" title="Appeler">📞</a>`
    + (w ? `<a class="btn btn-grey" style="text-decoration:none" href="https://wa.me/${w}" target="_blank" rel="noopener" title="WhatsApp">💬</a>` : '');
}
// Génère et télécharge un CSV côté navigateur (aucun appel serveur) à partir
// d'un tableau d'objets déjà en cache — évite d'ajouter un endpoint juste
// pour une extraction ponctuelle vers Excel/compta.
function downloadCsv(filename, rows, columns){
  const esc = v => {
    const s = v==null ? '' : String(v);
    return /[",\n;]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const header = columns.map(c=>c.label).join(';');
  const lines = rows.map(r => columns.map(c=>esc(typeof c.value==='function'?c.value(r):r[c.value])).join(';'));
  const csv = '﻿'+[header, ...lines].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// ── Modales maison (remplacent confirm()/prompt()/alert() du navigateur) ─────
function closeModal(){
  const o = document.getElementById('modal-overlay-el');
  if(o) o.remove();
}

function confirmAction(message, onYes, opts={}){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box">
      <p class="modal-msg">${escHtml(message)}</p>
      <div class="modal-actions">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn ${opts.danger?'btn-red':'btn-blue'}">${escHtml(opts.yesLabel||'Confirmer')}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const cancel = () => { closeModal(); if(opts.onCancel) opts.onCancel(); };
  overlay.addEventListener('click', e => { if(e.target===overlay) cancel(); });
  const [cancelBtn, yesBtn] = overlay.querySelectorAll('.btn');
  cancelBtn.onclick = cancel;
  yesBtn.onclick = () => { closeModal(); onYes(); };
}

function promptAction({title, label, value='', placeholder='', type='text'}, onSubmit){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box">
      ${title?`<h2>${escHtml(title)}</h2>`:''}
      ${label?`<label>${escHtml(label)}</label>`:''}
      <input type="${type==='number'?'text':type}" inputmode="${type==='number'?'decimal':'text'}" id="modal-input-el" value="${escHtml(value)}" placeholder="${escHtml(placeholder)}"/>
      <div class="modal-actions">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Valider</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#modal-input-el');
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.btn');
  input.focus(); input.select();
  const submit = () => { const v = input.value.trim(); closeModal(); onSubmit(v); };
  cancelBtn.onclick = closeModal;
  okBtn.onclick = submit;
  input.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
}

function showInfo(title, message, onClose){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box">
      <h2>${escHtml(title)}</h2>
      <p class="modal-msg" style="white-space:pre-line;margin-top:10px">${escHtml(message)}</p>
      <div class="modal-actions"><button class="btn btn-blue">C'est noté</button></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.btn').onclick = () => { closeModal(); if(onClose) onClose(); };
}

function showToast(message, type='info'){
  let wrap = document.getElementById('toast-wrap-el');
  if(!wrap){
    wrap = document.createElement('div');
    wrap.id = 'toast-wrap-el';
    wrap.className = 'toast-wrap';
    document.body.appendChild(wrap);
  }
  const toast = document.createElement('div');
  toast.className = 'toast' + (type!=='info' ? ' toast-'+type : '');
  toast.textContent = message;
  wrap.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3800);
}

const LIV_LABEL  = {a_faire:'Nouvelle', acceptee:'Acceptée', refusee:'Refusée', arrivee:'Sur place', fait:'Terminée', probleme:'Problème', annule:'Annulée'};
// Badge type de mission — bien plus visible qu'un simple emoji dans le titre
// (confondu entre livraison et récupération sinon, notamment sur deux missions

  livraison:    '<span class="chip type-livraison">📦 Livraison</span>',
  recuperation: '<span class="chip type-recuperation">🔄 Récupération</span>',
  changement:   '<span class="chip type-changement">🔁 Remplacement</span>',
};
function missionTypeBadge(type){
  return TYPE_BADGE[type] || TYPE_BADGE.recuperation;
}
const PROBLEME_LABEL = {client_absent:'Client absent', appareil_en_panne:'Appareil en panne', retard:'Retard important', autre:'Autre problème'};

let CURRENT_TAB = 'accueil';
function switchAdminTab(tab){
  CURRENT_TAB = tab;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  ['accueil','stock','reservations','livraisons','transporteurs','incidents','clients','villes'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==tab);
  });
  if(tab==='accueil') loadDashboard(CURRENT_DASHBOARD_PERIODE);
  if(tab==='stock') loadStock();
  if(tab==='reservations') loadReservations();
  if(tab==='livraisons') loadLivraisons();
  if(tab==='transporteurs') loadTransporteursTab();
  if(tab==='incidents') loadIncidents();
  if(tab==='clients') loadClients();
  if(tab==='villes') loadVilles();
  toggleMobileMenu(false);
}
// Tiroir latéral mobile (voir .mobile-menu-btn / .tabs.mobile-open en CSS) —
// n'a aucun effet visuel sur desktop, où .tabs reste la barre latérale fixe.
function toggleMobileMenu(force){
  const tabsEl = document.querySelector('.tabs');
  const backdrop = document.getElementById('mobile-menu-backdrop');
  if(!tabsEl || !backdrop) return;
  const open = force != null ? force : !tabsEl.classList.contains('mobile-open');
  tabsEl.classList.toggle('mobile-open', open);
  backdrop.classList.toggle('show', open);
}

// ── Badges "à regarder" sur les onglets (virements demandés, missions en
// problème) — rafraîchis périodiquement pour rester à jour même si l'admin
// reste sur le même onglet pendant qu'un livreur signale un souci ailleurs.
async function loadAlerts(){
  try{
    const r = await fetch(API('admin-alerts'), {method:'POST', headers:authHeaders(), body:'{}'});
    const d = await r.json();
    if(!r.ok) return;
    updateTabBadge('reservations', d.reservations);
    updateTabBadge('livraisons', d.livraisons);
    updateTabBadge('virements', d.virements);
    updateTabBadge('incidents', d.incidents);
    renderAlertsBanner(d);
    // Point rouge sur le bouton ☰ (mobile) : sur la barre horizontale
    // scrollable, les badges des onglets cachés passaient inaperçus — ce
    // point signale qu'il y a quelque chose à traiter dans le menu sans
    // avoir à l'ouvrir pour le découvrir.
    const anyAlert = (d.reservations||0) + (d.livraisons||0) + (d.virements||0) + (d.incidents||0) > 0;
    document.getElementById('mobile-menu-dot')?.classList.toggle('hidden', !anyAlert);
  }catch(e){}
}
function updateTabBadge(tab, count){
  const el = document.getElementById('badge-'+tab);
  if(!el) return;
  if(count>0){ el.textContent = count; el.classList.remove('hidden'); }
  else{ el.classList.add('hidden'); }
}

// Bandeau permanent multi-alertes — visible sur tous les onglets, se met à jour
// automatiquement. Chaque alerte est cliquable et redirige vers l'onglet concerné.
function renderAlertsBanner(d){
  const zone = document.getElementById('alerts-banner-zone');
  if(!zone) return;
  const alerts = [];
  if(d.retards > 0)       alerts.push({msg:`🚨 ${d.retards} récupération${d.retards>1?'s':''} en retard`, fn:"goToRetards()", color:'#7f1d1d', bg:'#991b1b'});
  if(d.non_assignees > 0) alerts.push({msg:`⚠️ ${d.non_assignees} mission${d.non_assignees>1?'s':''} non assignée${d.non_assignees>1?'s':''} sous 72h`, fn:"goToUnassigned()", color:'#7c2d12', bg:'#c2410c'});
  if(d.incidents > 0)     alerts.push({msg:`🧯 ${d.incidents} incident${d.incidents>1?'s':''} ouvert${d.incidents>1?'s':''}`, fn:"switchAdminTab('incidents')", color:'#1e3a5f', bg:'#1b3a5f'});
  if(d.reservations > 0)  alerts.push({msg:`🧾 ${d.reservations} réservation${d.reservations>1?'s':''} à traiter`, fn:"switchAdminTab('reservations')", color:'#3b0764', bg:'#6d28d9'});
  if(d.virements > 0)     alerts.push({msg:`💶 ${d.virements} virement${d.virements>1?'s':''} demandé${d.virements>1?'s':''}`, fn:"switchAdminTab('transporteurs')", color:'#064e3b', bg:'#065f46'});
  zone.innerHTML = alerts.map(a =>
    `<div onclick="${a.fn}" style="background:${a.bg};color:#fff;padding:10px 16px;border-radius:var(--r);font-weight:700;font-size:13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
      <span>${a.msg}</span><span style="font-size:11px;opacity:.8">Voir →</span>
    </div>`
  ).join('');
}
function goToUnassigned(){ LIVRAISONS_FILTER = 'non_assignees'; switchAdminTab('livraisons'); }
function goToRetards(){ LIVRAISONS_FILTER = 'toutes'; switchAdminTab('livraisons'); }

// ── Actualisation automatique de l'onglet ouvert ──────────────────────────────
// Ce que voit l'admin ne doit pas se figer pendant qu'un livreur avance sur le
// terrain ou qu'une autre personne modifie quelque chose ailleurs. Réservations
// et Livraisons se rafraîchissent "en silence" (juste la liste, pas tout
// l'écran) pour ne jamais couper une recherche ou un formulaire en cours ; les
// autres onglets se rechargent normalement, mais seulement si l'admin n'est pas
// en train de taper ou de répondre à une confirmation.
async function silentRefreshReservations(){
  try{
    const [r, lr] = await Promise.all([
      fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
    ]);
    if(!r.ok) return;
    const d = await r.json();
    RESERVATIONS_CACHE = d.reservations || [];
    const ld = await lr.json().catch(()=>null);
    if(ld) LIVRAISONS_CACHE = ld.livraisons || [];
    if(RESERVATIONS_VIEW==='liste') renderReservations(); else renderReservationsCalendrier();
  }catch(e){}
}
async function silentRefreshLivraisons(){
  try{
    const [lr, tr] = await Promise.all([
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
    ]);
    if(!lr.ok) return;
    const ld = await lr.json();
    const td = await tr.json().catch(()=>null);
    LIVRAISONS_CACHE = ld.livraisons || [];
    if(td) TRANSPORTEURS_CACHE = td.transporteurs || TRANSPORTEURS_CACHE;
    renderLivraisons();
  }catch(e){}
}
const TAB_AUTO_REFRESH = {
  accueil:       () => loadDashboard(CURRENT_DASHBOARD_PERIODE),
  stock:         () => loadStock(true),
  reservations:  silentRefreshReservations,
  livraisons:    silentRefreshLivraisons,
  transporteurs: () => TRANSPORTEURS_VIEW==='equipe' ? loadTransporteursEquipe() : loadTransporteursRevenus(),
  incidents:     loadIncidents,
  clients:       loadClients,
};
function isUserBusy(){
  if(document.getElementById('modal-overlay-el')) return true; // confirmation/prompt en cours
  if(document.querySelector('#tab-transporteurs details[open]')) return true; // détail des missions ouvert
  const tag = (document.activeElement && document.activeElement.tagName || '').toLowerCase();
  return tag==='input' || tag==='textarea' || tag==='select';
}
async function autoRefreshTick(){
  if(document.getElementById('a-app').classList.contains('hidden')) return; // pas connecté
  if(isUserBusy()) return;
  const fn = TAB_AUTO_REFRESH[CURRENT_TAB];
  if(fn){ try{ await fn(); }catch(e){} }
}

// ── Board du jour (installations / récupérations) ────────────────────────────
// Vue opérationnelle "coup d'œil" — seulement ce qui sert à exécuter la
// journée (créneau, client, adresse, unité, livreur assigné, statut). Pas la
// durée de location, pas l'email, pas le prix : ça, c'est le rôle de l'onglet
// Réservations, pas celui d'un board logistique du jour.
function boardRowHtml(m){
  const res = m.reservation || {};
  const numeros = (m.appareil_numeros||[]).join(', ');
  return `
    <div class="row-item" style="padding:12px 14px;margin-bottom:8px">
      <div class="row-top">
        <span class="row-title">${escHtml(m.creneau||'—')} · ${escHtml((res.prenom||'')+' '+(res.nom||''))}</span>
        <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
      </div>
      <div class="row-meta">${escHtml(res.adresse||'—')}${numeros?' · Unité n°'+escHtml(numeros):''}${m.transporteur?' · '+escHtml(m.transporteur.nom):' · Non assigné'}</div>
    </div>`;
}
// Le code postal est déjà présent dans l'adresse (le site utilise l'autocomplete
// officiel BAN, qui renvoie "12 Rue de la Paix 06000 Nice") — pas besoin d'un
// champ séparé. Grouper par code postal aide à visualiser les missions qui se
// trouvent dans la même zone, sans dépendre d'une API de routage payante.
function postalCode(adresse){
  const m = String(adresse||'').match(/\b(\d{5})\b/);
  return m ? m[1] : null;
}
function groupByPostal(items, getAdresse){
  const groups = {};
  items.forEach(m => {
    const cp = postalCode(getAdresse(m)) || 'Autre';
    (groups[cp] = groups[cp] || []).push(m);
  });
  return Object.keys(groups).sort().map(cp => ({cp, items: groups[cp]}));
}
function boardSectionHtml(items){
  return groupByPostal(items, m => (m.reservation||{}).adresse).map(g => `
    <div class="row-meta" style="font-size:11px;color:var(--grey-soft);font-weight:700;margin:10px 0 6px 2px">📮 ${escHtml(g.cp)} (${g.items.length})</div>
    ${g.items.map(boardRowHtml).join('')}`).join('');
}
function boardHtml(livraisons){
  const todayStr = new Date().toISOString().slice(0,10);
  const today = (livraisons||[]).filter(m => m.date_prevue===todayStr && m.statut!=='annule' && m.statut!=='refusee');
  const installs   = today.filter(m => m.type==='livraison');
  const pickups    = today.filter(m => m.type==='recuperation');
  const changements = today.filter(m => m.type==='changement');
  if(!installs.length && !pickups.length && !changements.length) return '';
  return `
    <div class="card">
      <h2>📋 Aujourd'hui</h2>
      ${installs.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin-bottom:4px">🏠 Installations (${installs.length})</div>${boardSectionHtml(installs)}`:''}
      ${pickups.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin:${installs.length?'16px':'0'} 0 4px">🔄 Récupérations (${pickups.length})</div>${boardSectionHtml(pickups)}`:''}
      ${changements.length?`<div class="row-meta" style="font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;margin:${(installs.length||pickups.length)?'16px':'0'} 0 4px">🔁 Remplacements (${changements.length})</div>${boardSectionHtml(changements)}`:''}
    </div>`;
}

// ── Bandeau matinal (performances de la veille) ──────────────────────────────
// Message provisoire — Aly précisera le texte définitif plus tard. Affiché une
// seule fois par jour (marqueur localStorage daté), pas à chaque rechargement.
function morningBannerHtml(hier){
  if(!hier) return '';
  const todayStr = new Date().toISOString().slice(0,10);
  if(localStorage.getItem('a_morning_seen') === todayStr) return '';
  const incidentsTxt = hier.incidents>0 ? `, ${hier.incidents} incident${hier.incidents>1?'s':''}` : '';
  return `
    <div class="morning-banner" id="morning-banner-el">
      <button class="mb-close" onclick="dismissMorningBanner()">✕</button>
      <div class="mb-title">👋 Bonjour Aly</div>
      <div class="mb-text">Hier : ${hier.ca_euros.toFixed(0)} € de CA, ${hier.nb_reservations} réservation${hier.nb_reservations>1?'s':''}, ${hier.missions_terminees} mission${hier.missions_terminees>1?'s':''} terminée${hier.missions_terminees>1?'s':''}${incidentsTxt}.</div>
    </div>`;
}
function dismissMorningBanner(){
  localStorage.setItem('a_morning_seen', new Date().toISOString().slice(0,10));
  const el = document.getElementById('morning-banner-el');
  if(el) el.remove();
}

// ── STOCK ─────────────────────────────────────────────────────────────────────
const APPAREIL_STATUT_LABEL = {disponible:'Disponible', panne:'En panne', maintenance:'Maintenance', loue:'Loué'};
const APPAREIL_STATUT_CHIP  = {disponible:'actif', panne:'annulee', maintenance:'a_faire', loue:'en_location'};

async function loadStock(silent){
  const zone = document.getElementById('tab-stock');
  if(!silent) zone.innerHTML = loading();
  try{
    const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:'{}'});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    const pctOccupe = d.actifs>0 ? Math.round((d.en_location/d.actifs)*100) : 0;
    const appareils = d.appareils || [];
    zone.innerHTML = `
      <div class="card">
        <h2>Flotte — ${escHtml(d.ville)}</h2>
        <div class="stock-gauge"><div class="stock-gauge-fill" style="width:${pctOccupe}%"></div></div>
        <div class="stock-legend">
          <span><i class="dot dot-green"></i> ${d.disponibles} disponible${d.disponibles>1?'s':''}</span>
          <span><i class="dot dot-blue"></i> ${d.en_location} en location</span>
        </div>
        <p class="sub" style="margin-top:14px">Se met à jour automatiquement à chaque réservation et à chaque retour confirmé par un transporteur. Chaque appareil a son numéro — le livreur sait exactement lequel récupérer.</p>
      </div>
      <div class="card">
        <h2>Appareils (${appareils.length})</h2>
        <div id="appareils-list">${appareils.map(a => {
          // "En location" (badge bleu) n'est jamais choisi à la main : déduit
          // automatiquement de la réservation confirmée qui couvre aujourd'hui
          // (voir admin-stock.js) — prioritaire sur le badge pour ne jamais
          // afficher "Disponible" sur un appareil en réalité chez un client.
          // "Loué" (option du menu) est le contrôle manuel séparé pour une
          // location hors système (accord de gré à gré, non passée par une
          // réservation) — exclu du calcul de disponibilité comme panne/maintenance.
          const chipClass = a.en_location ? 'en_location' : (APPAREIL_STATUT_CHIP[a.statut]||'');
          const chipLabel = a.en_location
            ? (a.statut==='disponible' ? 'En location' : `En location · ${APPAREIL_STATUT_LABEL[a.statut]||a.statut}`)
            : (APPAREIL_STATUT_LABEL[a.statut]||a.statut);
          return `
          <div class="row-item">
            <div class="row-top">
              <span class="row-title">Unité n°${a.numero}</span>
              <span class="chip ${chipClass}">${chipLabel}</span>
            </div>
            <div class="row-meta">${a.reference?escHtml(a.reference)+' · ':''}${a.en_location?'Actuellement chez un client (réservation confirmée)':a.statut==='loue'?'Loué hors système — marqué manuellement':(a.statut==='disponible'?'Au dépôt':'—')}</div>
            <div class="row-actions">
              <select onchange="updateAppareilStatut(${a.id}, this.value)">
                <option value="disponible" ${a.statut==='disponible'?'selected':''}>Disponible</option>
                <option value="loue" ${a.statut==='loue'?'selected':''}>Loué</option>
                <option value="panne" ${a.statut==='panne'?'selected':''}>En panne</option>
                <option value="maintenance" ${a.statut==='maintenance'?'selected':''}>Maintenance</option>
              </select>
              <button class="btn btn-grey" onclick="editAppareilReference(${a.id}, '${escHtml(a.reference||'').replace(/'/g,"\\'")}')">${a.reference?'Modifier':'Ajouter'} la référence</button>
              <button class="btn btn-red" onclick="deleteAppareil(${a.id}, ${a.numero})">🗑️ Supprimer</button>
            </div>
          </div>`;
        }).join('') || '<p class="empty">Aucun appareil enregistré.</p>'}
        </div>
        <button class="btn btn-blue btn-block" onclick="addAppareil()" style="margin-top:14px">+ Ajouter un appareil (nouvel achat)</button>
        <div class="err" id="stock-err"></div>
      </div>`;
  }catch(e){
    if(!silent) zone.innerHTML = '<p class="empty">Erreur de chargement. Réessaie.</p>';
  }
}
function addAppareil(){
  confirmAction('Ajouter un nouvel appareil à la flotte ? Il recevra automatiquement le prochain numéro disponible.', async () => {
    try{
      const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'add'})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadStock();
      showToast(`Unité n°${d.appareil.numero} ajoutée`, 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}
function deleteAppareil(id, numero){
  confirmAction(`Supprimer l'unité n°${numero} ? Impossible si elle a un historique de missions — marque-la "En panne" dans ce cas.`, async () => {
    try{
      const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'delete', id})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadStock();
      showToast(`Unité n°${numero} supprimée`, 'success');
    }catch(e){ showToast(e.message, 'error'); }
  }, {danger:true, yesLabel:'Supprimer'});
}
function updateAppareilStatut(id, statut){
  (async () => {
    try{
      const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, statut})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadStock();
      showToast('Statut mis à jour', 'success');
    }catch(e){
      showToast(e.message, 'error');
      // Sans ça, le menu déroulant reste affiché sur la valeur choisie même si
      // l'enregistrement a échoué — l'admin croit le changement fait alors que
      // l'appareil garde son vrai statut côté serveur (ex. contrainte SQL du
      // statut "loué" pas encore appliquée en prod).
      loadStock();
    }
  })();
}
function editAppareilReference(id, current){
  promptAction({title:'Référence produit', label:'Ex. RWAC10KA+ ou numéro de série', value:current, placeholder:'RWAC10KA+'}, async (reference) => {
    try{
      const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, reference})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadStock();
      showToast('Référence mise à jour', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}

// ── RÉSERVATIONS ──────────────────────────────────────────────────────────────

// Nombre de nuits + urgence relative à côté des dates — évite le calcul mental
// pour prioriser d'un coup d'œil parmi une longue liste.
function nightsLabel(dateDebut, dateFin){
  const nights = Math.round((new Date(dateFin+'T00:00:00') - new Date(dateDebut+'T00:00:00')) / 86400000);
  return nights>0 ? `${nights} nuit${nights>1?'s':''}` : '';
}
function relLabel(dateDebut){
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((new Date(dateDebut+'T00:00:00') - today) / 86400000);
  if(diffDays===0) return "aujourd'hui";
  if(diffDays===1) return 'demain';
  if(diffDays===-1) return 'hier';
  if(diffDays>1 && diffDays<=13) return `dans ${diffDays} j`;
  if(diffDays>13) return `dans ${Math.round(diffDays/7)} sem.`;
  if(diffDays<-1) return `il y a ${Math.abs(diffDays)} j`;
  return "aujourd'hui";
}
// Livraison aujourd'hui ou demain = à traiter en priorité, mérite d'être en rouge
// plutôt que dans le même or discret que le reste des dates à venir.
function isUrgent(dateDebut){
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((new Date(dateDebut+'T00:00:00') - today) / 86400000);
  return diffDays>=0 && diffDays<=1;
}
// MANUEL-xxx/PROLONG-xxx sont des identifiants techniques générés en interne,
// jamais vus par le client — aucun intérêt à les afficher. LOC-xxx est le vrai
// numéro de commande envoyé au client dans son email de confirmation, utile si
// un client rappelle en le citant.
function isInternalRef(ref){
  return !ref || /^(MANUEL|PROLONG)-/.test(ref);
}
// Qui s'occupe de la livraison / récupération d'une réservation — lit le
// cache Livraisons déjà chargé (LIVRAISONS_CACHE), quelle que soit la
// dernière page qui l'a alimenté (Livraisons, Réservations ou Calendrier
// le rafraîchissent tous désormais). Vide tant que rien n'a encore chargé
// de missions dans cette session.
function agentLineHtml(resId){
  const missions = (typeof LIVRAISONS_CACHE!=='undefined' ? LIVRAISONS_CACHE : [])
    .filter(m => m.reservation && m.reservation.id===resId && m.statut!=='annule' && !m.masquee);
  if(!missions.length) return '';
  const liv = missions.find(m => m.type==='livraison');
  const rec = missions.find(m => m.type==='recuperation');
  const parts = [];
  if(liv) parts.push(`📦 Livraison : ${liv.transporteur?escHtml(liv.transporteur.nom):'<span style="color:var(--red);font-weight:700">Non assigné</span>'}`);
  if(rec) parts.push(`🔄 Récupération : ${rec.transporteur?escHtml(rec.transporteur.nom):'<span style="color:var(--red);font-weight:700">Non assigné</span>'}`);
  return parts.length ? `<div class="row-meta" style="margin-top:4px">${parts.join(' · ')}</div>` : '';
}

        ${readOnly ? '' : `<div class="row-actions"><button class="btn btn-grey" onclick="restoreReservation(${res.id})">Restaurer</button></div>`}

    <div class="row-item">

        <span class="row-title">${nom}${entrepriseTag}</span>

      </div>
      ${res.hors_zone?`<div class="resa-sub" style="color:var(--red);font-weight:700">⚠️ Hors zone — affectation manuelle requise</div>`:''}
      ${res.source==='site_prolongation'?`<div class="resa-sub" style="color:var(--blue);font-weight:700">🔄 Location prolongée</div>`:''}
      <div class="resa-addr">📍 ${escHtml(res.adresse||'—')}</div>
      ${(res.etage||res.ascenseur||res.fenetre||res.fenetre_photo_path)?`<div class="resa-sub">${[res.etage?'🏢 Étage '+escHtml(res.etage):'',res.ascenseur&&res.ascenseur!=='—'?'Ascenseur : '+escHtml(res.ascenseur):'',res.fenetre?'🪟 '+escHtml(res.fenetre):''].filter(Boolean).join(' · ')}${res.fenetre_photo_path?` <button class="btn btn-grey" style="padding:2px 8px;font-size:11px;vertical-align:middle" onclick="openFenetrePhoto(${res.id})">📷 Photo</button>`:''}</div>`:''}
      ${res.instructions_acces?`<div class="resa-sub" style="color:var(--amber);font-weight:700">📌 ${escHtml(res.instructions_acces)}</div>`:''}
      ${(res.type_client==='entreprise' && res.siret)?`<div class="resa-sub">SIRET : ${escHtml(res.siret)}</div>`:''}
      <div class="resa-dates">
        <span class="resa-date-range">📅 ${frDate(res.date_debut)} → ${frDate(res.date_fin)}</span>
        <span class="resa-rel ${isUrgent(res.date_debut)?'urgent':''}">${nightsLabel(res.date_debut,res.date_fin)} · ${relLabel(res.date_debut)}</span>
      </div>
      <div class="resa-bottom">
        <span class="resa-price">${euros(res.prix_total_cents)}</span>
        <span class="resa-sub">${res.quantite}x${isInternalRef(res.ref)?'':' · '+escHtml(res.ref)}${res.creneau?' · Créneau : '+escHtml(res.creneau):''}</span>

      ${res.statut==='confirmee' ? agentLineHtml(res.id) : ''}
      ${readOnly ? '' : `
      <div class="row-actions">
        ${contactButtonsHtml(res.tel)}
        ${res.statut!=='annulee'?`<button class="btn btn-red" onclick="cancelReservation(${res.id})">Annuler</button>`:''}
        <select aria-label="Changer le statut" onchange="updateReservationStatut(${res.id}, this.value, this)">
          <option value="">Changer statut…</option>
          ${STATUTS_RESA.map(s=>`<option value="${s}" ${s===res.statut?'selected':''}>${RESA_LABEL[s]}</option>`).join('')}
        </select>
        <button class="btn btn-grey" onclick="deleteReservation(${res.id}, '${res.statut}')">Supprimer</button>
      </div>`}
    </div>`;
}
async function loadReservations(){
  const zone = document.getElementById('tab-reservations');
  zone.innerHTML = loading();
  try{
    const [r, lr] = await Promise.all([
      fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
    ]);
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    RESERVATIONS_CACHE = d.reservations || [];
    // Alimente aussi LIVRAISONS_CACHE (partagé avec l'onglet Livraisons) pour
    // pouvoir afficher qui est assigné à chaque réservation ici.
    const ld = await lr.json().catch(()=>null);
    if(ld) LIVRAISONS_CACHE = ld.livraisons || [];
    renderReservationsToolbar();
    renderReservations();
  }catch(e){
    zone.innerHTML = '<p class="empty">Erreur de chargement. Réessaie.</p>';
  }
}

// Vue calendrier — mêmes données que la liste (RESERVATIONS_CACHE), groupées
// par semaine avec le CA de chaque semaine. Fusionnée ici plutôt que dans un
// onglet séparé : c'était littéralement la même information, juste triée
// autrement, ça ne mérite pas sa propre entrée dans le menu.
function renderReservationsCalendrier(){
  const el = document.getElementById('resa-calendrier-content');
  if(!el) return;
  const resas = RESERVATIONS_CACHE.filter(res => res.statut!=='annulee' && !res.masquee);
  if(!resas.length){ el.innerHTML = '<p class="empty">📅 Aucune réservation à venir.</p>'; return; }
  const sorted = [...resas].sort((a,b) => a.date_debut.localeCompare(b.date_debut));
  const weeks = {};
  sorted.forEach(res => {
    const key = mondayOf(res.date_debut).toISOString().slice(0,10);
    (weeks[key] = weeks[key] || []).push(res);
  });
  const weekKeys = Object.keys(weeks).sort();
  el.innerHTML = weekKeys.map(key => {
    const items = weeks[key];
    const caSemaine = items.filter(r=>r.statut==='confirmee').reduce((s,r)=>s+(r.prix_total_cents||0),0);
    return `
      <div class="week-header">
        <span class="wk-label">${weekRangeLabel(new Date(key+'T00:00:00'))}</span>
        <span class="wk-ca">${euros(caSemaine)} de CA</span>
      </div>
      ${items.map(res => reservationRowHtml(res, true)).join('')}`;
  }).join('');
}
function renderReservations(){
  const list = document.getElementById('resa-list');
  if(!list) return;
  const q = (document.getElementById('resa-search')?.value || '').trim().toLowerCase();
  let items = RESERVATIONS_CACHE.filter(r => RESERVATIONS_SHOW_MASQUEES ? r.masquee : !r.masquee);
  if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER === 'prolongation') items = items.filter(r => r.source === 'site_prolongation');
  else if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER === 'hors_zone') items = items.filter(r => r.hors_zone);
  // "Toutes" = réservations actives (en attente + confirmées) — une fois
  // annulée ou terminée, une réservation n'attend plus rien de l'admin au
  // jour le jour, elle se range dans son propre filtre (déjà présent en
  // dessous) plutôt que de noyer celles qui restent à suivre.
  else if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER === 'toutes') items = items.filter(r => !['annulee','terminee'].includes(r.statut));
  else if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER !== 'toutes') items = items.filter(r => r.statut === RESERVATIONS_FILTER);
  if(q){
    items = items.filter(r => [r.ref, r.prenom, r.nom, r.adresse, r.tel].filter(Boolean).join(' ').toLowerCase().includes(q));
  }
  list.innerHTML = items.map(r => reservationRowHtml(r)).join('') || `<p class="empty">🧾 ${RESERVATIONS_SHOW_MASQUEES?'Aucune réservation supprimée.':'Aucune réservation pour l\'instant.'}</p>`;
}

async function createReservation(){
  const submitBtn = document.getElementById('nr-submit');
  if(submitBtn && submitBtn.disabled) return;
  const errEl = document.getElementById('new-resa-err');
  errEl.style.display = 'none';
  const body = {
    action: 'create',
    prenom: document.getElementById('nr-prenom').value.trim(),
    nom: document.getElementById('nr-nom').value.trim(),
    tel: document.getElementById('nr-tel').value.trim(),
    tel_secondaire: document.getElementById('nr-tel2').value.trim(),
    email: document.getElementById('nr-email').value.trim(),
    adresse: document.getElementById('nr-adresse').value.trim(),
    date_debut: document.getElementById('nr-debut').value,
    date_fin: document.getElementById('nr-fin').value,
    quantite: document.getElementById('nr-qte').value,
    prix_total_cents: Math.round((parseFloat(document.getElementById('nr-prix').value)||0)*100),
    ...typeClientPayload('nr'),
    ...logisticsPayload('nr'),
  };
  if(!body.prenom || !body.nom || !body.adresse || !body.date_debut || !body.date_fin){
    errEl.textContent = 'Prénom, nom, adresse et dates sont obligatoires.';
    errEl.style.display = 'block';
    return;
  }
  await submitReservation(body, submitBtn, errEl);
}
async function submitReservation(body, submitBtn, errEl){
  // Verrou anti-double-clic : une réservation manuelle engage un vrai paiement
  // et un vrai appareil — un double-clic (ou un clic pendant que la requête
  // précédente est encore en cours) ne doit jamais créer deux réservations.
  if(submitBtn) submitBtn.disabled = true;
  try{
    const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok){
      if(d.duplicate){
        confirmAction(d.error, () => { body.force = true; submitReservation(body, submitBtn, errEl); }, {danger:true, yesLabel:'Créer quand même'});
        return;
      }
      throw new Error(d.error||'Erreur');
    }
    if(d.reservation){
      RESERVATIONS_CACHE.unshift(d.reservation);
      renderReservationsToolbar();
    } else {
      loadReservations();
    }
    document.getElementById('new-resa-form').classList.add('hidden');
    ['nr-prenom','nr-nom','nr-tel','nr-tel2','nr-email','nr-adresse','nr-debut','nr-fin','nr-prix','nr-etage','nr-instructions'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    const qteEl = document.getElementById('nr-qte'); if(qteEl) qteEl.value = '1';
    ['nr-asc','nr-fenetre','nr-installation'].forEach(id => { const el = document.getElementById(id); if(el) el.selectedIndex = 0; });
    resetTypeClientFields('nr');
    showToast(`Réservation ${d.ref} créée et confirmée`, 'success');
  }catch(e){
    errEl.textContent = e.message; errEl.style.display = 'block';
  }finally{
    if(submitBtn) submitBtn.disabled = false;
  }
}
function cancelReservation(id){
  confirmAction('Annuler cette réservation ? Cette action libère le stock associé et annule ses missions non terminées.', async () => {
    const res = RESERVATIONS_CACHE.find(r => r.id===id);
    const prev = res?.statut;
    if(res){ res.statut = 'annulee'; renderReservations(); }
    try{
      const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, statut:'annulee'})});
      if(!r.ok) throw new Error((await r.json()).error||'Erreur');
      loadAlerts();
      showToast('Réservation annulée', 'success');
    }catch(e){
      if(res){ res.statut = prev; renderReservations(); }
      showToast(e.message, 'error');
    }
  }, {danger:true, yesLabel:'Annuler la réservation'});
}
function updateReservationStatut(id, statut, selectEl){
  if(!statut) return;
  confirmAction(
    `Passer cette réservation au statut "${RESA_LABEL[statut]||statut}" ?`,
    () => doUpdateReservationStatut(id, statut),
    { onCancel: () => { if(selectEl) selectEl.value = ''; } }
  );
}
async function doUpdateReservationStatut(id, statut){
  const res = RESERVATIONS_CACHE.find(r => r.id===id);
  const prev = res?.statut;
  if(res){ res.statut = statut; renderReservations(); }
  try{
    const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, statut})});
    if(!r.ok) throw new Error((await r.json()).error||'Erreur');
    loadAlerts();
    showToast('Statut mis à jour', 'success');
  }catch(e){
    if(res){ res.statut = prev; renderReservations(); }
    showToast(e.message, 'error');
  }
}
function deleteReservation(id, statut){
  const warn = (statut==='confirmee'||statut==='en_attente')
    ? " Cette réservation est encore active — la retirer de l'écran ne l'annule pas et ne libère pas le stock, elle disparaît juste de cette liste (et de l'onglet Livraisons)."
    : " Elle disparaît de cette liste (et de l'onglet Livraisons) — récupérable via \"Afficher les réservations supprimées\" en bas de page.";
  confirmAction(`Supprimer cette réservation de l'écran ?${warn}`, async () => {
    try{
      const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, masquee:true})});
      if(!r.ok) throw new Error((await r.json()).error||'Erreur');
      const res = RESERVATIONS_CACHE.find(x => x.id===id);
      if(res) res.masquee = true;
      renderReservationsToolbar();
      showToast('Réservation supprimée de l\'écran', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  }, {danger:true, yesLabel:'Supprimer de l\'écran'});
}
async function restoreReservation(id){
  try{
    const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, masquee:false})});
    if(!r.ok) throw new Error((await r.json()).error||'Erreur');
    const res = RESERVATIONS_CACHE.find(x => x.id===id);
    if(res) res.masquee = false;
    renderReservationsToolbar();
    showToast('Réservation restaurée', 'success');
  }catch(e){ showToast(e.message, 'error'); }
}

// Helpers de regroupement par semaine, utilisés par la vue Calendrier fusionnée
// dans l'onglet Réservations (voir renderReservationsCalendrier plus haut).
function mondayOf(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = (d.getDay()+6)%7; // 0=lundi
  d.setDate(d.getDate()-day);
  return d;
}
function weekRangeLabel(monday){
  const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
  const fmt = dt => dt.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
  return `Semaine du ${fmt(monday)} au ${fmt(sunday)}`;
}

// Historique complet (pas seulement les missions en cours) pour qu'un manager
// puisse retrouver n'importe quelle mission passée et revoir ses preuves.
let TRANSPORTEURS_CACHE = [];
let LIVRAISONS_CACHE = [];
let LIVRAISONS_FILTER = 'toutes';
let LIVRAISONS_SHOW_MASQUEES = false;

async function loadLivraisons(){
  const zone = document.getElementById('tab-livraisons');
  zone.innerHTML = loading();
  try{
    const [lr, tr] = await Promise.all([
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
