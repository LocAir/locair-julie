// ── CLIENTS ───────────────────────────────────────────────────────────────────
// Fiche persistante par client (déduplication par téléphone) — jusqu'ici
// chaque réservation était une île isolée, aucune mémoire d'une fois sur
// l'autre. La note "accès difficile" (digicode, étage, parking...) est
// rattachée au client, pas à une réservation ni à un appareil, pour profiter
// à toute visite future — jamais un blocage, juste une info.
let CLIENTS_CACHE = [];
async function loadClients(){
  const zone = document.getElementById('tab-clients');
  zone.innerHTML = loading();
  try{
    const r = await fetch(API('admin-clients'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    CLIENTS_CACHE = d.clients || [];
    renderClients();
  }catch(e){
    zone.innerHTML = '<p class="empty">Erreur de chargement. Réessaie.</p>';
  }
}
function renderClients(){
  const zone = document.getElementById('tab-clients');
  const q = (document.getElementById('cli-search')?.value || '').trim().toLowerCase();
  let items = CLIENTS_CACHE;
  if(q){
    items = items.filter(c => [c.prenom,c.nom,c.tel,c.email].filter(Boolean).join(' ').toLowerCase().includes(q));
  }
  const list = items.map(c => `
    <div class="row-item">
      <div class="row-top">
        <span class="row-title">${escHtml((c.prenom||'')+' '+(c.nom||''))}${c.raison_sociale?` <span class="chip a_faire">🏢 ${escHtml(c.raison_sociale)}</span>`:''}</span>
        <span class="chip inactif">${c.nb_reservations} réservation${c.nb_reservations>1?'s':''}</span>
      </div>
      <div class="row-meta">${escHtml(c.tel||'—')}${c.email?' · '+escHtml(c.email):''}${c.tel_secondaire?' · ☎️ Secours : '+escHtml(c.tel_secondaire):''}${c.siret?' · SIRET : '+escHtml(c.siret):''}${c.derniere_adresse?'<br/>Dernière adresse : '+escHtml(c.derniere_adresse):''}</div>
      ${c.acces_difficile?`<div class="row-meta" style="color:var(--blue);font-weight:700;margin-top:6px">📌 ${escHtml(c.acces_difficile)}</div>`:''}
      <div class="row-actions">
        ${contactButtonsHtml(c.tel)}
        <button class="btn btn-grey" onclick="editAccesDifficile(${c.id}, '${(c.acces_difficile||'').replace(/'/g,"\\'")}')">${c.acces_difficile?'Modifier':'Ajouter'} une note d'accès</button>
        <button class="btn btn-blue" onclick="openClientFiche(${c.id})">👤 Fiche client</button>
      </div>
    </div>`).join('') || '<p class="empty">👤 Aucun client pour l\'instant.</p>';
  zone.innerHTML = `
    <button class="btn btn-grey btn-block" style="margin-bottom:12px" onclick="exportClientsCsv()">⬇️ Exporter en CSV</button>
    <input type="text" id="cli-search" placeholder="🔎 Rechercher un client, un téléphone…" oninput="renderClients()" value="${escHtml(document.getElementById('cli-search')?.value||'')}"/>
    ${list}`;
}
function exportClientsCsv(){
  if(!CLIENTS_CACHE.length){ showToast('Aucun client à exporter', 'error'); return; }
  downloadCsv(`clients-${new Date().toISOString().slice(0,10)}.csv`, CLIENTS_CACHE, [
    {label:'Prénom', value:'prenom'},
    {label:'Nom', value:'nom'},
    {label:'Entreprise', value:'raison_sociale'},
    {label:'SIRET', value:'siret'},
    {label:'Téléphone', value:'tel'},
    {label:'Téléphone secours', value:'tel_secondaire'},
    {label:'Email', value:'email'},
    {label:'Réservations', value:'nb_reservations'},
    {label:'Dernière adresse', value:'derniere_adresse'},
    {label:'Note d\'accès', value:'acces_difficile'},
  ]);
}
function editAccesDifficile(id, current){
  promptAction({
    title: "Note d'accès",
    label: 'Digicode, étage sans ascenseur, parking impossible… (visible par l\'admin et le livreur, jamais bloquant)',
    value: current, placeholder: 'Ex : digicode 4B12, sonner fort',
  }, async (value) => {
    try{
      const r = await fetch(API('admin-clients'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, acces_difficile:value})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadClients();
      showToast('Note mise à jour', 'success');
    }catch(e){ showToast(`Note non enregistrée : ${e.message}`, 'error'); }
  });
}
// ── FICHE CLIENT (suivi en direct + édition) ────────────────────────────────
// Vue détaillée d'un client : avancement en direct de sa mission active
// (étape par étape), photos au fur et à mesure, incidents liés — sécurité et
// traçabilité en cas de litige. L'admin reste un observateur passif (pas de
// bureau, le transporteur est autonome) : cette vue affiche, elle n'agit
// jamais sur le transporteur. Polling 8s sur le modèle de openLiveMap/
// refreshLivePosition (admin/index.html) — overlay indépendant de
// #modal-overlay-el pour que isUserBusy() ne mette pas en pause le suivi
// juste quand la fiche est ouverte.
let CLIENT_FICHE_ID = null;
let CLIENT_FICHE_POLL = null;
let CLIENT_FICHE_DATA = null;
let CLIENT_COMMS_DATA = null;
const CANAL_ICON = { email: '📧', sms: '📱' };

const MISSION_STEP_LABEL = {
  accepted_at: 'Acceptée', depart_at: 'En route', client_notifie_at: 'Client notifié', arrivee_at: 'Arrivée sur place',
  demo_faite_at: 'Démonstration faite', vidange_at: 'Vidange vérifiée', fait_at: 'Terminée',
};

function closeClientFiche(){
  if(CLIENT_FICHE_POLL) clearInterval(CLIENT_FICHE_POLL);
  CLIENT_FICHE_POLL = null;
  CLIENT_FICHE_ID = null;
  CLIENT_FICHE_DATA = null;
  CLIENT_COMMS_DATA = null;
  const o = document.getElementById('client-fiche-overlay');
  if(o) o.remove();
}

async function openClientFiche(clientId){
  closeClientFiche();
  CLIENT_FICHE_ID = clientId;
  const overlay = document.createElement('div');
  overlay.className = 'map-overlay';
  overlay.id = 'client-fiche-overlay';
  overlay.innerHTML = `
    <div class="map-modal" style="max-width:640px;max-height:88vh;overflow-y:auto">
      <div class="map-modal-head"><h2>Fiche client</h2><button onclick="closeClientFiche()">✕</button></div>
      <div id="client-fiche-body" style="padding:0 20px 20px"><p class="empty">Chargement…</p></div>
      <div id="client-comms-body" style="padding:0 20px 20px"><p class="empty">Chargement…</p></div>
    </div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeClientFiche(); });
  document.body.appendChild(overlay);
  // Communications chargées une fois à l'ouverture, pas dans le polling 8s
  // de la mission en cours — l'historique/le planning email ne change pas
  // assez vite pour justifier un rafraîchissement automatique.
  await Promise.all([loadClientFiche(), loadClientCommunications()]);
  CLIENT_FICHE_POLL = setInterval(loadClientFiche, 8000);
}

async function loadClientFiche(){
  const body = document.getElementById('client-fiche-body');
  if(!body || !CLIENT_FICHE_ID) return; // fiche fermée entre-temps
  try{
    const r = await fetch(API('admin-clients'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'fiche', id:CLIENT_FICHE_ID})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    CLIENT_FICHE_DATA = d;
    renderClientFiche(d);
  }catch(e){
    body.innerHTML = `<p class="empty">${escHtml(e.message)}</p>`;
  }
}

function missionStepsHtml(m){
  const steps = [
    ['accepted_at', m.accepted_at], ['depart_at', m.depart_at], ['client_notifie_at', m.client_notifie_at], ['arrivee_at', m.arrivee_at],
    (m.type==='livraison' ? ['demo_faite_at', m.demo_faite_at] : ['vidange_at', m.vidange_at]),
    ['fait_at', m.fait_at],
  ];
  return `<div style="margin-top:8px;font-size:13px">
    ${steps.map(([key, at]) => `<div style="display:flex;justify-content:space-between;gap:8px;padding:3px 0;color:${at?'var(--black)':'var(--grey2)'}">
      <span>${at?'✅':'⬜️'} ${MISSION_STEP_LABEL[key]}</span>${at?`<span style="color:var(--grey)">${frDateHeure(at)}</span>`:''}
    </div>`).join('')}
  </div>`;
}

function missionPhotosHtml(m){
  const KINDS = [['photo_depart_ok','photo_depart'],['photo_installation_ok','photo_installation'],['photo_retour_ok','photo_retour'],['photo_absence_ok','photo_absence']];
  const buttons = KINDS.filter(([flag]) => m[flag]).map(([,kind]) => `<button class="btn btn-grey" onclick="viewMedia(${m.id},'${kind}')">${MEDIA_KIND_LABEL[kind]||kind}</button>`).join('');
  return buttons ? `<div class="row-actions" style="margin-top:8px">${buttons}</div>` : '';
}

function renderClientFiche(d){
  const body = document.getElementById('client-fiche-body');
  if(!body) return;
  const c = d.client;
  const head = document.querySelector('#client-fiche-overlay .map-modal-head h2');
  if(head) head.textContent = `👤 ${((c.prenom||'')+' '+(c.nom||'')).trim() || 'Client'}`;

  const missionsHtml = (d.missions_actives||[]).length
    ? d.missions_actives.map(m => `
      <div class="card" style="margin-bottom:12px;padding:14px 16px">
        <div class="row-top">
          <span class="row-title">${m.type==='livraison'?'📦 Livraison':m.type==='recuperation'?'🔄 Récupération':'📍 '+(m.type||'Mission')}</span>
          <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
        </div>
        <div class="row-meta">${frDate(m.date_prevue)}${m.creneau?' · '+escHtml(m.creneau):''}</div>
        ${missionStepsHtml(m)}
        ${m.statut==='probleme' ? `<div class="row-meta" style="color:var(--red);font-weight:700;margin-top:8px">⚠️ Problème : ${escHtml(m.probleme_description||m.probleme_type||'')}</div>` : ''}
        ${missionPhotosHtml(m)}
      </div>`).join('')
    : '<p class="empty">Aucune mission en cours actuellement.</p>';

  const incidentsHtml = (d.incidents||[]).length
    ? d.incidents.map(i => `
      <div class="row-item">
        <div class="row-top">
          <span class="row-title">${INCIDENT_TYPE_LABEL[i.type]||i.type}</span>
          <span class="chip ${INCIDENT_CHIP[i.statut]||''}">${INCIDENT_STATUT_LABEL[i.statut]||i.statut}</span>
        </div>
        <div class="row-meta">${new Date(i.created_at).toLocaleString('fr-FR',{dateStyle:'medium',timeStyle:'short'})}${i.transporteur?.nom?' · 🚚 '+escHtml(i.transporteur.nom):''}${i.description?' · '+escHtml(i.description):''}${i.montant_facture_cents?' · '+euros(i.montant_facture_cents):''}</div>
        ${incidentActionsHtml(i).replace(/updateIncidentStatut\(/g,'updateIncidentStatutInFiche(')}
      </div>`).join('')
    : '<p class="empty">Aucun incident enregistré pour ce client.</p>';

  const latestResa = (d.reservations||[])[0] || null;

  body.innerHTML = `
    <div class="row-meta" style="margin-top:4px">
      ${escHtml(c.tel||'—')}${c.email?' · '+escHtml(c.email):''}
      ${latestResa?.adresse?'<br/>'+escHtml(latestResa.adresse):''}
      ${latestResa?.instructions_acces?'<br/>📌 '+escHtml(latestResa.instructions_acces):''}
    </div>
    ${c.acces_difficile?`<div class="row-meta" style="color:var(--blue);font-weight:700;margin-top:6px">📌 ${escHtml(c.acces_difficile)}</div>`:''}
    <div class="row-actions" style="margin-top:10px">
      <button class="btn btn-grey" onclick="openEditClientFicheModal()">✏️ Modifier la fiche</button>
    </div>

    <div class="section-title" style="margin-top:18px">🔴 Mission en cours (mise à jour toutes les 8s)</div>
    ${missionsHtml}

    <div class="section-title" style="margin-top:18px">🧯 Incidents</div>
    ${incidentsHtml}
  `;
}

async function updateIncidentStatutInFiche(id, statut, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-incidents'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, statut})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadClientFiche();
    showToast('Incident mis à jour', 'success');
  }catch(e){
    if(btnEl) btnEl.disabled = false;
    showToast(e.message, 'error');
  }
}

// ── Communications (panneau emails/SMS de la fiche client) ──────────────────
async function loadClientCommunications(){
  const zone = document.getElementById('client-comms-body');
  if(!zone || !CLIENT_FICHE_ID) return; // fiche fermée entre-temps
  try{
    const r = await fetch(API('admin-emails'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'client_timeline', client_id:CLIENT_FICHE_ID})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    CLIENT_COMMS_DATA = d;
    renderClientCommunications(d);
  }catch(e){
    zone.innerHTML = `<p class="empty">${escHtml(e.message)}</p>`;
  }
}

function renderClientCommunications(d){
  const zone = document.getElementById('client-comms-body');
  if(!zone) return;

  const upcomingHtml = (d.upcoming||[]).length
    ? d.upcoming.map(u => {
        const statutChip = !u.actif_globalement
          ? `<span class="chip inactif">Désactivé pour tous les clients</span>`
          : u.skip
            ? `<span class="chip ${u.skip==='pause'?'en_attente':'annulee'}">${u.skip==='pause'?'En pause':'Supprimé'}</span>`
            : `<span class="chip a_faire">Prévu</span>`;
        const actionsHtml = !u.actif_globalement ? '' : u.skip
          ? `<div class="row-actions"><button class="btn btn-green" onclick="unskipClientEmail(${u.reservation_id},'${u.scenario}',this)">▶️ Reprendre</button></div>`
          : `<div class="row-actions">
               <button class="btn btn-blue" onclick="sendClientEmailNow(${u.reservation_id},'${u.scenario}',this)">✉️ Envoyer maintenant</button>
               <button class="btn btn-grey" onclick="skipClientEmail(${u.reservation_id},'${u.scenario}','pause',this)">⏸️ Mettre en pause</button>
               <button class="btn btn-red" onclick="skipClientEmail(${u.reservation_id},'${u.scenario}','suppression',this)">🗑️ Supprimer</button>
             </div>`;
        return `
        <div class="row-item">
          <div class="row-top">
            <span class="row-title">📧 ${escHtml(u.libelle)}</span>
            ${statutChip}
          </div>
          <div class="row-meta">${frDate(u.date)}${u.ref?' · '+escHtml(u.ref):''}</div>
          ${actionsHtml}
        </div>`;
      }).join('')
    : '<p class="empty">Aucun envoi programmé à venir.</p>';

  const sentHtml = (d.sent||[]).length
    ? d.sent.map(e => `
      <div class="row-item">
        <div class="row-top">
          <span class="row-title">${CANAL_ICON[e.canal]||'📧'} ${escHtml(e.libelle)}</span>
          <span class="chip ${e.statut==='envoye'?'fait':'probleme'}">${e.statut==='envoye'?'Envoyé':'Erreur'}</span>
        </div>
        <div class="row-meta">${new Date(e.created_at).toLocaleString('fr-FR',{dateStyle:'medium',timeStyle:'short'})}${e.ref?' · '+escHtml(e.ref):''}${e.erreur?' · '+escHtml(e.erreur):''}</div>
        <div class="row-actions">
          <button class="btn btn-grey" onclick="viewCommunicationContent(${e.id},this)">👁️ Aperçu</button>
          ${e.reservation_id?`<button class="btn btn-blue" onclick="sendClientEmailNow(${e.reservation_id},'${e.scenario}',this)">✉️ Renvoyer</button>`:''}
        </div>
      </div>`).join('')
    : '<p class="empty">Aucun envoi enregistré pour l\'instant.</p>';

  // Emails "événementiels" (confirmation, post-installation, fin de
  // location) : déclenchés par le code métier, pas par une date — n'existent
  // ni dans "à venir" ni dans "envoyées" tant qu'ils n'ont jamais réellement
  // été tentés. Ex. : mail de confirmation jamais parti (email manquant au
  // moment du paiement, erreur avalée) — sans cette section, rien ne permet
  // de le voir ni de le rattraper depuis la fiche.
  const evenementielsHtml = (d.evenementiels||[]).length
    ? d.evenementiels.map(u => {
        const statutChip = !u.actif_globalement
          ? `<span class="chip inactif">Désactivé pour tous les clients</span>`
          : u.skip
            ? `<span class="chip ${u.skip==='pause'?'en_attente':'annulee'}">${u.skip==='pause'?'En pause':'Supprimé'}</span>`
            : `<span class="chip a_faire">Jamais envoyé</span>`;
        const actionsHtml = !u.actif_globalement ? '' : u.skip
          ? `<button class="btn btn-green" onclick="unskipClientEmail(${u.reservation_id},'${u.scenario}',this)">▶️ Reprendre</button>`
          : `<button class="btn btn-blue" onclick="sendClientEmailNow(${u.reservation_id},'${u.scenario}',this)">✉️ Envoyer maintenant</button>`;
        return `
        <div class="row-item">
          <div class="row-top">
            <span class="row-title">📧 ${escHtml(u.libelle)}</span>
            ${statutChip}
          </div>
          <div class="row-meta">${u.ref?escHtml(u.ref):''}</div>
          <div class="row-actions">${actionsHtml}</div>
        </div>`;
      }).join('')
    : '';

  zone.innerHTML = `
    <div class="section-title">📧 Communications — à venir</div>
    ${upcomingHtml}
    ${evenementielsHtml ? `<div class="section-title" style="margin-top:18px">✉️ Emails ponctuels (confirmation, installation, fin de location)</div>${evenementielsHtml}` : ''}
    <div class="section-title" style="margin-top:18px">📬 Communications — envoyées</div>
    ${sentHtml}
  `;
}
// Envoi manuel immédiat d'un scénario (bypass "jamais deux fois", voir
// action 'resend' de admin-emails.js) — utilisé pour rattraper un envoi
// événementiel jamais parti (ex. confirmation) ou renvoyer un email déjà
// envoyé (client qui l'a perdu). Respecte toujours le scénario
// désactivé/mis en pause pour ce client.
async function sendClientEmailNow(reservationId, scenario, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-emails'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'resend', reservation_id:reservationId, scenario})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadClientCommunications();
    showToast('Email envoyé', 'success');
  }catch(e){
    if(btnEl) btnEl.disabled = false;
    showToast(e.message, 'error');
  }
}

// action: 'pause' (réversible, l'envoi reste visible avec un bouton
// Reprendre) ou 'suppression' (même mécanisme de blocage, juste présenté
// comme définitif) — voir email_skip et wasScenarioSkipped() dans
// api/_lib/emailEngine.js. Ne touche jamais aux autres scénarios/réservations.
async function skipClientEmail(reservationId, scenario, skipAction, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-emails'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'skip', reservation_id:reservationId, scenario, skip_action:skipAction})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadClientCommunications();
    showToast(skipAction==='pause' ? 'Envoi mis en pause' : 'Envoi supprimé', 'success');
  }catch(e){
    if(btnEl) btnEl.disabled = false;
    showToast(e.message, 'error');
  }
}
async function unskipClientEmail(reservationId, scenario, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-emails'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'unskip', reservation_id:reservationId, scenario})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadClientCommunications();
    showToast('Envoi repris', 'success');
  }catch(e){
    if(btnEl) btnEl.disabled = false;
    showToast(e.message, 'error');
  }
}

// Ouvre le contenu exact envoyé (email ou SMS) dans un vrai nouvel onglet —
// pas une pop-up in-page — via un Blob, pour un aperçu fidèle même si le
// modèle a changé depuis (voir contenu sauvegardé dans email_log).
async function viewCommunicationContent(id, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-emails'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'content', id})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    const isHtml = d.canal !== 'sms';
    const blob = new Blob([isHtml ? d.contenu : `<!DOCTYPE html><html><head><meta charset="utf-8"><title>SMS</title></head><body style="font-family:Arial,sans-serif;white-space:pre-wrap;max-width:480px;margin:40px auto;padding:0 16px">${escHtml(d.contenu)}</body></html>`], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  }catch(e){
    showToast(e.message, 'error');
  }finally{
    if(btnEl) btnEl.disabled = false;
  }
}

// Édition complète de la fiche : les champs client (prenom/nom/tel/email)
// vivent sur `clients`, mais adresse/instructions de livraison n'existent
// que par réservation (un client peut en avoir plusieurs dans le temps) —
// l'édition cible donc la réservation la plus récente, comme la dérivation
// en lecture seule "dernière adresse" déjà utilisée dans la liste Clients.
function openEditClientFicheModal(){
  if(!CLIENT_FICHE_DATA) return;
  const c = CLIENT_FICHE_DATA.client;
  const latestResa = (CLIENT_FICHE_DATA.reservations||[])[0] || null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:420px;max-height:85vh;overflow-y:auto">
      <h2 style="margin-bottom:14px">✏️ Modifier la fiche client</h2>
      <label for="ecf-prenom">Prénom</label>
      <input type="text" id="ecf-prenom" value="${escHtml(c.prenom||'')}"/>
      <label for="ecf-nom" style="margin-top:8px">Nom</label>
      <input type="text" id="ecf-nom" value="${escHtml(c.nom||'')}"/>
      <label for="ecf-tel" style="margin-top:8px">Téléphone</label>
      <input type="tel" id="ecf-tel" value="${escHtml(c.tel||'')}"/>
      <label for="ecf-email" style="margin-top:8px">Email</label>
      <input type="email" id="ecf-email" value="${escHtml(c.email||'')}"/>
      ${latestResa ? `
        <label for="ecf-adresse" style="margin-top:8px">Adresse (dernière réservation)</label>
        <input type="text" id="ecf-adresse" value="${escHtml(latestResa.adresse||'')}"/>
        <div class="inline-form" style="margin-top:8px">
          <div><label for="ecf-etage">Étage</label><input type="text" id="ecf-etage" value="${escHtml(latestResa.etage||'')}"/></div>
          <div><label for="ecf-ascenseur">Ascenseur</label><input type="text" id="ecf-ascenseur" value="${escHtml(latestResa.ascenseur||'')}"/></div>
        </div>
        <label for="ecf-instructions" style="margin-top:8px">Instructions d'accès</label>
        <input type="text" id="ecf-instructions" value="${escHtml(latestResa.instructions_acces||'')}"/>
        <label for="ecf-tel-secours" style="margin-top:8px">Téléphone secours</label>
        <input type="tel" id="ecf-tel-secours" value="${escHtml(latestResa.tel_secondaire||'')}"/>
      ` : '<p class="step-hint" style="margin-top:8px">Aucune réservation pour ce client — pas d\'adresse à modifier pour l\'instant.</p>'}
      <div class="modal-actions" style="margin-top:18px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Enregistrer</button>
      </div>
      <div class="err" id="ecf-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = async () => {
    const errEl = document.getElementById('ecf-err');
    errEl.style.display = 'none';
    okBtn.disabled = true;
    try{
      const r = await fetch(API('admin-clients'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
        action: 'update', id: c.id,
        prenom: document.getElementById('ecf-prenom').value.trim(),
        nom: document.getElementById('ecf-nom').value.trim(),
        tel: document.getElementById('ecf-tel').value.trim(),
        email: document.getElementById('ecf-email').value.trim(),
      })});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');

      if(latestResa){
        const rr = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
          action: 'update', id: latestResa.id,
          adresse: document.getElementById('ecf-adresse').value.trim(),
          etage: document.getElementById('ecf-etage').value.trim(),
          ascenseur: document.getElementById('ecf-ascenseur').value.trim(),
          instructions_acces: document.getElementById('ecf-instructions').value.trim(),
          tel_secondaire: document.getElementById('ecf-tel-secours').value.trim(),
        })});
        const rd = await rr.json();
        if(!rr.ok) throw new Error(rd.error||"Erreur lors de la mise à jour de l'adresse");
      }

      closeModal();
      loadClients();
      loadClientFiche();
      showToast('Fiche client mise à jour', 'success');
    }catch(e){
      okBtn.disabled = false;
      errEl.textContent = e.message; errEl.style.display = 'block';
    }
  };
}

// ── Équipe (Module 7, Partie 31) : comptes nominatifs à côté du mot de passe
// historique partagé — chaque rôle voit uniquement ce dont il a besoin. Onglet

// refuse de toute façon l'accès aux autres rôles, cette page ne fait que ne
// pas leur proposer un bouton qui échouerait.
const ROLE_LABEL = {
  administrateur: '🔑 Administrateur — accès complet',
  operateur:      '📋 Opérateur — commandes, missions, clients',
  comptabilite:   '💶 Comptabilité — paiements, commissions',
  support_client: '🛟 Support client — clients, demandes',
};
let EQUIPE_CACHE = [];
async function loadEquipe(){
  const zone = document.getElementById('tab-equipe');

    EQUIPE_CACHE = d.membres || [];
    renderEquipe();
  }catch(e){
    zone.innerHTML = `<p class="empty">${e.message==='Non autorisé'?'Cette page est réservée au compte administrateur.':'Erreur de chargement. Réessaie.'}</p>`;

function renderEquipe(){
  const zone = document.getElementById('tab-equipe');
  const list = EQUIPE_CACHE.map(u => `
    <div class="row-item">
      <div class="row-top">
        <span class="row-title">${escHtml(u.nom)}</span>

      <div class="row-actions">
        <button class="btn btn-grey" onclick="editEquipeRole(${u.id})">Changer le rôle</button>
        <button class="btn btn-grey" onclick="resetEquipePin(${u.id})">Réinitialiser le code</button>
        <button class="btn ${u.actif?'btn-grey':'btn-green'}" onclick="toggleEquipeActif(${u.id}, ${!u.actif})">${u.actif?'Désactiver':'Réactiver'}</button>
        <button class="btn btn-red" onclick="deleteEquipeMembre(${u.id})">Supprimer</button>
      </div>
    </div>`).join('') || '<p class="empty">🧑‍💼 Personne dans l\'équipe pour l\'instant — le mot de passe partagé reste utilisable en plus.</p>';

      <select id="eq-role">
        ${Object.entries(ROLE_LABEL).filter(([k])=>k!=='administrateur').map(([k,label])=>`<option value="${k}">${label}</option>`).join('')}
      </select>
      <button class="btn btn-blue btn-block" style="margin-top:14px" onclick="addEquipeMembre()">Créer le compte</button>
      <div class="err" id="equipe-err"></div>
    </div>`;
}
async function addEquipeMembre(){
  const nom = document.getElementById('eq-nom').value.trim();
  const role = document.getElementById('eq-role').value;
  const errEl = document.getElementById('equipe-err');
  errEl.style.display='none';
  if(!nom){ errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
  try{
    const r = await fetch(API('admin-team'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'create', nom, role})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadEquipe();
    confirmAction(`Compte créé pour ${nom}. Son code personnel est : ${d.pin}\n\nNote-le maintenant, il ne sera plus jamais affiché en entier.`, ()=>{}, {yesLabel:'Compris'});
  }catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}
function editEquipeRole(id){
  const u = EQUIPE_CACHE.find(x => x.id === id);
  if(!u) return;
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:380px">
      <h2 style="margin-bottom:6px">Rôle de ${escHtml(u.nom)}</h2>
      <select id="eq-role-edit">
        ${Object.entries(ROLE_LABEL).map(([k,label])=>`<option value="${k}" ${k===u.role?'selected':''}>${label}</option>`).join('')}
      </select>
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Enregistrer</button>
      </div>
      <div class="err" id="equipe-role-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = async () => {
    const role = document.getElementById('eq-role-edit').value;
    try{
      const r = await fetch(API('admin-team'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, role})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      closeModal();
      loadEquipe();
      showToast('Rôle mis à jour', 'success');
    }catch(e){
      const errEl = document.getElementById('equipe-role-err');
      errEl.textContent = e.message; errEl.style.display='block';
    }
  };
}
function resetEquipePin(id){
  const u = EQUIPE_CACHE.find(x => x.id === id);
  if(!u) return;
  confirmAction(`Réinitialiser le code personnel de ${u.nom} ? Son ancien code cessera immédiatement de fonctionner.`, async () => {
    // Contrairement à la création, l'action "update" ne génère pas de code
    // toute seule si on ne lui en envoie pas — on en tire un ici et on
    // l'impose au serveur.
    const pin = String(Math.floor(100000 + Math.random()*900000));
    try{
      const r = await fetch(API('admin-team'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, pin})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      confirmAction(`Nouveau code pour ${u.nom} : ${pin}\n\nNote-le maintenant, il ne sera plus jamais affiché en entier.`, ()=>{}, {yesLabel:'Compris'});
    }catch(e){ showToast(`Non enregistré : ${e.message}`, 'error'); }
  });
}
async function toggleEquipeActif(id, actif){
  try{
    const r = await fetch(API('admin-team'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, actif})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadEquipe();
    showToast(actif?'Compte réactivé':'Compte désactivé', 'success');
  }catch(e){ showToast(`Non enregistré : ${e.message}`, 'error'); }
}
function deleteEquipeMembre(id){
  const u = EQUIPE_CACHE.find(x => x.id === id);
  if(!u) return;
  confirmAction(`Supprimer définitivement le compte de ${u.nom} ?`, async () => {
    try{
      const r = await fetch(API('admin-team'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'delete', id})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadEquipe();
      showToast('Compte supprimé', 'success');
    }catch(e){ showToast(`Non supprimé : ${e.message}`, 'error'); }
  }, {danger:true, yesLabel:'Supprimer'});
}

// Envoi direct vers Supabase Storage avec quelques tentatives en cas de
// coupure réseau (fetch qui échoue sans réponse, ex. "Load failed" — fréquent
// sur mobile pour un gros fichier) — ne réessaie jamais une vraie erreur HTTP
// (413 fichier trop lourd, etc.), seulement un échec de connexion.
async function putFileWithRetry(url, file, contentType, attempts){
  attempts = attempts || 3;
  let lastErr;
  for(let i=0; i<attempts; i++){
    try{
      return await fetch(url, {method:'PUT', headers:{'Content-Type': contentType || 'application/octet-stream'}, body: file});
    }catch(e){
      lastErr = e;
      if(i < attempts-1) await new Promise(r => setTimeout(r, 1500));
    }
  }
  throw new Error(`Connexion instable, l'envoi a échoué ${attempts} fois (${lastErr.message}) — réessaie avec un wifi stable si possible.`);
}
// Même flux 2 temps que côté transporteur (demander_upload → PUT direct vers
// Supabase Storage → confirmer_upload) : les octets du fichier ne passent
// jamais par la fonction Vercel.
document.getElementById('tuto-media-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  const videoId = TUTO_PENDING_UPLOAD;
  if(!file || !videoId) return;
  // Un toast disparaît après ~4s (voir showToast) — trop court pour l'envoi
  // d'une vidéo, qui peut prendre plusieurs minutes sur une connexion
  // mobile. Sans indicateur persistant, l'admin croit que "rien ne se
  // passe" alors que l'envoi est peut-être toujours en cours (ou a
  // échoué en silence). Le bouton reste donc désactivé et affiche l'état
  // jusqu'à la fin réelle de l'envoi.
  const btn = document.getElementById(`tuto-upload-btn-${videoId}`);
  const originalLabel = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Envoi en cours…'; }
  showToast('Envoi de la vidéo en cours…', 'success');
  try{
    const r1 = await fetch(API('admin-tutoriels'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'demander_upload', video_id:videoId, content_type:file.type})});
    const d1 = await r1.json();
    if(!r1.ok) throw new Error(d1.error||'Erreur');

    const up = await putFileWithRetry(d1.signedUrl, file, file.type);
    if(!up.ok){
      let detail = '';
      try{ detail = (await up.text()).slice(0,200); }catch(_){}
      throw new Error(`Échec de l'envoi du fichier (${up.status})${detail?' : '+detail:''}`);
    }

    const r2 = await fetch(API('admin-tutoriels'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'confirmer_upload', video_id:videoId, path:d1.path})});
    const d2 = await r2.json();
    if(!r2.ok) throw new Error(d2.error||'Erreur');

    loadTutoriels();
    showToast('Vidéo envoyée', 'success');
  }catch(err){
    if(btn){ btn.disabled = false; btn.textContent = originalLabel; }
    showToast(`Envoi échoué : ${err.message}`, 'error');
  }finally{
    TUTO_PENDING_UPLOAD = null;
  }
});

function parsePostalCodesInput(raw){

function normVilleStr(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
function villeAutocomplete(q){
  const dd = document.getElementById('v-nom-dd');
  if(!dd) return;
  if(!q || q.length < 2){ dd.style.display='none'; return; }
  const low = normVilleStr(q);
  // Recherche par nom ET par code postal si la saisie ressemble à un nombre
  const isNum = /^\d/.test(q);
  const matches = FR_VILLES.filter(v =>
    isNum ? v.cps.some(cp => cp.startsWith(q)) : normVilleStr(v.nom).includes(low)
  ).slice(0, 12);
  if(!matches.length){ dd.style.display='none'; return; }
  dd.innerHTML = matches.map(v => {
    const cpPreview = v.cps.slice(0,4).join(', ')+(v.cps.length>4?'…':'');
    return `<div onclick="selectVilleRef(${JSON.stringify(JSON.stringify(v))})" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-soft)" onmousedown="event.preventDefault()">
      <strong>${escHtml(v.nom)}</strong> <span style="color:var(--grey-soft);font-size:11.5px">— Dép. ${escHtml(v.dep)}</span><br>
      <span style="font-size:12px;color:var(--grey)">${escHtml(cpPreview)}</span>
    </div>`;
  }).join('');
  dd.style.display='block';
}

function cpSearch(q){
  const sug = document.getElementById('v-cp-suggest');
  if(!sug) return;
  const parts = q.split(',').map(s=>s.trim());
  const last = parts[parts.length-1];
  if(!last || last.length < 2){ sug.style.display='none'; return; }
  const matches = FR_VILLES.filter(v => v.cps.some(cp => cp.startsWith(last))).slice(0, 8);
  if(!matches.length){ sug.style.display='none'; return; }
  sug.innerHTML = '<span style="font-size:11.5px;color:var(--grey-soft);display:block;margin-bottom:5px">Communes correspondantes :</span>'
    + matches.map(v => `<button type="button" class="btn btn-grey" style="margin:2px 2px 2px 0;padding:4px 10px;font-size:12px;border-radius:100px" onclick="addCpsFromVille(${JSON.stringify(JSON.stringify(v.cps))})">${escHtml(v.nom)} (${v.cps.join(', ')})</button>`).join('');

// ── Suivi en direct (carte gratuite OpenStreetMap) ───────────────────────────
// Trajet affiché en ligne droite (pas d'itinéraire routier) et ETA estimé à
// vitesse moyenne — pas de clé API, pas de coût. Voir supabase/README.md pour
// upgrade éventuel vers un vrai itinéraire (Google/Mapbox) plus tard.
let LIVE_MAP = null, LIVE_MARKER = null, LIVE_DEST_MARKER = null, LIVE_LINE = null, LIVE_POLL = null, LIVE_DEST_COORDS = null;

function haversineKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocodeAddress(address){
  try{
    const q = encodeURIComponent(address);
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=fr&q=${q}`);
    const d = await r.json();
    if(d && d[0]) return {lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}

async function openLiveMap(transporteurId, transporteurNom, adresse){
  const overlay = document.createElement('div');
  overlay.className = 'map-overlay';
  overlay.id = 'map-overlay';
  const avgLiv = avgDureeSurPlaceForTransporteur(transporteurId, 'livraison');
  const avgRec = avgDureeSurPlaceForTransporteur(transporteurId, 'recuperation');
  const statsLines = [
    avgLiv ? `📦 Livraison : ${avgLiv.avg} min en moyenne sur place (${avgLiv.n} mission${avgLiv.n>1?'s':''})` : '',
    avgRec ? `🔄 Récupération : ${avgRec.avg} min en moyenne sur place (${avgRec.n} mission${avgRec.n>1?'s':''})` : '',
  ].filter(Boolean);
  overlay.innerHTML = `
    <div class="map-modal">
      <div class="map-modal-head"><h2>🔴 ${escHtml(transporteurNom)} en direct</h2><button onclick="closeLiveMap()">✕</button></div>
      ${statsLines.length?`<div class="map-stats">${statsLines.join('<br/>')}</div>`:''}
      <div id="live-map"></div>
      <div class="map-eta" id="map-eta">Chargement…</div>
    </div>`;
  document.body.appendChild(overlay);

  LIVE_DEST_COORDS = await geocodeAddress(adresse + ', France');

  setTimeout(() => {
    LIVE_MAP = L.map('live-map', {zoomControl:true, attributionControl:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19, subdomains:'abcd',
    }).addTo(LIVE_MAP);

    if(LIVE_DEST_COORDS){
      LIVE_DEST_MARKER = L.marker([LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng], {
        icon: L.divIcon({className:'', html:'<div class="map-pin-teardrop"><span>🏠</span></div>', iconSize:[32,32], iconAnchor:[16,32]}),
      }).addTo(LIVE_MAP);
    }

    refreshLivePosition(transporteurId);
    LIVE_POLL = setInterval(() => refreshLivePosition(transporteurId), 8000);
  }, 50);
}

async function refreshLivePosition(transporteurId){
  const etaEl = document.getElementById('map-eta');
  if(!etaEl) return; // la modale a été fermée entre-temps
  try{
    const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'position', transporteur_id: transporteurId})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Position indisponible pour le moment');

    const point = [d.lat, d.lng];
    if(!LIVE_MARKER){
      LIVE_MARKER = L.marker(point, {
        icon: L.divIcon({className:'', html:'<div class="map-pin-live">🛵</div>', iconSize:[34,34], iconAnchor:[17,17]}),
      }).addTo(LIVE_MAP);
    } else {
      LIVE_MARKER.setLatLng(point);
    }

    const bounds = LIVE_DEST_COORDS ? L.latLngBounds([point, [LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng]]) : L.latLngBounds([point, point]);
    LIVE_MAP.fitBounds(bounds, {padding: [40,40], maxZoom: 16});

    if(LIVE_DEST_COORDS){
      if(LIVE_LINE) LIVE_MAP.removeLayer(LIVE_LINE);
      LIVE_LINE = L.polyline([point, [LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng]], {color:'#1b3a5f', weight:3, dashArray:'6,8'}).addTo(LIVE_MAP);
    }

    const ageSec = Math.round((Date.now() - new Date(d.position_at).getTime()) / 1000);
    const stale = ageSec > 90;
    let etaTxt = '';
    if(LIVE_DEST_COORDS){
      const km = haversineKm(point[0], point[1], LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng);
      const minutes = Math.max(1, Math.round(km / 22 * 60)); // ~22 km/h en ville — estimation, pas de trafic réel
      etaTxt = `<strong>~${minutes} min</strong> (${km.toFixed(1)} km, estimation)`;
    }
    etaEl.innerHTML = `<span class="${stale?'map-stale':''}">${stale ? '⚠️ Signal perdu — dernière position il y a '+Math.round(ageSec/60)+' min' : 'Mis à jour il y a '+ageSec+'s'}</span><span>${etaTxt}</span>`;
  }catch(e){
    etaEl.innerHTML = `<span class="map-stale">⚠️ ${escHtml(e.message)}</span>`;
  }
}

function closeLiveMap(){
  if(LIVE_POLL) clearInterval(LIVE_POLL);
  LIVE_POLL = null;
  if(LIVE_MAP){ LIVE_MAP.remove(); LIVE_MAP = null; }
  LIVE_MARKER = null; LIVE_DEST_MARKER = null; LIVE_LINE = null; LIVE_DEST_COORDS = null;
  const o = document.getElementById('map-overlay');
  if(o) o.remove();
}
