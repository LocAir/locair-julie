// Moyenne du temps passé sur place (arrivée → terminé), à partir des horodatages
// posés automatiquement pendant le parcours du livreur — aucune saisie manuelle.
// Sert à objectiver des hypothèses comme "20-30 min d'installation" avec de la
// vraie donnée plutôt qu'une estimation.
function avgDureeSurPlace(type){
  const vals = LIVRAISONS_CACHE
    .filter(m => m.type===type && m.statut==='fait' && m.duree_sur_place_min!=null)
    .map(m => m.duree_sur_place_min);
  if(!vals.length) return null;
  return Math.round(vals.reduce((s,v)=>s+v,0) / vals.length);
}
// Même moyenne, mais isolée pour un livreur précis — affichée à côté de la
// carte en temps réel pour donner du contexte pendant qu'on suit sa mission.
function avgDureeSurPlaceForTransporteur(transporteurId, type){
  const vals = LIVRAISONS_CACHE
    .filter(m => m.type===type && m.statut==='fait' && m.duree_sur_place_min!=null && m.transporteur?.id===transporteurId)
    .map(m => m.duree_sur_place_min);
  if(!vals.length) return null;
  return { avg: Math.round(vals.reduce((s,v)=>s+v,0) / vals.length), n: vals.length };
}
function renderLivraisonsToolbar(){
  const zone = document.getElementById('tab-livraisons');
  const visibles = LIVRAISONS_CACHE.filter(m => !m.masquee);
  const nonAssigneesCount = visibles.filter(m => m.statut==='a_faire' && !m.transporteur).length;
  const masqueesCount = LIVRAISONS_CACHE.filter(m => m.masquee).length;
  const filters = [
    {key:'toutes', label:'Actives'},
    {key:'non_assignees', label:`⚠️ Non assignées${nonAssigneesCount?' ('+nonAssigneesCount+')':''}`},
    {key:'en_cours', label:'En cours'},
    {key:'fait', label:'Terminées'},
    {key:'probleme', label:'Problèmes'},
    {key:'annule', label:'Annulées'},
  ];
  const avgLiv = avgDureeSurPlace('livraison');
  const avgRec = avgDureeSurPlace('recuperation');
  const avgHtml = (avgLiv!=null || avgRec!=null) ? `
    <div class="stat-grid" style="margin-bottom:16px">
      ${avgLiv!=null?`<div class="stat-tile"><div class="n">${avgLiv} min</div><div class="l">Temps moyen sur place · Livraison</div></div>`:''}
      ${avgRec!=null?`<div class="stat-tile"><div class="n">${avgRec} min</div><div class="l">Temps moyen sur place · Récupération</div></div>`:''}
    </div>` : '';
  // Compteur compact "aujourd'hui" : ce qui reste à faire aujourd'hui même,
  // et ce qui traîne depuis avant aujourd'hui sans être terminé — les 2
  // chiffres qu'Aly regarde en premier chaque matin.
  const today = new Date().toISOString().slice(0,10);
  const EN_COURS_STATUTS = ['a_faire','acceptee','arrivee','probleme'];
  const missionsAujourdhui = visibles.filter(m => m.date_prevue===today && EN_COURS_STATUTS.includes(m.statut)).length;
  const missionsEnRetard = visibles.filter(m => m.date_prevue<today && EN_COURS_STATUTS.includes(m.statut)).length;
  const todayHtml = (missionsAujourdhui || missionsEnRetard) ? `
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-tile"><div class="n">${missionsAujourdhui}</div><div class="l">Restant aujourd'hui</div></div>
      ${missionsEnRetard?`<div class="stat-tile warn"><div class="n">${missionsEnRetard}</div><div class="l">En retard</div></div>`:''}
    </div>` : '';
  zone.innerHTML = `
    ${todayHtml}
    ${avgHtml}
    <button class="btn btn-blue btn-block" style="margin-bottom:14px" onclick="openCreateMissionModal()">+ Créer une mission</button>
    <input type="text" id="liv-search" placeholder="🔎 Client, adresse, référence…" oninput="renderLivraisons()"/>
    <div class="periods" style="margin-bottom:16px">
      ${filters.map(f => `<button class="${!LIVRAISONS_SHOW_MASQUEES && LIVRAISONS_FILTER===f.key?'on':''}" onclick="setLivraisonsFilter('${f.key}')">${f.label}</button>`).join('')}
    </div>
    <div id="liv-list"></div>
    ${masqueesCount ? `<button class="btn btn-grey btn-block" style="margin-top:14px" onclick="toggleLivraisonsMasquees()">${LIVRAISONS_SHOW_MASQUEES?'← Revenir aux missions':`🙈 Afficher les missions supprimées (${masqueesCount})`}</button>` : ''}`;
}

function setLivraisonsFilter(key){ LIVRAISONS_SHOW_MASQUEES = false; LIVRAISONS_FILTER = key; renderLivraisonsToolbar(); renderLivraisons(); }

function renderLivraisons(){
  const list = document.getElementById('liv-list');
  if(!list) return;
  const q = (document.getElementById('liv-search')?.value || '').trim().toLowerCase();

  let items = LIVRAISONS_CACHE.filter(m => LIVRAISONS_SHOW_MASQUEES ? m.masquee : !m.masquee);
  if(!LIVRAISONS_SHOW_MASQUEES){
    if(LIVRAISONS_FILTER === 'non_assignees') items = items.filter(m => m.statut==='a_faire' && !m.transporteur);
    else if(LIVRAISONS_FILTER === 'en_cours') items = items.filter(m => ['a_faire','acceptee','arrivee'].includes(m.statut));
    else if(LIVRAISONS_FILTER === 'fait') items = items.filter(m => m.statut === 'fait');
    else if(LIVRAISONS_FILTER === 'probleme') items = items.filter(m => m.statut === 'probleme');
    else if(LIVRAISONS_FILTER === 'annule') items = items.filter(m => m.statut === 'annule');
    // "Actives" = tout ce qui attend encore quelque chose du transporteur ou
    // de l'admin — une fois "fait" ou "annule", une mission n'a plus rien à
    // demander, elle se range dans son propre filtre plutôt que de rester
    // mélangée à ce qui reste réellement à traiter.
    else if(LIVRAISONS_FILTER === 'toutes') items = items.filter(m => !['fait','annule'].includes(m.statut));
  }

  if(q){
    items = items.filter(m => {
      const res = m.reservation || {};
      const haystack = [res.ref, res.prenom, res.nom, res.adresse].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }

  if(!items.length){ list.innerHTML = '<p class="empty">🚚 Aucune mission ne correspond.</p>'; return; }

  list.innerHTML = items.map(m => {
    const res = m.reservation || {};
    const options = ['<option value="">Non assigné</option>'].concat(
      TRANSPORTEURS_CACHE.map(t => `<option value="${t.id}" ${m.transporteur&&m.transporteur.id===t.id?'selected':''}>${escHtml(t.nom)}</option>`)
    ).join('');
    const mediaBtns = [];
    if(m.photo_depart_path) mediaBtns.push(`<button class="btn btn-grey" onclick="viewMedia(${m.id},'photo_depart')">📷 Départ</button>`);
    if(m.photo_installation_path) mediaBtns.push(`<button class="btn btn-grey" onclick="viewMedia(${m.id},'photo_installation')">📷 Installation</button>`);
    if(m.photo_retour_path) mediaBtns.push(`<button class="btn btn-grey" onclick="viewMedia(${m.id},'photo_retour')">📷 Retour</button>`);
    if(m.photo_absence_path) mediaBtns.push(`<button class="btn btn-grey" onclick="viewMedia(${m.id},'photo_absence')">📵 Preuve passage</button>`);
    const enRoute = m.transporteur && (m.statut==='acceptee' || m.statut==='arrivee');
    // Icône permanente sur les missions sans livreur — visible même en dehors
    // du filtre "Non assignées", pour qu'une mission non dispatchée ne se
    // perde jamais visuellement dans la liste "Toutes".
    const nonAssignee = m.statut==='a_faire' && !m.transporteur;
    if(m.masquee){
      return `
        <div class="row-item" style="opacity:.6">
          <div class="row-top">
            <span class="row-title">${escHtml((res.prenom||'')+' '+(res.nom||''))}</span>
            <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
          </div>
          <div style="margin-bottom:6px">${missionTypeBadge(m.type)}</div>
          <div class="row-meta">${!isInternalRef(res.ref)?escHtml(res.ref)+' · ':''}${escHtml(res.adresse||'—')}<br/>${frDate(m.date_prevue)} · ${escHtml(m.creneau||'')}</div>
          <div class="row-actions"><button class="btn btn-grey" onclick="restoreLivraison(${m.id})">Restaurer</button></div>
        </div>`;
    }
    return `
      <div class="row-item" ${nonAssignee?'style="border-left:3px solid var(--red)"':''}>
        <div class="row-top">
          <span class="row-title">${nonAssignee?'🔔 ':''}${escHtml((res.prenom||'')+' '+(res.nom||''))}</span>
          <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
        </div>
        <div style="margin-bottom:6px">${missionTypeBadge(m.type)}</div>
        ${nonAssignee?`<div class="row-meta" style="color:var(--red);font-weight:700;margin-bottom:4px">🔔 Non assignée</div>`:''}
        ${res.hors_zone?`<div class="row-meta" style="color:var(--red);font-weight:700;margin-bottom:4px">⚠️ Hors zone</div>`:''}
        ${(m.appareil_numeros&&m.appareil_numeros.length)?`<div class="row-meta" style="font-weight:700;color:var(--blue)">🔢 Unité${m.appareil_numeros.length>1?'s':''} n°${m.appareil_numeros.join(', ')}${(m.appareil_references&&m.appareil_references.length)?' · '+m.appareil_references.map(escHtml).join(', '):''}</div>`:''}
        <div class="row-meta">${!isInternalRef(res.ref)?escHtml(res.ref)+' · ':''}${escHtml(res.adresse||'—')}<br/>${frDate(m.date_prevue)} · ${escHtml(m.creneau||'')}</div>
        ${(res.etage||res.ascenseur||res.fenetre)?`<div class="row-meta">${[res.etage?'🏢 Étage '+escHtml(res.etage):'',res.ascenseur&&res.ascenseur!=='—'?'Ascenseur : '+escHtml(res.ascenseur):'',res.fenetre?'🪟 '+escHtml(res.fenetre):''].filter(Boolean).join(' · ')}</div>`:''}
        ${res.instructions_acces?`<div class="row-meta" style="color:var(--amber);font-weight:700">📌 ${escHtml(res.instructions_acces)}</div>`:''}
        ${(m.duree_trajet_min!=null || m.duree_sur_place_min!=null)?`<div class="row-meta">🕐 ${m.duree_trajet_min!=null?m.duree_trajet_min+' min trajet':''}${m.duree_trajet_min!=null&&m.duree_sur_place_min!=null?' · ':''}${m.duree_sur_place_min!=null?m.duree_sur_place_min+' min sur place':''}</div>`:''}
        ${m.statut==='probleme'?`<div class="row-meta" style="color:var(--red);font-weight:700;margin-top:6px">⚠️ ${PROBLEME_LABEL[m.probleme_type]||escHtml(m.probleme_type||'')}${m.probleme_description?' — '+escHtml(m.probleme_description):''}</div>`:''}
        ${m.client_notifie_at?`<div class="row-meta" style="color:var(--green)">✅ Client notifié ${frDateHeure(m.client_notifie_at)}</div>`:''}
        ${(['recuperation','changement'].includes(m.type) && m.statut==='fait')?`<div class="row-meta" style="color:${m.vidange_confirmee?'var(--green)':'var(--amber)'};">${m.vidange_confirmee?'✅ Vidange confirmée':'⚠️ Vidange non confirmée'}</div>`:''}
        <div class="row-actions">
          ${contactButtonsHtml(res.tel)}
          <select onchange="assignTransporteur(${m.id}, this.value, this)">${options}</select>
          ${enRoute?`<button class="btn btn-blue" onclick="openLiveMap(${m.transporteur.id}, '${escHtml(m.transporteur.nom).replace(/'/g,"\\'")}', '${escHtml(res.adresse||'').replace(/'/g,"\\'")}')">🔴 Suivre en direct</button>`:''}
          ${m.statut==='probleme'?`<button class="btn btn-green" onclick="resolveProbleme(${m.id})">✅ Problème résolu</button>`:''}
          ${mediaBtns.join('')}
          ${mediaBtns.length===0 && m.statut==='fait' ? '<span class="row-meta" style="align-self:center">Aucune preuve enregistrée</span>' : ''}
          <button class="btn btn-grey" title="Supprimer de l'écran" onclick="maskLivraison(${m.id})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

async function assignTransporteur(livraisonId, transporteurId, selectEl){
  // Verrou anti-double-clic : bloque le select le temps de la requête pour
  // éviter deux assignations qui se chevauchent sur la même mission.
  if(selectEl) selectEl.disabled = true;
  const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'assign', livraison_id:livraisonId, transporteur_id: transporteurId||null})});
  const d = await r.json().catch(()=>({}));
  if(d.reset){
    showToast('Mission remise à "à faire" pour le nouveau livreur', 'success');
    loadLivraisons();
    return;
  }
  const m = LIVRAISONS_CACHE.find(x => x.id === livraisonId);
  if(m) m.transporteur = TRANSPORTEURS_CACHE.find(t => t.id == transporteurId) || null;
  // Rafraîchit le badge "non assignées" et le filtre courant (sinon la mission
  // qu'on vient d'assigner reste affichée dans "⚠️ Non assignées" jusqu'au
  // prochain rechargement complet de l'onglet). On garde la recherche en cours
  // pour ne pas l'effacer sous les pieds de l'admin qui vient de l'écrire.
  const searchVal = document.getElementById('liv-search')?.value || '';
  renderLivraisonsToolbar();
  const searchEl = document.getElementById('liv-search');
  if(searchEl) searchEl.value = searchVal;
  renderLivraisons();
  loadAlerts();
}
function maskLivraison(livraisonId){
  confirmAction('Supprimer cette mission de l\'écran ? Ça ne touche ni son statut ni les données réelles — juste le fait qu\'elle s\'affiche ici. Récupérable via "Afficher les missions supprimées" en bas de page.', async () => {
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'mask', livraison_id:livraisonId, masquee:true})});
      if(!r.ok) throw new Error((await r.json()).error||'Erreur');
      const m = LIVRAISONS_CACHE.find(x => x.id===livraisonId);
      if(m) m.masquee = true;
      renderLivraisonsToolbar();
      loadAlerts();
      showToast('Mission supprimée de l\'écran', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  }, {danger:true, yesLabel:'Supprimer de l\'écran'});
}
async function restoreLivraison(livraisonId){
  try{
    const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'mask', livraison_id:livraisonId, masquee:false})});
    if(!r.ok) throw new Error((await r.json()).error||'Erreur');
    const m = LIVRAISONS_CACHE.find(x => x.id===livraisonId);
    if(m) m.masquee = false;
    renderLivraisonsToolbar();
    loadAlerts();
    showToast('Mission restaurée', 'success');
  }catch(e){ showToast(e.message, 'error'); }
}
function resolveProbleme(livraisonId){
  confirmAction('Confirmer que le problème est réglé ? Le livreur pourra reprendre la mission (il repassera par l\'étape "arrivé").', async () => {
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'resolve_probleme', livraison_id:livraisonId})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadLivraisons();
      loadAlerts();
      showToast('Mission réactivée', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}

// Aperçu directement dans l'app plutôt que d'ouvrir le fichier brut dans un
// nouvel onglet — plus rapide à consulter (surtout plusieurs preuves de
// suite) et visuellement cohérent avec le reste de l'admin.
function openMediaViewer(url, kind){
  closeMediaViewer();
  // Détection par extension plutôt que par kind : une preuve "installation"
  // capturée avant ce changement (vidéo, ancien format) doit rester lisible
  // correctement même si le type attendu aujourd'hui est une photo.
  const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(url);
  const safeUrl = escHtml(url);
  const overlay = document.createElement('div');
  overlay.className = 'map-overlay';
  overlay.id = 'media-overlay-el';
  overlay.innerHTML = `
    <div class="map-modal">
      <div class="map-modal-head">
        <h2>${escHtml(MEDIA_KIND_LABEL[kind]||'Preuve')}</h2>
        <button onclick="closeMediaViewer()">✕</button>
      </div>
      <div class="media-modal-body">
        ${isVideo ? `<video src="${safeUrl}" controls autoplay playsinline></video>` : `<img src="${safeUrl}" alt="${escHtml(MEDIA_KIND_LABEL[kind]||'Preuve')}"/>`}
      </div>
      <div class="media-modal-foot"><a href="${safeUrl}" target="_blank" rel="noopener">Ouvrir dans un nouvel onglet ↗</a></div>
    </div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeMediaViewer(); });
  document.body.appendChild(overlay);
}
function closeMediaViewer(){
  const o = document.getElementById('media-overlay-el');
  if(o) o.remove();
}

// ── TRANSPORTEURS ─────────────────────────────────────────────────────────────
// "Revenus" (ex-onglet Virements) vit ici plutôt que dans son propre onglet :
// "combien je dois à qui" n'a de sens qu'à côté des transporteurs eux-mêmes.
let TRANSPORTEURS_VIEW = 'equipe'; // 'equipe' | 'revenus'
// Capacité réaliste d'un livreur : jusqu'à 10 missions/jour. Sert de
// référence pour la barre de charge du jour, affichée ici et côté livreur.
const MISSIONS_CIBLE_JOUR = 10;
function chargeJourHtml(transporteurId, livraisons){
  const todayStr = new Date().toISOString().slice(0,10);
  const count = (livraisons||[]).filter(m =>
    m.date_prevue===todayStr && m.transporteur?.id===transporteurId &&
    !['annule','refusee'].includes(m.statut)
  ).length;
  const pct = Math.min(100, Math.round(count/MISSIONS_CIBLE_JOUR*100));
  const over = count > MISSIONS_CIBLE_JOUR;
  return `
    <div class="dp-top"><span>Aujourd'hui</span><span>${count} / ${MISSIONS_CIBLE_JOUR} missions</span></div>
    <div class="dp-bar"><div class="dp-fill ${over?'over':''}" style="width:${pct}%"></div></div>`;
}
// Compte transporteur factice pour que l'admin puisse ouvrir /transporteur et
// voir/tester l'espace livreur lui-même (aucune colonne dédiée en base — juste
// un transporteur normal reconnu par ce nom réservé, taux à 0€ pour qu'aucun
// virement réel ne puisse s'accumuler dessus même si une mission lui est
// assignée par erreur pendant un test).
const TEST_TRANSPORTEUR_NOM = '🧪 Test (aperçu admin)';
async function createTestTransporteur(){
  try{

  }catch(e){ showToast(e.message, 'error'); }
}
function loadTransporteursTab(){

    <div class="periods" style="margin-bottom:16px">
      <button class="${TRANSPORTEURS_VIEW==='equipe'?'on':''}" onclick="setTransporteursView('equipe')">👷 Équipe</button>
      <button class="${TRANSPORTEURS_VIEW==='revenus'?'on':''}" onclick="setTransporteursView('revenus')">💶 Revenus</button>

function setTransporteursView(view){ TRANSPORTEURS_VIEW = view; loadTransporteursTab(); }
// ── Zones d'intervention + disponibilité (multi-ville) ────────────────────
// Distinct de transporteurs.city_id (ville de rattachement, équipe/paie) :
// transporteur_villes couvre plusieurs zones possibles pour la répartition
// automatique des missions ; transporteur_disponibilites précise jour ×
// moment. Aucune ligne de dispo = disponible tous les jours, tous moments
// (comportement historique inchangé pour un transporteur jamais restreint).
const JOURS_LABELS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MISSION_TYPES_DEF = [
  {key:'livraison',            label:'📦 Livraison',               tarif:'30€'},
  {key:'livraison_technicien', label:'📦 Livraison + installation', tarif:'40€'},
  {key:'recuperation',         label:'🔄 Récupération',            tarif:'30€'},
  {key:'changement',           label:'🔁 Remplacement',            tarif:'40€'},
];
// Disponibilités par défaut : Lundi–Samedi, toute la journée
const DEFAULT_DISPOS = [1,2,3,4,5,6].map(j => ({jour: j, moment: 'journee'}));

function missionTypesHtml(prefix, activeKeys){
  const active = activeKeys == null ? null : new Set(activeKeys);
  return MISSION_TYPES_DEF.map(mt => `
    <label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer">
      <input type="checkbox" id="${prefix}-type-${mt.key}" ${!active||active.has(mt.key)?'checked':''}/>
      <span style="flex:1">${mt.label}</span>
      <span style="font-size:12px;font-weight:700;color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:100px">${mt.tarif}</span>
    </label>`).join('');
}
function collectMissionTypes(prefix){
  return MISSION_TYPES_DEF.map(mt => mt.key).filter(k => document.getElementById(`${prefix}-type-${k}`)?.checked);
}
function villesCheckboxesHtml(prefix, selectedIds){
  const sel = new Set((selectedIds||[]).map(String));
  if(!CITIES_CACHE.length) return '<p class="sub" style="margin:0">Aucune ville configurée.</p>';
  return `<div class="ville-checks">${CITIES_CACHE.map(c => `
    <label><input type="checkbox" id="${prefix}-ville-${c.id}" ${sel.has(String(c.id))?'checked':''}/> ${escHtml(c.name)}</label>
  `).join('')}</div>`;
}
function collectVillesForm(prefix){
  return CITIES_CACHE.map(c => c.id).filter(id => document.getElementById(`${prefix}-ville-${id}`)?.checked);
}
function dispoFormHtml(prefix, dispoRows){
  const byJour = {};
  (dispoRows||[]).forEach(d => { byJour[d.jour] = d.moment; });
  const rows = [0,1,2,3,4,5,6].map(j => {
    const val = byJour[j] || '';
    return `<div class="dispo-row">
      <span class="dispo-day">${JOURS_LABELS[j]}</span>
      <select id="${prefix}-jour-${j}">
        <option value="" ${val===''?'selected':''}>Indisponible</option>
        <option value="matin" ${val==='matin'?'selected':''}>Matin</option>
        <option value="apres_midi" ${val==='apres_midi'?'selected':''}>Après-midi</option>
        <option value="journee" ${val==='journee'?'selected':''}>Toute la journée</option>
      </select>
    </div>`;
  }).join('');
  return `
    <div class="dispo-grid" id="${prefix}-dispo-grid">${rows}</div>
    <div class="periods" style="margin-top:8px">
      <button type="button" onclick="applyDispoPreset('${prefix}','semaine')">Semaine</button>
      <button type="button" onclick="applyDispoPreset('${prefix}','weekend')">Week-end</button>
      <button type="button" onclick="applyDispoPreset('${prefix}','tous')">Tous les jours</button>
    </div>`;
}
function applyDispoPreset(prefix, preset){
  for(let j=0;j<=6;j++){
    const sel = document.getElementById(`${prefix}-jour-${j}`);
    if(!sel) continue;
    if(preset==='semaine') sel.value = (j>=1 && j<=5) ? 'journee' : '';
    else if(preset==='weekend') sel.value = (j===0 || j===6) ? 'journee' : '';
    else sel.value = ''; // 'tous' — vide toutes les lignes = disponible tous les jours
  }
}
function collectDispoForm(prefix){
  const rows = [];
  for(let j=0;j<=6;j++){
    const sel = document.getElementById(`${prefix}-jour-${j}`);
    if(sel && sel.value) rows.push({jour:j, moment:sel.value});
  }
  return rows;
}
function editFiche(id){
  const t = TRANSPORTEURS_CACHE.find(x => x.id === id);
  if(!t) return;
  closeModal();
  const activeKeys = (t.types_autorises && t.types_autorises.length) ? t.types_autorises : null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:420px;max-height:90vh;overflow-y:auto">
      <h2 style="margin-bottom:14px">✏️ Fiche — ${escHtml(t.nom)}</h2>
      <label>Types de mission autorisés</label>
      <p class="sub" style="margin:4px 0 10px;font-size:12px">Cocher tout = aucune restriction</p>
      ${missionTypesHtml('fiche', activeKeys)}
      <label style="margin-top:16px">Villes d'intervention</label>
      ${villesCheckboxesHtml('fiche', t.villes)}
      <label style="margin-top:16px">Disponibilité</label>
      ${dispoFormHtml('fiche', t.disponibilites && t.disponibilites.length ? t.disponibilites : DEFAULT_DISPOS)}
      <div class="modal-actions" style="margin-top:18px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Enregistrer</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = async () => {
    const types = collectMissionTypes('fiche');
    const allChecked = types.length === MISSION_TYPES_DEF.length;
    const villes = collectVillesForm('fiche');
    const disponibilites = collectDispoForm('fiche');
    okBtn.disabled = true;
    try{
      const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
        action:'update', id:t.id,
        types_autorises: allChecked ? [] : types,
        villes, disponibilites,
      })});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      closeModal();
      loadTransporteursEquipe();
      showToast('Fiche mise à jour', 'success');
    }catch(e){
      okBtn.disabled = false;
      showToast(`Non enregistré : ${e.message}`, 'error');
    }
  };
}

async function loadTransporteursEquipe(){
  const zone = document.getElementById('transp-view-content');

  zone.innerHTML = loading();

    const [tr, lr, sr] = await Promise.all([

    ]);

    TRANSPORTEURS_CACHE = d.transporteurs || [];

          <button class="btn btn-grey btn-block" style="margin-top:8px" onclick="resetPin(${testTransp.id})">Régénérer le code</button>
        ` : `<button class="btn btn-blue btn-block" onclick="createTestTransporteur()">Créer mon compte de test</button>`}

      const scoreLabel = score == null ? '—' : score + ' pts';
      const missions30 = st.missions_30j != null ? st.missions_30j : null;

      return `
      <div class="row-item" style="${enPause?'opacity:.8;border-left:3px solid var(--amber)':''}">

          <span class="row-title">${escHtml(t.nom)}</span>

            ${enPause?`<span class="chip" style="background:#fef3c7;color:#b45309;border:1px solid #fcd34d">⏸ En pause</span>`:''}
            <span class="chip ${t.actif?'actif':'annulee'}">${t.actif?'actif':'inactif'}</span>
          </span>
        </div>
        <div class="row-meta">${escHtml(t.telephone||'—')}${t.email?' · '+escHtml(t.email):''}</div>

        ${CITIES_CACHE.length>1?`<div class="row-meta">🌍 ${(t.villes&&t.villes.length) ? t.villes.map(id => escHtml((CITIES_CACHE.find(c=>c.id===id)||{}).name||'?')).join(', ') : 'Aucune zone'}</div>`:''}

async function addTransporteur(){
  const nom = document.getElementById('t-nom').value.trim();
  const telephone = document.getElementById('t-tel').value.trim();
  const email = document.getElementById('t-email').value.trim();
  const errEl = document.getElementById('transp-err');
  errEl.style.display='none';
  if(!nom){ errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
  const types = collectMissionTypes('t-new');
  const allChecked = types.length === MISSION_TYPES_DEF.length;
  const types_autorises = allChecked ? [] : types;
  const extra = {
    types_autorises,
    disponibilites: collectDispoForm('t-new'),
    ...(CITIES_CACHE.length>1 ? { villes: collectVillesForm('t-new') } : {}),
  };
  try{
    const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'create', nom, telephone, email, ...extra})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadTransporteursEquipe();
    showInfo('Transporteur ajouté', `Code personnel à lui communiquer :\n\n${d.pin}\n\nCe code lui permet de se connecter sur /transporteur.`);
  }catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}
function deleteTransporteur(id, nom){
  confirmAction(`Supprimer définitivement ${nom} ? S'il a des missions ou virements liés, il sera désactivé à la place (pour garder l'historique).`, async () => {
    try{
      const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'delete', id})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadTransporteursEquipe();

      showToast(e.message, 'error');
    }
  }, {danger:true, yesLabel:'Supprimer'});
}
async function toggleTransporteur(id, actif, btnEl){

async function openTransporteurStats(id){
  const t = TRANSPORTEURS_CACHE.find(x => x.id === id);
  if(!t) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `<div class="modal-box" style="max-width:440px;max-height:90vh;overflow-y:auto">
    <h2 style="margin-bottom:4px">📊 Stats — ${escHtml(t.nom)}</h2>
    <div class="sub" style="margin-bottom:16px">30 derniers jours</div>
    <div id="stats-modal-body">${loading()}</div>
    <div class="modal-actions" style="margin-top:18px"><button class="btn btn-grey">Fermer</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  overlay.querySelector('.modal-actions .btn').onclick = closeModal;
  try{
    const r = await fetch(API('admin-transporteur-stats'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'stats', transporteur_id:id, period:'month'})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    const p = d.perf || {};
    const scoreColor = p.score >= 80 ? 'var(--green)' : p.score >= 60 ? '#b45309' : 'var(--red)';
    const bar = (pct) => `<div style="height:6px;border-radius:100px;background:var(--bg);overflow:hidden;margin-top:3px"><div style="height:100%;width:${pct}%;background:var(--blue);border-radius:100px"></div></div>`;
    const row = (label, pct) => `<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${label}</span><span style="font-weight:700">${pct}%</span></div>${bar(pct)}</div>`;
    const el = overlay.querySelector('#stats-modal-body');
    el.innerHTML = `
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;font-weight:900;color:${scoreColor}">${p.score != null ? p.score : '—'}</div>
        <div style="font-size:12px;color:var(--grey)">Score de performance</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div class="card" style="padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800">${d.total||0}</div>
          <div style="font-size:11px;color:var(--grey)">missions</div>
        </div>
        <div class="card" style="padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800">${d.lph||'—'}</div>
          <div style="font-size:11px;color:var(--grey)">missions/h</div>
        </div>
      </div>
      ${row('Taux d\'acceptation', p.acceptance??100)}
      ${row('Taux de complétion', p.completion??100)}
      ${row('Notification client', p.notification??100)}
      ${row('Preuves terrain', p.proof??100)}
      ${row('Sans incident', p.no_incident??100)}
      ${d.growth!=null?`<div style="margin-top:12px;font-size:12px;text-align:right;color:${d.growth>=0?'var(--green)':'var(--red)'}">vs période précédente : ${d.growth>=0?'+':''}${d.growth}%</div>`:''}`;
  }catch(e){
    const el = overlay.querySelector('#stats-modal-body');
    if(el) el.innerHTML = `<p class="empty">Erreur : ${escHtml(e.message)}</p>`;
  }
}

  }
  const list = items.map(c => `
    <div class="row-item">
      <div class="row-top">

}

function editAccesDifficile(id, current){

    }catch(e){ showToast(`Note non enregistrée : ${e.message}`, 'error'); }

}
// Galerie des preuves (installation/récupération/passage) accumulées pour ce
// client au fil des missions — chargée à la demande, pas au chargement de la
// liste (évite une requête par client alors que la plupart ne seront jamais ouverts).
async function toggleClientPhotos(id){
  const panel = document.getElementById(`cli-photos-${id}`);
  if(!panel) return;
  if(!panel.classList.contains('hidden')){ panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');
  if(panel.dataset.loaded) return;
  panel.innerHTML = loading();
  try{
    const r = await fetch(API('admin-clients'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'photos', id})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    const photos = d.photos || [];
    panel.innerHTML = photos.length
      ? photos.map(p => `<button class="btn btn-grey" onclick="viewMedia(${p.livraison_id},'${p.kind}')">${p.type==='livraison'?'📦':'🔄'} ${MEDIA_KIND_LABEL[p.kind]||p.kind} — ${frDate(p.date_prevue)}</button>`).join('')
      : '<p class="empty" style="padding:0">Aucune photo enregistrée pour l\'instant.</p>';
    panel.dataset.loaded = '1';
  }catch(e){
    panel.innerHTML = '<p class="empty" style="padding:0">Erreur de chargement.</p>';
  }
}

async function loadVilles(){
  const zone = document.getElementById('tab-villes');
  zone.innerHTML = loading();
  try{
    const r = await fetch(API('admin-cities'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list', city_id:'all'})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    VILLES_CACHE = d.cities || [];
    renderVilles();
  }catch(e){
    zone.innerHTML = '<p class="empty">Erreur de chargement. Réessaie.</p>';
  }
}

    <div class="card">
      <h2>Ouvrir une nouvelle ville</h2>
      <p class="sub" style="margin-bottom:16px">Les commandes du site sont automatiquement affectées à la ville dont les codes postaux couvrent l'adresse de livraison.</p>
      <label for="v-nom">Nom de la ville ou zone</label>
      <div style="position:relative">
        <input type="text" id="v-nom" placeholder="Cannes, Grasse, Côte d'Azur Est…" oninput="villeAutocomplete(this.value)" autocomplete="off" onfocus="villeAutocomplete(this.value)"/>
        <div id="v-nom-dd" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;margin-top:3px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.12)"></div>
      </div>
      <label for="v-dep" style="margin-top:14px">Département</label>
      <input type="text" id="v-dep" placeholder="06"/>
      <label for="v-cp" style="margin-top:14px">Codes postaux couverts (séparés par une virgule)</label>
      <input type="text" id="v-cp" placeholder="06400, 06110, 06150" oninput="cpSearch(this.value)" autocomplete="off"/>
      <div id="v-cp-suggest" style="display:none;margin-top:6px;margin-bottom:4px"></div>
      <button class="btn btn-blue btn-block" style="margin-top:14px" onclick="addVille()">Créer la ville</button>
      <div class="err" id="ville-err"></div>
    </div>`;
}
function parsePostalCodesInput(raw){
  return (raw||'').split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
}
function normVilleStr(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
function villeAutocomplete(q){
  const dd = document.getElementById('v-nom-dd');
  if(!dd) return;
  if(!q || q.length < 2){ dd.style.display='none'; return; }
  const low = normVilleStr(q);
  // Recherche par nom ET par code postal si la saisie ressemble à un nombre
  const isNum = /^\d/.test(q);
  const matches = FR_VILLES.filter(v =>
    isNum ? v.cps.some(cp => cp.startsWith(q)) : normVilleStr(v.nom).includes(low)
  ).slice(0, 12);
  if(!matches.length){ dd.style.display='none'; return; }
  dd.innerHTML = matches.map(v => {
    const cpPreview = v.cps.slice(0,4).join(', ')+(v.cps.length>4?'…':'');
    return `<div onclick="selectVilleRef(${JSON.stringify(JSON.stringify(v))})" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-soft)" onmousedown="event.preventDefault()">
      <strong>${escHtml(v.nom)}</strong> <span style="color:var(--grey-soft);font-size:11.5px">— Dép. ${escHtml(v.dep)}</span><br>
      <span style="font-size:12px;color:var(--grey)">${escHtml(cpPreview)}</span>
    </div>`;
  }).join('');
  dd.style.display='block';
}
function selectVilleRef(jsonStr){
  const v = JSON.parse(jsonStr);
  const nomEl = document.getElementById('v-nom');
  const depEl = document.getElementById('v-dep');
  const cpEl  = document.getElementById('v-cp');
  if(nomEl) nomEl.value = v.nom;
  if(depEl) depEl.value = v.dep;
  if(cpEl)  cpEl.value  = v.cps.join(', ');
  const dd = document.getElementById('v-nom-dd');
  if(dd) dd.style.display='none';
  const sug = document.getElementById('v-cp-suggest');
  if(sug) sug.style.display='none';
}
document.addEventListener('click', e => {
  const dd = document.getElementById('v-nom-dd');
  if(dd && !dd.contains(e.target) && e.target.id!=='v-nom') dd.style.display='none';
});
function cpSearch(q){
  const sug = document.getElementById('v-cp-suggest');
  if(!sug) return;
  const parts = q.split(',').map(s=>s.trim());
  const last = parts[parts.length-1];
  if(!last || last.length < 2){ sug.style.display='none'; return; }
  const matches = FR_VILLES.filter(v => v.cps.some(cp => cp.startsWith(last))).slice(0, 8);
  if(!matches.length){ sug.style.display='none'; return; }
  sug.innerHTML = '<span style="font-size:11.5px;color:var(--grey-soft);display:block;margin-bottom:5px">Communes correspondantes :</span>'
    + matches.map(v => `<button type="button" class="btn btn-grey" style="margin:2px 2px 2px 0;padding:4px 10px;font-size:12px;border-radius:100px" onclick="addCpsFromVille(${JSON.stringify(JSON.stringify(v.cps))})">${escHtml(v.nom)} (${v.cps.join(', ')})</button>`).join('');
  sug.style.display='block';
}
function addCpsFromVille(jsonStr){
  const cps = JSON.parse(jsonStr);
  const input = document.getElementById('v-cp');
  if(!input) return;
  const existing = parsePostalCodesInput(input.value);
  const merged = [...new Set([...existing, ...cps])];
  input.value = merged.join(', ');
  const sug = document.getElementById('v-cp-suggest');
  if(sug) sug.style.display='none';
}
// Le barème payé au transporteur par mission (remplace l'ancien taux fixé par
// transporteur, désormais sans effet — voir api/_lib/bareme.js) : éditable
// ici par ville, null = valeur par défaut du barème Loc'Air.
const BAREME_DEFAULTS = { tarif_livraison_autonome: 30, tarif_livraison_technicien: 40, tarif_recuperation: 30, tarif_changement: 40 };
const BAREME_FIELDS = [
  ['tarif_livraison_autonome_cents',   'tarif_livraison_autonome',   'Livraison autonome'],
  ['tarif_livraison_technicien_cents', 'tarif_livraison_technicien', 'Livraison + installation'],
  ['tarif_recuperation_cents',         'tarif_recuperation',         'Récupération'],
  ['tarif_changement_cents',           'tarif_changement',           'Remplacement'],
];
function baremeSummaryHtml(c){
  return BAREME_FIELDS.map(([col, key, label]) => {
    const euros = c[col] != null ? (c[col]/100) : BAREME_DEFAULTS[key];
    return `${label} ${euros}€`;
  }).join(' · ');
}
function editVilleBareme(id){
  const c = VILLES_CACHE.find(x => x.id === id);
  if(!c) return;
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:380px">
      <h2 style="margin-bottom:6px">💶 Barème — ${escHtml(c.name)}</h2>
      <p class="sub" style="margin-bottom:16px">Montant payé au transporteur par mission terminée. Laisser vide = valeur par défaut Loc'Air.</p>
      ${BAREME_FIELDS.map(([col, key, label]) => `
        <label for="bar-${key}">${label} (€)</label>
        <input type="text" inputmode="decimal" id="bar-${key}" placeholder="${BAREME_DEFAULTS[key]}" value="${c[col]!=null ? (c[col]/100) : ''}"/>
      `).join('')}
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Enregistrer</button>
      </div>
      <div class="err" id="bareme-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = async () => {
    const body = { action:'update', id, city_id:'all' };
    BAREME_FIELDS.forEach(([, key]) => { body[key] = document.getElementById(`bar-${key}`).value.trim(); });
    okBtn.disabled = true;
    try{
      const r = await fetch(API('admin-cities'), {method:'POST', headers:authHeaders(), body:JSON.stringify(body)});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      closeModal();
      loadVilles();
      showToast('Barème mis à jour', 'success');
    }catch(e){
      okBtn.disabled = false;
      const errEl = document.getElementById('bareme-err');
      if(errEl){ errEl.textContent = e.message; errEl.style.display='block'; }
    }
  };
}
async function addVille(){
  const name = document.getElementById('v-nom').value.trim();
  const dep = document.getElementById('v-dep').value.trim();
  const postal_codes = parsePostalCodesInput(document.getElementById('v-cp').value);
  const errEl = document.getElementById('ville-err');
  errEl.style.display='none';
  if(!name){ errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
  try{
    const r = await fetch(API('admin-cities'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'create', name, dep, postal_codes, city_id:'all'})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadVilles();
    loadCitySwitcher();
    showToast('Ville créée', 'success');
  }catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}

// ── Suivi en direct (carte gratuite OpenStreetMap) ───────────────────────────
// Trajet affiché en ligne droite (pas d'itinéraire routier) et ETA estimé à
// vitesse moyenne — pas de clé API, pas de coût. Voir supabase/README.md pour
// upgrade éventuel vers un vrai itinéraire (Google/Mapbox) plus tard.
let LIVE_MAP = null, LIVE_MARKER = null, LIVE_DEST_MARKER = null, LIVE_LINE = null, LIVE_POLL = null, LIVE_DEST_COORDS = null;

function haversineKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocodeAddress(address){
  try{
    const q = encodeURIComponent(address);
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=fr&q=${q}`);
    const d = await r.json();
    if(d && d[0]) return {lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}

async function openLiveMap(transporteurId, transporteurNom, adresse){
  const overlay = document.createElement('div');
  overlay.className = 'map-overlay';
  overlay.id = 'map-overlay';
  const avgLiv = avgDureeSurPlaceForTransporteur(transporteurId, 'livraison');
  const avgRec = avgDureeSurPlaceForTransporteur(transporteurId, 'recuperation');
  const statsLines = [
    avgLiv ? `📦 Livraison : ${avgLiv.avg} min en moyenne sur place (${avgLiv.n} mission${avgLiv.n>1?'s':''})` : '',
    avgRec ? `🔄 Récupération : ${avgRec.avg} min en moyenne sur place (${avgRec.n} mission${avgRec.n>1?'s':''})` : '',
  ].filter(Boolean);
  overlay.innerHTML = `
    <div class="map-modal">
      <div class="map-modal-head"><h2>🔴 ${escHtml(transporteurNom)} en direct</h2><button onclick="closeLiveMap()">✕</button></div>
      ${statsLines.length?`<div class="map-stats">${statsLines.join('<br/>')}</div>`:''}
      <div id="live-map"></div>
      <div class="map-eta" id="map-eta">Chargement…</div>
    </div>`;
  document.body.appendChild(overlay);

  LIVE_DEST_COORDS = await geocodeAddress(adresse + ', France');

  setTimeout(() => {
    LIVE_MAP = L.map('live-map', {zoomControl:true, attributionControl:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19, subdomains:'abcd',
    }).addTo(LIVE_MAP);

    if(LIVE_DEST_COORDS){
      LIVE_DEST_MARKER = L.marker([LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng], {
        icon: L.divIcon({className:'', html:'<div class="map-pin-teardrop"><span>🏠</span></div>', iconSize:[32,32], iconAnchor:[16,32]}),
      }).addTo(LIVE_MAP);
    }

    refreshLivePosition(transporteurId);
    LIVE_POLL = setInterval(() => refreshLivePosition(transporteurId), 8000);
  }, 50);
}

async function refreshLivePosition(transporteurId){
  const etaEl = document.getElementById('map-eta');
  if(!etaEl) return; // la modale a été fermée entre-temps
  try{
    const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'position', transporteur_id: transporteurId})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Position indisponible pour le moment');

    const point = [d.lat, d.lng];
    if(!LIVE_MARKER){
      LIVE_MARKER = L.marker(point, {
        icon: L.divIcon({className:'', html:'<div class="map-pin-live">🛵</div>', iconSize:[34,34], iconAnchor:[17,17]}),
      }).addTo(LIVE_MAP);
    } else {
      LIVE_MARKER.setLatLng(point);
    }

    const bounds = LIVE_DEST_COORDS ? L.latLngBounds([point, [LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng]]) : L.latLngBounds([point, point]);
    LIVE_MAP.fitBounds(bounds, {padding: [40,40], maxZoom: 16});

    if(LIVE_DEST_COORDS){
      if(LIVE_LINE) LIVE_MAP.removeLayer(LIVE_LINE);
      LIVE_LINE = L.polyline([point, [LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng]], {color:'#1b3a5f', weight:3, dashArray:'6,8'}).addTo(LIVE_MAP);
    }

    const ageSec = Math.round((Date.now() - new Date(d.position_at).getTime()) / 1000);
    const stale = ageSec > 90;
    let etaTxt = '';
    if(LIVE_DEST_COORDS){
      const km = haversineKm(point[0], point[1], LIVE_DEST_COORDS.lat, LIVE_DEST_COORDS.lng);
      const minutes = Math.max(1, Math.round(km / 22 * 60)); // ~22 km/h en ville — estimation, pas de trafic réel
      etaTxt = `<strong>~${minutes} min</strong> (${km.toFixed(1)} km, estimation)`;
    }
    etaEl.innerHTML = `<span class="${stale?'map-stale':''}">${stale ? '⚠️ Signal perdu — dernière position il y a '+Math.round(ageSec/60)+' min' : 'Mis à jour il y a '+ageSec+'s'}</span><span>${etaTxt}</span>`;
  }catch(e){
    etaEl.innerHTML = `<span class="map-stale">⚠️ ${escHtml(e.message)}</span>`;
  }
}

function closeLiveMap(){
  if(LIVE_POLL) clearInterval(LIVE_POLL);
  LIVE_POLL = null;
  if(LIVE_MAP){ LIVE_MAP.remove(); LIVE_MAP = null; }
  LIVE_MARKER = null; LIVE_DEST_MARKER = null; LIVE_LINE = null; LIVE_DEST_COORDS = null;
  const o = document.getElementById('map-overlay');
  if(o) o.remove();
}
