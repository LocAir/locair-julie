  let items = RESERVATIONS_CACHE.filter(r => RESERVATIONS_SHOW_MASQUEES ? r.masquee : !r.masquee);
  if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER === 'prolongation') items = items.filter(r => r.source === 'site_prolongation');
  else if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER === 'hors_zone') items = items.filter(r => r.hors_zone);
  // "Toutes" = réservations actives (en attente + confirmées) — une fois
  // annulée ou terminée, une réservation n'attend plus rien de l'admin au
  // jour le jour, elle se range dans son propre filtre (déjà présent en
  // dessous) plutôt que de noyer celles qui restent à suivre.
  else if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER === 'toutes') items = items.filter(r => !['annulee','terminee'].includes(r.statut));
  else if(!RESERVATIONS_SHOW_MASQUEES && RESERVATIONS_FILTER !== 'toutes') items = items.filter(r => r.statut === RESERVATIONS_FILTER);
  if(q){
    items = items.filter(r => [r.ref, r.prenom, r.nom, r.adresse, r.tel].filter(Boolean).join(' ').toLowerCase().includes(q));
  }
  // Les plus urgentes (date la plus proche/la plus en retard) en premier —
  // sur les filtres où l'urgence compte : "Actives" et les filtres par statut
  // qui restent à traiter (en attente, confirmées, hors zone, prolongations).
  // "Annulées"/"Terminées" gardent l'ordre par défaut de l'API (création la
  // plus récente en premier) : une fois close, une réservation n'a plus
  // d'échéance à surveiller, seul "la dernière en date" est utile à retrouver.
  const RESA_URGENCY_FILTERS = ['toutes', 'hors_zone', 'prolongation', 'en_attente', 'confirmee'];
  if(!RESERVATIONS_SHOW_MASQUEES && RESA_URGENCY_FILTERS.includes(RESERVATIONS_FILTER)){
    items = [...items].sort((a,b) => resaUrgencyDate(a).localeCompare(resaUrgencyDate(b)));
  }
  list.innerHTML = items.map(r => reservationRowHtml(r)).join('') || `<p class="empty">🧾 ${RESERVATIONS_SHOW_MASQUEES?'Aucune réservation supprimée.':'Aucune réservation pour l\'instant.'}</p>`;
}

async function createReservation(confirmer){
  const submitBtn = document.getElementById(confirmer ? 'nr-submit-confirme' : 'nr-submit-attente');
  if(submitBtn && submitBtn.disabled) return;
  const errEl = document.getElementById('new-resa-err');
  errEl.style.display = 'none';
  const motifs = [...document.querySelectorAll('#nr-motifs button.on')].map(b => b.dataset.motif).join(', ');
  const body = {
    action: 'create',
    confirmer,
    prenom: document.getElementById('nr-prenom').value.trim(),
    nom: document.getElementById('nr-nom').value.trim(),
    tel: document.getElementById('nr-tel').value.trim(),
    tel_secondaire: document.getElementById('nr-tel2').value.trim(),
    email: document.getElementById('nr-email').value.trim(),
    adresse: document.getElementById('nr-adresse').value.trim(),
    date_debut: document.getElementById('nr-debut').value,
    date_fin: document.getElementById('nr-fin').value,
    quantite: document.getElementById('nr-qte').value,
    prix_total_cents: Math.round((parseFloat(document.getElementById('nr-prix').value)||0)*100),
    logement: document.getElementById('nr-logement').value,
    parrain_code: document.getElementById('nr-parrain').value.trim(),
    motifs,
    mkt_consent: document.getElementById('nr-mkt').checked,
    ...typeClientPayload('nr'),
    ...logisticsPayload('nr'),
  };
  if(!body.prenom || !body.nom || !body.adresse || !body.date_debut || !body.date_fin){
    errEl.textContent = 'Prénom, nom, adresse et dates sont obligatoires.';
    errEl.style.display = 'block';
    return;
  }
  await submitReservation(body, submitBtn, errEl);
}
async function submitReservation(body, submitBtn, errEl){
  // Verrou anti-double-clic : une réservation manuelle engage un vrai paiement
  // et un vrai appareil — un double-clic (ou un clic pendant que la requête
  // précédente est encore en cours) ne doit jamais créer deux réservations.
  document.querySelectorAll('#nr-submit-attente, #nr-submit-confirme').forEach(b => b.disabled = true);
  try{
    const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok){
      if(d.duplicate){
        confirmAction(d.error, () => { body.force = true; submitReservation(body, submitBtn, errEl); }, {danger:true, yesLabel:'Créer quand même'});
        return;
      }
      throw new Error(d.error||'Erreur');
    }
    if(d.reservation){
      RESERVATIONS_CACHE.unshift(d.reservation);
    }
    setReservationsView('liste');
    showToast(d.en_attente ? `Réservation ${d.ref} créée, en attente de paiement` : `Réservation ${d.ref} créée et confirmée`, 'success');
  }catch(e){
    errEl.textContent = e.message; errEl.style.display = 'block';
  }finally{
    document.querySelectorAll('#nr-submit-attente, #nr-submit-confirme').forEach(b => b.disabled = false);
  }
}
function cancelReservation(id){
  confirmAction('Annuler cette réservation ? Cette action libère le stock associé et annule ses missions non terminées.', async () => {
    const res = RESERVATIONS_CACHE.find(r => r.id===id);
    const prev = res?.statut;
    if(res){ res.statut = 'annulee'; renderReservations(); }
    try{
      const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, statut:'annulee'})});

      loadAlerts();
      showToast('Réservation annulée', 'success');
    }catch(e){
      if(res){ res.statut = prev; renderReservations(); }
      showToast(e.message, 'error');

  }, {danger:true, yesLabel:'Annuler la réservation'});
}

    if(!raison){ errEl.textContent = 'Indique la raison du remboursement'; errEl.style.display='block'; return; }
    confirmAction(`Confirmer le remboursement de ${montant.toFixed(2)} € ? Cette action est irréversible.`, async () => {
      okBtn.disabled = true;
      try{
        const resp = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
          action:'rembourser', id, montant_cents: Math.round(montant*100), raison,

    }, {danger:true, yesLabel:'Oui, rembourser'});

        <button class="btn btn-blue">Proposer</button>
      </div>
      <div class="err" id="op-manuel-err"></div>
    </div>`;
  document.body.appendChild(overlay);

    okBtn.disabled = true;

function updateReservationStatut(id, statut, selectEl){

    () => doUpdateReservationStatut(id, statut),
    { onCancel: () => { if(selectEl) selectEl.value = ''; } }

async function doUpdateReservationStatut(id, statut){
  const res = RESERVATIONS_CACHE.find(r => r.id===id);
  const prev = res?.statut;
  if(res){ res.statut = statut; renderReservations(); }
  try{
    const r = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, statut})});
    if(!r.ok) throw new Error((await r.json()).error||'Erreur');
    loadAlerts();
    showToast('Statut mis à jour', 'success');

function deleteReservation(id, statut){
  const warn = (statut==='confirmee'||statut==='en_attente')
    ? " Cette réservation est encore active — la retirer de l'écran ne l'annule pas et ne libère pas le stock, elle disparaît juste de cette liste (et de l'onglet Livraisons)."

async function restoreReservation(id){

// Moyenne du temps passé sur place (arrivée → terminé), à partir des horodatages
// posés automatiquement pendant le parcours du livreur — aucune saisie manuelle.
// Sert à objectiver des hypothèses comme "20-30 min d'installation" avec de la
// vraie donnée plutôt qu'une estimation.
function avgDureeSurPlace(type){
  const vals = LIVRAISONS_CACHE
    .filter(m => m.type===type && m.statut==='fait' && m.duree_sur_place_min!=null)
    .map(m => m.duree_sur_place_min);
  if(!vals.length) return null;
  return Math.round(vals.reduce((s,v)=>s+v,0) / vals.length);
}
// Même moyenne, mais isolée pour un livreur précis — affichée à côté de la
// carte en temps réel pour donner du contexte pendant qu'on suit sa mission.
function avgDureeSurPlaceForTransporteur(transporteurId, type){
  const vals = LIVRAISONS_CACHE
    .filter(m => m.type===type && m.statut==='fait' && m.duree_sur_place_min!=null && m.transporteur?.id===transporteurId)
    .map(m => m.duree_sur_place_min);
  if(!vals.length) return null;
  return { avg: Math.round(vals.reduce((s,v)=>s+v,0) / vals.length), n: vals.length };
}
function renderLivraisonsToolbar(){

function setLivraisonsFilter(key){ LIVRAISONS_SHOW_MASQUEES = false; LIVRAISONS_FILTER = key; LIVRAISONS_NON_ASSIGNEES_ALERT_ONLY = false; renderLivraisonsToolbar(); renderLivraisons(); }
function toggleLivraisonsMasquees(){ LIVRAISONS_SHOW_MASQUEES = !LIVRAISONS_SHOW_MASQUEES; renderLivraisonsToolbar(); renderLivraisons(); }

function renderLivraisons(){
  const list = document.getElementById('liv-list');
  if(!list) return;
  const q = (document.getElementById('liv-search')?.value || '').trim().toLowerCase();

  let items = LIVRAISONS_CACHE.filter(m => LIVRAISONS_SHOW_MASQUEES ? m.masquee : !m.masquee);
  if(!LIVRAISONS_SHOW_MASQUEES){
    // "À venir" = actives dont la date prévue n'est pas encore arrivée —
    // isole les missions déjà acceptées à l'avance (voir date-gate côté
    // transporteur) de ce qui reste réellement à traiter aujourd'hui.
    if(LIVRAISONS_FILTER === 'a_venir') items = items.filter(m => m.date_prevue > new Date().toISOString().slice(0,10) && !['fait','annule'].includes(m.statut));
    else if(LIVRAISONS_FILTER === 'non_assignees'){
      items = items.filter(m => m.statut==='a_faire' && !m.transporteur);
      // Venue du bandeau d'alerte : le compteur ne compte que ce qui est dû
      // sous 72h (voir api/admin-alerts.js) — sans ce filtre en plus ici, le
      // clic sur "3 non assignées" atterrirait sur une liste qui en montre
      // plus, et le chiffre du bandeau perdrait toute crédibilité.
      if(LIVRAISONS_NON_ASSIGNEES_ALERT_ONLY){
        const horizon = new Date(); horizon.setDate(horizon.getDate()+3);
        const horizonStr = horizon.toISOString().slice(0,10);
        items = items.filter(m => m.date_prevue <= horizonStr);
      }
    }
    // "En retard" : mêmes critères que l'alerte 🚨 du bandeau (api/admin-alerts.js)
    // — tous types de mission confondus (une livraison ou un remplacement en
    // retard est au moins aussi urgent qu'une récupération), statut pas
    // encore commencé/terminé, date prévue dépassée.
    else if(LIVRAISONS_FILTER === 'en_retard'){
      const todayStr = new Date().toISOString().slice(0,10);
      items = items.filter(m => ['a_faire','acceptee'].includes(m.statut) && m.date_prevue < todayStr);
    }
    // "En cours" = réellement actif maintenant, pas juste accepté à
    // l'avance (voir "À venir" ci-dessus) ni "Nouvelle"/non démarrée
    // (a_faire) — même logique que côté transporteur (missionEstEnCours).
    else if(LIVRAISONS_FILTER === 'en_cours'){
      const todayStr = new Date().toISOString().slice(0,10);
      items = items.filter(m => ['arrivee','en_route'].includes(m.statut) || (m.statut==='acceptee' && m.date_prevue<=todayStr));
    }
    else if(LIVRAISONS_FILTER === 'fait') items = items.filter(m => m.statut === 'fait');
    else if(LIVRAISONS_FILTER === 'probleme') items = items.filter(m => m.statut === 'probleme');
    else if(LIVRAISONS_FILTER === 'annule') items = items.filter(m => m.statut === 'annule');
    // "Actives" = tout ce qui attend encore quelque chose du transporteur ou
    // de l'admin — une fois "fait" ou "annule", une mission n'a plus rien à
    // demander, elle se range dans son propre filtre plutôt que de rester
    // mélangée à ce qui reste réellement à traiter.
    else if(LIVRAISONS_FILTER === 'toutes') items = items.filter(m => !['fait','annule'].includes(m.statut));
  }

  if(q){
    items = items.filter(m => {
      const res = m.reservation || {};
      const haystack = [res.ref, res.prenom, res.nom, res.adresse, m.titre, m.adresse_libre].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }

  // Urgence d'abord : la date prévue la plus ancienne (donc la plus en
  // retard) en tête, sur les filtres où ça compte vraiment pour Aly — ce
  // qu'il reste à traiter. Le tri par défaut de l'API (date la plus future
  // en premier) reste tel quel pour "À venir", "Terminées" et "Annulées" :
  // pour "Terminées"/"Annulées" c'est le plus récent d'abord qui est utile
  // (retrouver une mission qui vient de se terminer), et "À venir" n'a rien
  // d'urgent par définition. Le Calendrier a sa propre logique, pas concerné.
  const LIVRAISONS_URGENCY_FILTERS = ['toutes', 'non_assignees', 'en_retard', 'en_cours', 'probleme'];
  if(!LIVRAISONS_SHOW_MASQUEES && LIVRAISONS_URGENCY_FILTERS.includes(LIVRAISONS_FILTER)){
    items = [...items].sort((a,b) => (a.date_prevue||'').localeCompare(b.date_prevue||''));
  }

  if(!items.length){ list.innerHTML = '<p class="empty">🚚 Aucune mission ne correspond.</p>'; return; }

  list.innerHTML = items.map(m => {
    const res = m.reservation || {};
    // Mission "autre" : pas de réservation/client, titre + adresse libres
    // saisis par l'admin à la création (voir openCreateMissionModal).
    const isAutre = m.type === 'autre';
    const displayName = isAutre ? (m.titre || 'Mission libre') : ((res.prenom||'')+' '+(res.nom||''));
    const displayAddr = isAutre ? (m.adresse_libre || '—') : (res.adresse||'—');
    const options = ['<option value="">Non assigné</option>'].concat(
      TRANSPORTEURS_CACHE.map(t => `<option value="${t.id}" ${m.transporteur&&m.transporteur.id===t.id?'selected':''}>${escHtml(t.nom)}</option>`)
    ).join('');
    const mediaBtns = [];
    if(m.photo_depart_path) mediaBtns.push(`<button onclick="viewMedia(${m.id},'photo_depart')">📷 Voir — Départ</button>`);
    if(m.photo_installation_path) mediaBtns.push(`<button onclick="viewMedia(${m.id},'photo_installation')">📷 Voir — Installation</button>`);
    if(m.photo_retour_path) mediaBtns.push(`<button onclick="viewMedia(${m.id},'photo_retour')">📷 Voir — Retour</button>`);
    if(m.photo_absence_path) mediaBtns.push(`<button onclick="viewMedia(${m.id},'photo_absence')">📵 Voir — Preuve passage</button>`);
    const enRoute = m.transporteur && ['acceptee','en_route','arrivee'].includes(m.statut);
    // Icône permanente sur les missions sans livreur — visible même en dehors
    // du filtre "Non assignées", pour qu'une mission non dispatchée ne se
    // perde jamais visuellement dans la liste "Toutes".
    const nonAssignee = m.statut==='a_faire' && !m.transporteur;
    // Une mission déjà terminée ou annulée ne doit plus changer de
    // transporteur : le montant dû a déjà été rattaché à celui qui l'a
    // réellement exécutée (voir admin-virements.js) — réaffecter changerait
    // silencieusement qui est payé pour un travail déjà fait.
    const reassignLocked = ['fait','annule'].includes(m.statut);
    if(m.masquee){
      return `
        <div class="row-item" style="opacity:.6">
          <div class="row-top">
            <span class="row-title">${escHtml(displayName)}</span>
            <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
          </div>
          <div style="margin-bottom:6px">${missionTypeBadge(m.type)}</div>
          <div class="row-meta">${!isInternalRef(res.ref)?escHtml(res.ref)+' · ':''}${escHtml(displayAddr)}<br/>${frDate(m.date_prevue)} · ${escHtml(m.creneau||'')}</div>
          <div class="row-actions"><button class="btn btn-grey" onclick="restoreLivraison(${m.id})">Restaurer</button></div>
        </div>`;
    }
    // Détails secondaires fusionnés en une seule ligne grise (étage, ascenseur,
    // fenêtre, unité assignée, durées, confirmation client) — aucun n'a besoin
    // de sa propre ligne colorée, seuls les éléments qui appellent une action
    // (instructions d'accès, problème, vidange non confirmée) gardent un
    // traitement visuel distinct ci-dessous.
    const detailBits = [];
    if(res.etage) detailBits.push('Étage '+escHtml(res.etage));
    if(res.ascenseur && res.ascenseur!=='—') detailBits.push('Ascenseur : '+escHtml(res.ascenseur));
    if(res.fenetre) detailBits.push('🪟 '+escHtml(res.fenetre));
    if(m.appareil_numeros && m.appareil_numeros.length) detailBits.push(`🔢 n°${m.appareil_numeros.join(', ')}${(m.appareil_references&&m.appareil_references.length)?' · '+m.appareil_references.map(escHtml).join(', '):''}`);
    if(m.duree_trajet_min!=null) detailBits.push(m.duree_trajet_min+' min trajet');
    if(m.duree_sur_place_min!=null) detailBits.push(m.duree_sur_place_min+' min sur place');
    if(m.client_notifie_at) detailBits.push('✅ Client notifié '+frDateHeure(m.client_notifie_at));
    if(isAutre) detailBits.push('💰 '+euros(m.montant_du_cents)+' (tarif fixé)');
    else if(m.montant_manuel) detailBits.push('💰 '+euros(m.montant_du_cents)+' (tarif fixé manuellement)');
    return `
      <div class="row-item" ${nonAssignee?'style="border-left:3px solid var(--red)"':''}>
        <div class="row-top">
          <span class="row-title">${nonAssignee?'🔔 ':''}${escHtml(displayName)}</span>
          <span style="display:flex;gap:6px;align-items:center">
            ${res.hors_zone?`<span class="chip probleme">⚠️ Hors zone</span>`:''}
            <span class="chip ${m.statut}">${LIV_LABEL[m.statut]||m.statut}</span>
          </span>
        </div>
        <div style="margin-bottom:6px">${missionTypeBadge(m.type)}</div>
        <div class="row-meta">${!isInternalRef(res.ref)?escHtml(res.ref)+' · ':''}${escHtml(displayAddr)}<br/>${frDate(m.date_prevue)} · ${escHtml(m.creneau||'')}</div>
        ${detailBits.length?`<div class="row-meta">${detailBits.join(' · ')}</div>`:''}
        ${res.instructions_acces?`<div class="row-meta" style="color:var(--amber);font-weight:700">📌 ${escHtml(res.instructions_acces)}</div>`:''}
        ${m.statut==='probleme'?`<div class="row-meta" style="color:var(--red);font-weight:700;margin-top:6px">⚠️ ${PROBLEME_LABEL[m.probleme_type]||escHtml(m.probleme_type||'')}${m.probleme_description?' — '+escHtml(m.probleme_description):''}</div>`:''}
        ${m.statut==='a_faire' && m.incident_id?`<div class="row-meta" style="color:var(--amber);font-weight:700;margin-top:6px">☎️ A eu un incident — client peut-être de nouveau joignable</div>`:''}
        ${(['recuperation','changement'].includes(m.type) && m.statut==='fait' && !m.vidange_confirmee)?`<div class="row-meta" style="color:var(--amber)">⚠️ Vidange non confirmée</div>`:''}
        <div class="row-actions">
          ${contactButtonsHtml(res.tel)}
          ${nonAssignee?`<div style="width:100%;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--red);margin-bottom:-2px">Assigner un transporteur →</div>`:''}
          <select onchange="assignTransporteur(${m.id}, this.value, this)" ${reassignLocked?'disabled title="Mission terminée/annulée : transporteur figé (paiement déjà rattaché)"':''} style="${nonAssignee?'border-color:var(--red);border-width:1.5px':''}">${options}</select>
          ${enRoute?`<button class="btn btn-blue" onclick="openLiveMap(${m.transporteur.id}, '${escHtml(m.transporteur.nom).replace(/'/g,"\\'")}', '${escHtml(res.adresse||'').replace(/'/g,"\\'")}')">🔴 Suivre en direct</button>`:''}
          ${m.statut==='probleme'?`<button class="btn btn-green" onclick="resolveProbleme(${m.id})">✅ Problème résolu</button>`:''}
          ${mediaBtns.length===0 && m.statut==='fait' ? '<span class="row-meta" style="align-self:center">Aucune preuve enregistrée</span>' : ''}
          <details class="more-actions" style="margin-left:auto">
            <summary title="Plus d'actions">⋯</summary>
            <div class="more-actions-menu">
              ${!reassignLocked?`<button onclick="openEditMissionModal(${m.id})">✏️ Modifier</button>`:''}
              ${(!isAutre && !reassignLocked)?`<button onclick="openChangeAppareilModal(${m.id})">🔄 Changer le climatiseur</button>`:''}
              ${(!isAutre && !reassignLocked)?`<button onclick="fixerTarifTransporteur(${m.id},${m.montant_du_cents||0})">💰 Fixer le tarif transporteur</button>`:''}
              ${['acceptee','en_route','arrivee','probleme'].includes(m.statut)?`<button onclick="remettreAFaire(${m.id})">↩️ Remettre en attente d'acceptation</button>`:''}
              ${mediaBtns.join('')}
              <button class="danger" onclick="maskLivraison(${m.id})">🗑️ Supprimer de l'écran</button>
            </div>
          </details>
        </div>
      </div>`;
  }).join('');
}

// ── Modifier une mission ────────────────────────────────────────────────────
// Pour une mission "autre" : titre/adresse/tarif/date/créneau lui appartiennent
// en propre. Pour une mission normale, seuls date/créneau sont à elle — le
// reste (nom, téléphone, adresse, étage...) vit sur la réservation liée, donc
// corrigé via une 2e requête (admin-reservations action 'update').
function openEditMissionModal(livraisonId){
  const m = LIVRAISONS_CACHE.find(x => x.id === livraisonId);
  if(!m) return;
  closeModal();
  const isAutre = m.type === 'autre';
  const res = m.reservation || {};
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:420px;max-height:85vh;overflow-y:auto">
      <h2 style="margin-bottom:14px">✏️ Modifier la mission</h2>
      ${isAutre ? `
        <label for="em-titre">Instructions</label>
        <input type="text" id="em-titre" value="${escHtml(m.titre||'')}"/>
        <label for="em-adresse" style="margin-top:8px">Adresse</label>
        <input type="text" id="em-adresse" value="${escHtml(m.adresse_libre||'')}"/>
        <label for="em-tarif" style="margin-top:8px">Tarif payé au transporteur (€)</label>
        <input type="number" id="em-tarif" min="0" step="0.5" value="${((m.montant_du_cents||0)/100)}"/>
      ` : `
        <label for="em-prenom">Prénom</label>
        <input type="text" id="em-prenom" value="${escHtml(res.prenom||'')}"/>
        <label for="em-nom" style="margin-top:8px">Nom</label>
        <input type="text" id="em-nom" value="${escHtml(res.nom||'')}"/>
        <label for="em-tel" style="margin-top:8px">Téléphone</label>
        <input type="tel" id="em-tel" value="${escHtml(res.tel||'')}"/>
        <label for="em-adresse-r" style="margin-top:8px">Adresse</label>
        <input type="text" id="em-adresse-r" value="${escHtml(res.adresse||'')}"/>
        <div class="inline-form" style="margin-top:8px">
          <div><label for="em-etage">Étage</label><input type="text" id="em-etage" value="${escHtml(res.etage||'')}"/></div>
          <div><label for="em-ascenseur">Ascenseur</label><input type="text" id="em-ascenseur" value="${escHtml(res.ascenseur||'')}"/></div>
        </div>
        <label for="em-instructions" style="margin-top:8px">Instructions d'accès</label>
        <input type="text" id="em-instructions" value="${escHtml(res.instructions_acces||'')}"/>
      `}
      <div class="inline-form" style="margin-top:8px">
        <div><label for="em-date">Date</label><input type="date" id="em-date" value="${m.date_prevue||''}"/></div>
        <div><label for="em-creneau">Créneau</label><input type="text" id="em-creneau" value="${escHtml(m.creneau||'')}" placeholder="8h–10h"/></div>
      </div>
      <div class="modal-actions" style="margin-top:18px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue">Enregistrer</button>
      </div>
      <div class="err" id="em-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  okBtn.onclick = async () => {
    const errEl = document.getElementById('em-err');
    errEl.style.display = 'none';
    okBtn.disabled = true;
    try{
      const missionPatch = {
        action: 'update', livraison_id: livraisonId,
        date_prevue: document.getElementById('em-date').value,
        creneau: document.getElementById('em-creneau').value.trim(),
      };
      if(isAutre){
        missionPatch.titre = document.getElementById('em-titre').value.trim();
        missionPatch.adresse_libre = document.getElementById('em-adresse').value.trim();
        missionPatch.montant_du_cents = Math.round((parseFloat(document.getElementById('em-tarif').value)||0)*100);
      }
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify(missionPatch)});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');

      if(!isAutre && res.id){
        const rr = await fetch(API('admin-reservations'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
          action: 'update', id: res.id,
          prenom: document.getElementById('em-prenom').value.trim(),
          nom: document.getElementById('em-nom').value.trim(),
          tel: document.getElementById('em-tel').value.trim(),
          adresse: document.getElementById('em-adresse-r').value.trim(),
          etage: document.getElementById('em-etage').value.trim(),
          ascenseur: document.getElementById('em-ascenseur').value.trim(),
          instructions_acces: document.getElementById('em-instructions').value.trim(),
        })});
        const rd = await rr.json();
        if(!rr.ok) throw new Error(rd.error||'Erreur lors de la mise à jour du client');
      }

      closeModal();
      loadLivraisons();
      showToast('Mission mise à jour', 'success');
    }catch(e){
      okBtn.disabled = false;
      errEl.textContent = e.message; errEl.style.display = 'block';
    }
  };
}

// Changer le climatiseur d'une mission — l'admin choisit dans le stock
// disponible plutôt que de taper un numéro au hasard (reaffecterAppareilReservation
// existant, plus rapide mais à l'aveugle, reste accessible depuis Réservations).
// Réaffecte au niveau de la réservation (même mécanisme que admin-stock
// action 'reassign') — une réservation n'a en pratique qu'un seul appareil
// dans l'immense majorité des cas.
async function openChangeAppareilModal(livraisonId){
  const m = LIVRAISONS_CACHE.find(x => x.id === livraisonId);
  if(!m || !m.reservation || !m.reservation.id) return;
  closeModal();
  let appareilsDispo = [];
  try{
    const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:'{}'});
    const d = await r.json();
    appareilsDispo = (d.appareils||[]).filter(a => a.statut==='disponible' && !a.en_location);
  }catch(e){}
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay-el';
  const currentNumeros = (m.appareil_numeros||[]).join(', ') || '—';
  const appareilOptions = appareilsDispo.map(a =>
    `<option value="${a.numero}">n°${a.numero}${a.reference?' · '+escHtml(a.reference):''}</option>`
  ).join('');
  overlay.innerHTML = `
    <div class="modal-box">
      <h2 style="margin-bottom:4px">🔄 Changer le climatiseur</h2>
      <p class="row-meta" style="margin-bottom:14px">Actuellement n°${escHtml(currentNumeros)} — ${escHtml((m.reservation.prenom||'')+' '+(m.reservation.nom||''))}</p>
      <label for="ca-appareil">Nouveau climatiseur (disponible en stock)</label>
      <select id="ca-appareil" ${appareilOptions?'':'disabled'}>${appareilOptions || '<option value="">Aucun climatiseur disponible</option>'}</select>
      <div class="modal-actions" style="margin-top:18px">
        <button class="btn btn-grey">Annuler</button>
        <button class="btn btn-blue" ${appareilOptions?'':'disabled'}>Changer</button>
      </div>
      <div class="err" id="ca-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;
  // Si l'appareil demandé est déjà retenu par une autre réservation, l'API
  // renvoie 409 + les infos du conflit au lieu de bloquer — on repropose
  // alors un échange (swap:true) après confirmation explicite, plutôt que
  // de forcer l'admin à repasser par la fiche de l'autre client.
  async function submitReassign(numero, swap){
    const r = await fetch(API('admin-stock'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'reassign', reservation_id:m.reservation.id, appareil_numero:numero, swap:swap||undefined})});
    const d = await r.json();
    if(!r.ok){ const err = new Error(d.error||'Erreur'); err.conflit = d.conflit; throw err; }
    return d;
  }
  okBtn.onclick = async () => {
    const errEl = document.getElementById('ca-err');
    errEl.style.display = 'none';
    const numero = parseInt(document.getElementById('ca-appareil').value);
    if(!numero){ errEl.textContent = 'Choisis un climatiseur.'; errEl.style.display = 'block'; return; }
    okBtn.disabled = true;
    try{
      await submitReassign(numero, false);
      closeModal();
      loadLivraisons();
      showToast(`Climatiseur n°${numero} affecté`, 'success');
    }catch(e){
      if(e.conflit){
        closeModal();
        confirmAction(
          `Le climatiseur n°${numero} est actuellement affecté à ${e.conflit.client||'une autre réservation'} (${e.conflit.ref||'sans réf.'}). Veux-tu échanger les deux climatiseurs ?`,
          async () => {
            try{
              await submitReassign(numero, true);
              loadLivraisons();
              showToast(`Climatiseurs échangés — n°${numero} affecté`, 'success');
            }catch(e2){ showToast(e2.message, 'error'); }
          },
          { yesLabel: 'Échanger', onCancel: () => openChangeAppareilModal(livraisonId) }
        );
        return;
      }
      okBtn.disabled = false;
      errEl.textContent = e.message; errEl.style.display = 'block';
    }
  };
}

// Fixe manuellement le montant payé au transporteur pour cette mission
// précise (ex. mission hors zone à 95€ au lieu du barème standard de la
// ville) — empêche le recalcul automatique au passage à "fait" côté
// transporteur (voir montant_manuel, api/transporteur-action.js).
function fixerTarifTransporteur(livraisonId, currentCents){
  promptAction({
    title: '💰 Tarif transporteur pour cette mission',
    label: 'Montant payé au transporteur (€) — remplace le barème standard',
    value: currentCents ? String(currentCents/100) : '',
    placeholder: 'Ex. 95', type: 'number',
  }, async (val) => {
    const cents = Math.round((parseFloat(val)||0)*100);
    if(!cents) return showToast('Montant invalide', 'error');
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', livraison_id:livraisonId, montant_du_cents:cents})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadLivraisons();
      showToast(`Tarif transporteur fixé à ${euros(cents)}`, 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}

async function assignTransporteur(livraisonId, transporteurId, selectEl){
  // Verrou anti-double-clic : bloque le select le temps de la requête pour
  // éviter deux assignations qui se chevauchent sur la même mission.
  if(selectEl) selectEl.disabled = true;
  const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'assign', livraison_id:livraisonId, transporteur_id: transporteurId||null})});
  const d = await r.json().catch(()=>({}));
  if(d.reset){
    showToast('Mission remise à "à faire" pour le nouveau livreur', 'success');
    loadLivraisons();
    return;
  }
  const m = LIVRAISONS_CACHE.find(x => x.id === livraisonId);
  if(m) m.transporteur = TRANSPORTEURS_CACHE.find(t => t.id == transporteurId) || null;
  // Rafraîchit le badge "non assignées" et le filtre courant (sinon la mission
  // qu'on vient d'assigner reste affichée dans "⚠️ Non assignées" jusqu'au
  // prochain rechargement complet de l'onglet). On garde la recherche en cours
  // pour ne pas l'effacer sous les pieds de l'admin qui vient de l'écrire.
  const searchVal = document.getElementById('liv-search')?.value || '';
  renderLivraisonsToolbar();
  const searchEl = document.getElementById('liv-search');
  if(searchEl) searchEl.value = searchVal;
  renderLivraisons();
  loadAlerts();
}
function maskLivraison(livraisonId){
  confirmAction('Supprimer cette mission de l\'écran ? Ça ne touche ni son statut ni les données réelles — juste le fait qu\'elle s\'affiche ici. Récupérable via "Afficher les missions supprimées" en bas de page.', async () => {
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'mask', livraison_id:livraisonId, masquee:true})});
      if(!r.ok) throw new Error((await r.json()).error||'Erreur');
      const m = LIVRAISONS_CACHE.find(x => x.id===livraisonId);
      if(m) m.masquee = true;
      renderLivraisonsToolbar();
      loadAlerts();
      showToast('Mission supprimée de l\'écran', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  }, {danger:true, yesLabel:'Supprimer de l\'écran'});
}
async function restoreLivraison(livraisonId){
  try{
    const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'mask', livraison_id:livraisonId, masquee:false})});
    if(!r.ok) throw new Error((await r.json()).error||'Erreur');
    const m = LIVRAISONS_CACHE.find(x => x.id===livraisonId);
    if(m) m.masquee = false;
    renderLivraisonsToolbar();
    loadAlerts();
    showToast('Mission restaurée', 'success');
  }catch(e){ showToast(e.message, 'error'); }
}
function resolveProbleme(livraisonId){
  confirmAction('Confirmer que le problème est réglé ? Le livreur pourra reprendre la mission (il repassera par l\'étape "arrivé").', async () => {
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'resolve_probleme', livraison_id:livraisonId})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadLivraisons();
      loadAlerts();
      showToast('Mission réactivée', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}
// Équivalent admin du bouton "⏪ Faire plus tard" côté transporteur — utile
// quand une mission a été acceptée par erreur (ou trop en avance pour être
// démarrée) et qu'on ne veut pas dépendre du téléphone du livreur pour la
// remettre en attente d'acceptation.
function remettreAFaire(livraisonId){
  confirmAction('Remettre cette mission en attente d\'acceptation ? Le livreur devra la ré-accepter avant de pouvoir la démarrer.', async () => {
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'remettre_a_faire', livraison_id:livraisonId})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadLivraisons();
      loadAlerts();
      showToast('Mission remise à faire', 'success');
    }catch(e){ showToast(e.message, 'error'); }
  });
}
// ── Affectation par glisser-déposer ───────────────────────────────────────
// Deux colonnes : missions du jour à affecter / transporteurs du jour avec
// leurs missions déjà affectées. Le glisser-déposer ne touche qu'un état
// local en brouillon (AFFECT_STAGED) — rien n'est écrit en base tant qu'Aly
// n'a pas cliqué "Mettre à jour", pour pouvoir se tromper sans risque pendant
// la manipulation. Réutilise l'action 'assign' déjà existante et déjà testée
// (gère la remise à "à faire" d'une mission en cours réaffectée, et les
// notifications push aux deux transporteurs concernés) plutôt que de créer un
// nouvel endpoint : "Mettre à jour" l'appelle une fois par mission modifiée.
let AFFECT_STAGED = null;   // livraison_id -> transporteur_id|null (état en cours d'édition)
let AFFECT_ORIGINAL = null; // livraison_id -> transporteur_id|null (état réel, pour savoir ce qui a changé)

function affectMissionsToday(){
  const todayStr = new Date().toISOString().slice(0,10);
  return LIVRAISONS_CACHE.filter(m => !m.masquee && m.date_prevue===todayStr && ['a_faire','acceptee','en_route','arrivee','probleme'].includes(m.statut));
}
function initAffectStaged(){
  AFFECT_STAGED = {}; AFFECT_ORIGINAL = {};
  affectMissionsToday().forEach(m => {
    const tId = m.transporteur ? m.transporteur.id : null;
    AFFECT_STAGED[m.id] = tId; AFFECT_ORIGINAL[m.id] = tId;
  });
}
function affectDirtyIds(){
  return Object.keys(AFFECT_STAGED).filter(id => AFFECT_STAGED[id] !== AFFECT_ORIGINAL[id]);
}
function renderAffectBoard(){
  const zone = document.getElementById('liv-affect-board');
  if(!zone) return;
  if(!AFFECT_STAGED) initAffectStaged();
  const missions = affectMissionsToday();
  const byId = new Map(missions.map(m => [String(m.id), m]));
  const transporteurs = TRANSPORTEURS_CACHE.filter(t => t.actif && t.nom !== TEST_TRANSPORTEUR_NOM);

  const sortIds = ids => ids.map(id => byId.get(id)).filter(Boolean)
    .sort((a,b) => (a.creneau||'').localeCompare(b.creneau||'') || a.id-b.id);
  const cardHtml = m => {
    const res = m.reservation || {};
    const isAutre = m.type === 'autre';
    const nom = isAutre ? (m.titre || 'Mission libre') : ((res.prenom||'')+' '+(res.nom||''));
    const adresse = isAutre ? (m.adresse_libre||'—') : (res.adresse||'—');
    const dirty = AFFECT_STAGED[m.id] !== AFFECT_ORIGINAL[m.id];
    return `
      <div class="affect-card ${dirty?'dirty':''}" data-id="${m.id}">
        <div class="affect-card-top"><span>${MISSION_TYPE_LABEL[m.type]||m.type}</span>${m.creneau?`<span class="affect-card-cren">${escHtml(m.creneau)}</span>`:''}</div>
        <div class="affect-card-name">${escHtml(nom)}</div>
        <div class="affect-card-addr">📍 ${escHtml(adresse)}</div>
      </div>`;
  };

  if(!missions.length){
    zone.innerHTML = '<p class="empty">🚚 Aucune mission active aujourd\'hui.</p>';
    updateAffectConfirmBar();
    return;
  }

  const unassignedIds = Object.keys(AFFECT_STAGED).filter(id => AFFECT_STAGED[id]==null);
  const unassignedHtml = sortIds(unassignedIds).map(cardHtml).join('') || '<p class="affect-empty-hint">Tout est affecté 👍</p>';

  const transpColHtml = transporteurs.map(t => {
    const idsForT = Object.keys(AFFECT_STAGED).filter(id => AFFECT_STAGED[id]===t.id);
    const cards = sortIds(idsForT).map(cardHtml).join('');
    return `
      <div class="affect-transp-zone" data-transp-id="${t.id}">
        <div class="affect-transp-head">${escHtml(t.nom)}<span class="affect-transp-count">${idsForT.length}</span></div>
        <div class="affect-transp-body">${cards || '<p class="affect-empty-hint">Glisse une mission ici</p>'}</div>
      </div>`;
  }).join('') || '<p class="empty">Aucun transporteur actif.</p>';

  zone.innerHTML = `
    <p class="affect-hint">🖐️ Glisse une mission d'une colonne à l'autre pour l'affecter. Rien n'est appliqué avant "Mettre à jour". Seules les missions d'aujourd'hui apparaissent ici — pour une autre date, utilise la Liste.</p>
    <div class="affect-cols">
      <div class="affect-col">
        <div class="affect-col-title">À affecter</div>
        <div class="affect-unassigned-zone">${unassignedHtml}</div>
      </div>
      <div class="affect-col">
        <div class="affect-col-title">Transporteurs</div>
        ${transpColHtml}
      </div>
    </div>`;
  updateAffectConfirmBar();
  bindAffectDrag();
}
function updateAffectConfirmBar(){
  const bar = document.getElementById('affect-confirm-bar');
  if(!bar || !AFFECT_STAGED) return;
  const n = affectDirtyIds().length;
  bar.classList.toggle('hidden', n===0);
  const countEl = document.getElementById('affect-confirm-count');
  if(countEl) countEl.textContent = `${n} changement${n>1?'s':''} en attente`;
}
function cancelAffectChanges(){
  initAffectStaged();
  renderAffectBoard();
}
async function applyAffectChanges(){
  const dirtyIds = affectDirtyIds();
  if(!dirtyIds.length) return;
  const btn = document.getElementById('affect-confirm-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Mise à jour…'; }
  let ok = 0, fail = 0;
  for(const id of dirtyIds){
    try{
      const r = await fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'assign', livraison_id:Number(id), transporteur_id: AFFECT_STAGED[id]||null})});
      if(!r.ok) throw new Error();
      ok++;
    }catch(e){ fail++; }
  }
  showToast(fail ? `${ok} affectation${ok>1?'s':''} mise${ok>1?'s':''} à jour, ${fail} échec${fail>1?'s':''}` : `${ok} affectation${ok>1?'s':''} mise${ok>1?'s':''} à jour`, fail?'error':'success');
  await loadLivraisons();
  loadAlerts();
}

// Glisser-déposer tactile : le drag-and-drop natif HTML5 ne fonctionne pas au
// doigt sur mobile Safari/Chrome, donc geste codé à la main via Pointer Events
// (unifie souris/tactile/stylet). Une carte "flotte" (ghost) au-dessus du
// doigt pendant le geste ; la carte d'origine reste en place, estompée.
let AFFECT_DRAG = null;
function bindAffectDrag(){
  document.querySelectorAll('#liv-affect-board .affect-card').forEach(card => {
    card.addEventListener('pointerdown', onAffectDragStart);
  });
}
function onAffectDragStart(e){
  if(e.button != null && e.button !== 0) return;
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  AFFECT_DRAG = {
    id: card.dataset.id, startX: e.clientX, startY: e.clientY, moved: false,
    offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top, w: rect.width,
  };
  try{ card.setPointerCapture(e.pointerId); }catch(err){}
  card.addEventListener('pointermove', onAffectDragMove);
  card.addEventListener('pointerup', onAffectDragEnd);
  card.addEventListener('pointercancel', onAffectDragEnd);
}
function onAffectDragMove(e){
  if(!AFFECT_DRAG) return;
  const dx = e.clientX - AFFECT_DRAG.startX, dy = e.clientY - AFFECT_DRAG.startY;
  if(!AFFECT_DRAG.moved && Math.hypot(dx,dy) < 6) return;
  if(!AFFECT_DRAG.moved){
    AFFECT_DRAG.moved = true;
    const original = document.querySelector(`#liv-affect-board .affect-card[data-id="${AFFECT_DRAG.id}"]`);
    if(original){
      original.style.opacity = '.35';
      const ghost = original.cloneNode(true);
      ghost.classList.add('affect-ghost');
      ghost.style.width = AFFECT_DRAG.w+'px';
      document.body.appendChild(ghost);
      AFFECT_DRAG.ghost = ghost;
    }
  }
  if(AFFECT_DRAG.ghost){
    AFFECT_DRAG.ghost.style.left = (e.clientX - AFFECT_DRAG.offsetX)+'px';
    AFFECT_DRAG.ghost.style.top = (e.clientY - AFFECT_DRAG.offsetY)+'px';
  }
  document.querySelectorAll('.affect-drop-hover').forEach(z => z.classList.remove('affect-drop-hover'));
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const zone = target && target.closest('.affect-transp-zone, .affect-unassigned-zone');
  if(zone) zone.classList.add('affect-drop-hover');
}
function onAffectDragEnd(e){
  if(!AFFECT_DRAG) return;
  const card = e.currentTarget;
  try{ card.releasePointerCapture(e.pointerId); }catch(err){}
  card.removeEventListener('pointermove', onAffectDragMove);
  card.removeEventListener('pointerup', onAffectDragEnd);
  card.removeEventListener('pointercancel', onAffectDragEnd);
  if(AFFECT_DRAG.ghost) AFFECT_DRAG.ghost.remove();
  document.querySelectorAll('.affect-drop-hover').forEach(z => z.classList.remove('affect-drop-hover'));

  if(AFFECT_DRAG.moved){
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const transpZone = target && target.closest('.affect-transp-zone');
    const unassignedZone = target && target.closest('.affect-unassigned-zone');
    if(transpZone) AFFECT_STAGED[AFFECT_DRAG.id] = Number(transpZone.dataset.transpId);
    else if(unassignedZone) AFFECT_STAGED[AFFECT_DRAG.id] = null;
    renderAffectBoard();
  }
  AFFECT_DRAG = null;
}

function openMediaViewer(url, kind){

let TRANSPORTEURS_VIEW = 'equipe'; // 'equipe' | 'revenus'
// Capacité réaliste d'un livreur : jusqu'à 10 missions/jour. Sert de
// référence pour la barre de charge du jour, affichée ici et côté livreur.
const MISSIONS_CIBLE_JOUR = 10;

  const todayStr = new Date().toISOString().slice(0,10);
  const count = (livraisons||[]).filter(m =>
    m.date_prevue===todayStr && m.transporteur?.id===transporteurId &&
    !['annule','refusee'].includes(m.statut)

  const pct = Math.min(100, Math.round(count/MISSIONS_CIBLE_JOUR*100));

    <div class="dp-bar"><div class="dp-fill ${over?'over':''}" style="width:${pct}%"></div></div>`;

// assignée par erreur pendant un test).

// ── Zones d'intervention + disponibilité (multi-ville) ────────────────────
// Distinct de transporteurs.city_id (ville de rattachement, équipe/paie) :
// transporteur_villes couvre plusieurs zones possibles pour la répartition
// automatique des missions ; transporteur_disponibilites précise jour ×
// moment. Aucune ligne de dispo = disponible tous les jours, tous moments
// (comportement historique inchangé pour un transporteur jamais restreint).
const JOURS_LABELS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MISSION_TYPES_DEF = [
  {key:'livraison',            label:'📦 Livraison',               tarif:'30€'},
  {key:'livraison_technicien', label:'📦 Livraison + installation', tarif:'40€'},
  {key:'recuperation',         label:'🔄 Récupération',            tarif:'30€'},
  {key:'changement',           label:'🔁 Remplacement',            tarif:'40€'},
];
// Disponibilités par défaut : Lundi–Samedi, toute la journée
const DEFAULT_DISPOS = [1,2,3,4,5,6].map(j => ({jour: j, moment: 'journee'}));

function missionTypesHtml(prefix, activeKeys){
  const active = activeKeys == null ? null : new Set(activeKeys);
  return MISSION_TYPES_DEF.map(mt => `
    <label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer">
      <input type="checkbox" id="${prefix}-type-${mt.key}" ${!active||active.has(mt.key)?'checked':''}/>
      <span style="flex:1">${mt.label}</span>
      <span style="font-size:12px;font-weight:700;color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:100px">${mt.tarif}</span>
    </label>`).join('');
}
function collectMissionTypes(prefix){
  return MISSION_TYPES_DEF.map(mt => mt.key).filter(k => document.getElementById(`${prefix}-type-${k}`)?.checked);
}
function villesCheckboxesHtml(prefix, selectedIds){
  const sel = new Set((selectedIds||[]).map(String));
  if(!CITIES_CACHE.length) return '<p class="sub" style="margin:0">Aucune ville configurée.</p>';
  return `<div class="ville-checks">${CITIES_CACHE.map(c => `
    <label><input type="checkbox" id="${prefix}-ville-${c.id}" ${sel.has(String(c.id))?'checked':''}/> ${escHtml(c.name)}</label>
  `).join('')}</div>`;
}
function collectVillesForm(prefix){
  return CITIES_CACHE.map(c => c.id).filter(id => document.getElementById(`${prefix}-ville-${id}`)?.checked);
}
function dispoFormHtml(prefix, dispoRows){
  const byJour = {};
  (dispoRows||[]).forEach(d => { byJour[d.jour] = d.moment; });
  const rows = [0,1,2,3,4,5,6].map(j => {
    const val = byJour[j] || '';
    return `<div class="dispo-row">
      <span class="dispo-day">${JOURS_LABELS[j]}</span>
      <select id="${prefix}-jour-${j}">
        <option value="" ${val===''?'selected':''}>Indisponible</option>
        <option value="matin" ${val==='matin'?'selected':''}>Matin</option>
        <option value="apres_midi" ${val==='apres_midi'?'selected':''}>Après-midi</option>
        <option value="journee" ${val==='journee'?'selected':''}>Toute la journée</option>
      </select>
    </div>`;
  }).join('');
  return `
    <div class="dispo-grid" id="${prefix}-dispo-grid">${rows}</div>
    <div class="periods" style="margin-top:8px">
      <button type="button" onclick="applyDispoPreset('${prefix}','semaine')">Semaine</button>
      <button type="button" onclick="applyDispoPreset('${prefix}','weekend')">Week-end</button>
      <button type="button" onclick="applyDispoPreset('${prefix}','tous')">Tous les jours</button>
    </div>`;
}
function applyDispoPreset(prefix, preset){
  for(let j=0;j<=6;j++){
    const sel = document.getElementById(`${prefix}-jour-${j}`);
    if(!sel) continue;
    if(preset==='semaine') sel.value = (j>=1 && j<=5) ? 'journee' : '';
    else if(preset==='weekend') sel.value = (j===0 || j===6) ? 'journee' : '';
    else sel.value = ''; // 'tous' — vide toutes les lignes = disponible tous les jours
  }
}
function collectDispoForm(prefix){
  const rows = [];
  for(let j=0;j<=6;j++){
    const sel = document.getElementById(`${prefix}-jour-${j}`);
    if(sel && sel.value) rows.push({jour:j, moment:sel.value});
  }
  return rows;
}
function editFiche(id){

      <div class="modal-actions" style="margin-top:18px">

    </div>`;

  const [cancelBtn, okBtn] = overlay.querySelectorAll('.modal-actions .btn');
  cancelBtn.onclick = closeModal;

    const nom = document.getElementById('fiche-nom').value.trim();
    if(!nom){ showToast('Le nom ne peut pas être vide', 'error'); return; }
    const telephone = document.getElementById('fiche-tel').value.trim();
    const email = document.getElementById('fiche-email').value.trim();
    const notes = document.getElementById('fiche-notes').value.trim();
    const types = collectMissionTypes('fiche');
    const allChecked = types.length === MISSION_TYPES_DEF.length;
    const villes = collectVillesForm('fiche');
    const disponibilites = collectDispoForm('fiche');
    okBtn.disabled = true;
    try{
      const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({
        action:'update', id:t.id,
        nom, telephone, email, notes,
        types_autorises: allChecked ? [] : types,
        villes, disponibilites,
      })});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      closeModal();
      loadTransporteursEquipe();
      showToast('Fiche mise à jour', 'success');
    }catch(e){
      okBtn.disabled = false;
      showToast(`Non enregistré : ${e.message}`, 'error');
    }
  };
}

async function loadTransporteursEquipe(){
  const zone = document.getElementById('transp-view-content');

  zone.innerHTML = loading();
  try{
    const [tr, lr, sr] = await Promise.all([
      fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-livraisons'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}),
      fetch(API('admin-transporteur-stats'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})}).catch(()=>null),
    ]);
    const d = await tr.json();
    if(!tr.ok) throw new Error(d.error||'Erreur');
    TRANSPORTEURS_CACHE = d.transporteurs || [];
    const ld = await lr.json().catch(()=>({livraisons:[]}));
    const sd = sr ? await sr.json().catch(()=>({})) : {};
    const statsByT = {};
    (sd.transporteurs||[]).forEach(s => { statsByT[s.id] = s; });

    const testTransp = (d.transporteurs||[]).find(t => t.nom === TEST_TRANSPORTEUR_NOM);
    const testCardHtml = `
      <div class="card" style="border-color:var(--blue)">
        <h2>🧪 Environnement de test</h2>
        <p class="sub">Compte factice pour ouvrir /transporteur et voir/déboguer l'espace livreur toi-même, comme un vrai transporteur — sans jamais générer de vrai virement (taux à 0 €).</p>

async function addTransporteur(){
  const nom = document.getElementById('t-nom').value.trim();
  const telephone = document.getElementById('t-tel').value.trim();
  const email = document.getElementById('t-email').value.trim();
  const errEl = document.getElementById('transp-err');
  errEl.style.display='none';
  if(!nom){ errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
  const types = collectMissionTypes('t-new');
  const allChecked = types.length === MISSION_TYPES_DEF.length;
  const types_autorises = allChecked ? [] : types;
  const extra = {
    types_autorises,
    disponibilites: collectDispoForm('t-new'),
    ...(CITIES_CACHE.length>1 ? { villes: collectVillesForm('t-new') } : {}),
  };
  try{
    const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'create', nom, telephone, email, ...extra})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadTransporteursEquipe();
    showInfo('Transporteur ajouté', `Code personnel à lui communiquer :\n\n${d.pin}\n\nCe code lui permet de se connecter sur /transporteur.`);
  }catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}
function deleteTransporteur(id, nom){
  confirmAction(`Supprimer définitivement ${nom} ? S'il a des missions ou virements liés, il sera désactivé à la place (pour garder l'historique).`, async () => {
    try{
      const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'delete', id})});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Erreur');
      loadTransporteursEquipe();
      showToast(d.deactivated ? d.error : 'Transporteur supprimé', d.deactivated ? 'info' : 'success');
    }catch(e){
      showToast(e.message, 'error');
    }
  }, {danger:true, yesLabel:'Supprimer'});
}
async function toggleTransporteur(id, actif, btnEl){
  if(btnEl) btnEl.disabled = true;
  try{
    const r = await fetch(API('admin-transporteurs'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'update', id, actif})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadTransporteursEquipe();
  }catch(e){
    if(btnEl) btnEl.disabled = false;
    showToast(e.message, 'error');
  }

async function pauseTransporteur(id, pause, btnEl){
  if(btnEl) btnEl.disabled = true;

  }

// Espaces tous les 4 caractères — juste pour l'affichage, jamais stocké ainsi
// (l'API garde l'IBAN compact, plus simple à réutiliser plus tard avec une
// vraie API de virement).
function formatIban(iban){ return (iban||'').replace(/(.{4})/g,'$1 ').trim(); }

// Un partenaire qui a des réservations aujourd'hui/ce mois — recalculé à
// chaque chargement à partir de l'historique réel, jamais un compteur stocké
// à part : le total ne peut donc jamais désynchroniser de la réalité.
function partenaireKpi(reservations){
  const todayStr = new Date().toISOString().slice(0,10);
  const monthStr = todayStr.slice(0,7);
  let ajd = 0, mois = 0, ajdN = 0, moisN = 0;
  (reservations||[]).forEach(r => {
    const day = (r.created_at||'').slice(0,10);
    if(day === todayStr){ ajd += r.commission_cents||0; ajdN++; }
    if(day.slice(0,7) === monthStr){ mois += r.commission_cents||0; moisN++; }
  });
  return {ajd, mois, ajdN, moisN};
}

async function addPartenaire(){
  const nom = document.getElementById('p-nom').value.trim();
  const errEl = document.getElementById('part-err');
  errEl.style.display='none';
  if(!nom){ errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
  const contact_nom = document.getElementById('p-contact').value.trim();
  const telephone = document.getElementById('p-tel').value.trim();
  const email = document.getElementById('p-email').value.trim();
  const taux_commission_pct = parseInt(document.getElementById('p-taux').value) || 10;
  const titulaire_compte = document.getElementById('p-titulaire').value.trim();
  const iban = document.getElementById('p-iban').value.trim();
  const bic = document.getElementById('p-bic').value.trim();
  try{
    const r = await fetch(API('admin-partenaires'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'create', nom, contact_nom, telephone, email, taux_commission_pct, titulaire_compte, iban, bic})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    loadPartenairesEquipe();
    const emailNote = email ? `Un email avec ces infos vient de lui être envoyé automatiquement à ${email}.\n\n` : "Pas d'email enregistré — transmets-lui ces infos toi-même :\n\n";
    showInfo('Ambassadeur ajouté', `${emailNote}Lien à mettre sur son site :\n${partenaireLinkFor(d.code)}\n\nCode personnel pour se connecter sur /partenaire :\n${d.pin}`);
  }catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}
function deletePartenaire(id, nom){

    try{

async function togglePartenaire(id, actif, btnEl){

    try{

// Extrait pour être réutilisé tel quel dans l'onglet général 💶 Virements
// (voir loadVirementsTab) — un seul rendu, jamais deux versions qui pourraient diverger.
function partenaireRevenusCardHtml(p){
  const resasHtml = p.reservations.length ? p.reservations.map(r => `
    <div class="row-item" style="padding:12px 14px;margin-bottom:8px">
      <div class="row-top">
        <span class="row-title" style="font-size:13px">${escHtml(r.client||'—')}${r.ref?' · '+escHtml(r.ref):''}</span>
        <span class="chip ${r.payee?'actif':'en_attente'}">${r.payee?'Versé':'À verser'}</span>
      </div>
      <div class="row-meta">${r.created_at?frDate(r.created_at.slice(0,10)):'—'} · ${euros(r.montant_cents)} réservés → ${euros(r.commission_cents)} de commission</div>
    </div>`).join('') : '';
  // Rappel qu'un virement à un partenaire est une prestation entre deux
  // entreprises — une facture de sa part est normalement attendue en face.
  const virementsHtml = (p.virements||[]).length ? (p.virements||[]).map(v => `
    <div class="row-item" style="padding:12px 14px;margin-bottom:8px">
      <div class="row-top">
        <span class="row-title" style="font-size:13px">${v.verse_at?frDate(v.verse_at.slice(0,10)):'—'} · ${euros(v.montant_cents)}</span>
        <button class="btn ${v.facture_recue?'btn-green':'btn-grey'}" style="padding:3px 10px;font-size:11px;width:auto;min-height:auto" onclick="toggleFactureRecue(${v.id}, this)">${v.facture_recue?'✅ Facture reçue':'⚠️ Facture à demander'}</button>
      </div>
    </div>`).join('') : '';
  // Réconciliation : commission déjà versée pour une réservation ensuite
  // annulée/remboursée — l'argent est sorti pour un service qui n'a
  // finalement pas eu lieu, à régler manuellement (voir migration_partenaires_litiges.sql).
  const litigesHtml = (p.litiges||[]).length ? `
    <div class="row-meta" style="background:var(--red-bg);color:var(--red);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-weight:700">
      ⚠️ ${p.litiges.length} réservation${p.litiges.length>1?'s':''} annulée${p.litiges.length>1?'s':''}/remboursée${p.litiges.length>1?'s':''} après paiement de la commission — ${euros(p.a_recuperer_cents)} à récupérer ou déduire du prochain virement
      <div style="margin-top:8px;font-weight:400">
        ${p.litiges.map(l => `
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(0,0,0,.08)">
            <span>${escHtml(l.client||'—')}${l.ref?' · '+escHtml(l.ref):''} · ${euros(l.commission_cents)}</span>
            <button class="btn btn-grey" style="padding:3px 10px;font-size:11px;width:auto;min-height:auto" onclick="resoudreLitige(${l.id}, this)">Marquer réglé</button>
          </div>`).join('')}
      </div>
    </div>` : '';
  const kpi = partenaireKpi(p.reservations);
  const totalGenere = p.non_verse_cents + p.verse_cents;
  return `
    <div class="card">
      <div class="row-top" style="margin-bottom:14px">
        <h2 style="margin:0">🤝 ${escHtml(p.nom)}</h2>
        <span class="chip ${p.actif?'actif':'annulee'}">${p.actif?'actif':'inactif'}</span>
      </div>
      <div class="stat-grid" style="margin-bottom:14px">
        <div class="stat-tile"><div class="n" style="color:var(--green)">${euros(kpi.ajd)}</div><div class="l">Commission aujourd'hui · ${kpi.ajdN} résa.</div></div>
        <div class="stat-tile"><div class="n" style="color:var(--green)">${euros(kpi.mois)}</div><div class="l">Commission ce mois · ${kpi.moisN} résa.</div></div>
        <div class="stat-tile" style="grid-column:1/-1"><div class="n">${euros(totalGenere)}</div><div class="l">Commission générée au total (${p.reservations.length} réservation${p.reservations.length>1?'s':''})</div></div>
      </div>
      <div class="resa-bottom" style="margin-bottom:14px">
        <span class="resa-price" style="${p.non_verse_cents>0?'color:var(--red)':''}">${euros(p.non_verse_cents)}<span style="font-family:var(--body);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--grey-soft);display:block;margin-top:2px">À verser</span></span>
        <span class="resa-sub">${euros(p.verse_cents)} déjà versés</span>
      </div>
      ${p.demande_en_cours?'<div class="row-meta" style="color:var(--amber);font-weight:700;margin-bottom:10px">🔔 Virement demandé par l\'ambassadeur</div>':''}
      ${litigesHtml}
      ${ribBlockHtml(p)}
      ${p.non_verse_cents>0?`<button class="btn btn-green btn-block" onclick="verserPartenaireMaintenant(${p.id}, '${escHtml(p.nom).replace(/'/g,"\\'")}', ${p.non_verse_cents})">✅ Marquer comme versé (${euros(p.non_verse_cents)})</button>`:''}
      ${p.reservations.length?`
      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-weight:700;font-size:13px;color:var(--blue)">Historique complet (${p.reservations.length} réservation${p.reservations.length>1?'s':''})</summary>
        <div style="margin-top:12px">${resasHtml}</div>
      </details>`:'<p class="row-meta" style="margin-top:8px">Aucune réservation confirmée pour l\'instant.</p>'}
      ${(p.virements||[]).length?`
      <details style="margin-top:8px">
        <summary style="cursor:pointer;font-weight:700;font-size:13px;color:var(--blue)">Virements déjà versés (${p.virements.length}) — factures</summary>
        <div style="margin-top:12px">${virementsHtml}</div>
      </details>`:''}
    </div>`;
}

// ── VIREMENTS (vue consolidée) ────────────────────────────────────────────────
// Un seul endroit pour voir tout ce qu'il y a à payer — transporteurs ET
// partenaires — plutôt que de devoir passer par deux onglets séparés.
// Réutilise exactement les mêmes cartes que Transporteurs→Revenus et
// Partenaires→Revenus (transporteurRevenusCardHtml / partenaireRevenusCardHtml)
// pour ne jamais afficher deux versions différentes du même chiffre.
async function loadVirementsTab(){
  const zone = document.getElementById('tab-virements');
  zone.innerHTML = loading();
  try{
    const [tr, pr] = await Promise.all([
      fetch(API('admin-virements'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'summary'})}),
      fetch(API('admin-partenaire-virements'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'summary'})}),
    ]);
    const td = await tr.json();
    const pd = await pr.json();
    if(!tr.ok) throw new Error(td.error||'Erreur');
    if(!pr.ok) throw new Error(pd.error||'Erreur');

    const transporteurs = (td.transporteurs||[]).filter(t => t.nom !== TEST_TRANSPORTEUR_NOM);
    const partenaires   = pd.partenaires || [];
    const aVerserTransp = transporteurs.reduce((s,t)=>s+(t.non_verse_cents||0),0);
    const aVerserPart   = partenaires.reduce((s,p)=>s+(p.non_verse_cents||0),0);
    const aRecuperer    = partenaires.reduce((s,p)=>s+(p.a_recuperer_cents||0),0);

    const sommaireHtml = `
      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-tile"><div class="n" style="${aVerserTransp>0?'color:var(--red)':''}">${euros(aVerserTransp)}</div><div class="l">À verser · transporteurs</div></div>
        <div class="stat-tile"><div class="n" style="${aVerserPart>0?'color:var(--red)':''}">${euros(aVerserPart)}</div><div class="l">À verser · ambassadeurs</div></div>
        ${aRecuperer>0?`<div class="stat-tile" style="grid-column:1/-1"><div class="n" style="color:var(--red)">${euros(aRecuperer)}</div><div class="l">⚠️ Commissions versées à récupérer (résas annulées/remboursées)</div></div>`:''}
      </div>`;

    const transpSection = `
      <div class="section-title" style="margin-top:0">🚚 Transporteurs</div>
      ${transporteurs.length ? transporteurs.map(transporteurRevenusCardHtml).join('') : '<p class="empty">Aucun transporteur.</p>'}`;

    const partSection = `
      <div class="section-title">🤝 Ambassadeurs</div>
      ${partenaires.length ? partenaires.map(partenaireRevenusCardHtml).join('') : '<p class="empty">Aucun ambassadeur.</p>'}`;

    zone.innerHTML = sommaireHtml + transpSection + partSection;

// Historique consultable des problèmes signalés terrain — jusqu'ici alimenté
// en base mais invisible pour l'admin (juste un compteur "ouverts" sur le
// dashboard). Sert à repérer un motif récurrent (ex. une adresse où le
// digicode pose systématiquement problème).
const INCIDENT_CHIP = {nouveau:'probleme', en_analyse:'a_faire', retard_a_facturer:'a_faire', resolu:'fait', clos:'inactif'};
const INCIDENT_STATUT_LABEL = {nouveau:'Nouveau', en_analyse:'En analyse', retard_a_facturer:'Retard à facturer', resolu:'Résolu', clos:'Clos'};
const INCIDENT_TYPE_LABEL = {
  client_absent:'Client absent', acces_impossible:'Accès impossible', mauvaise_adresse:'Mauvaise adresse',
  materiel_endommage:'Matériel endommagé', probleme_technique:'Problème technique', refus_client:'Refus client',
  retard:'Retard', autre:'Autre',
};
function incidentActionsHtml(i){
  const btns = [];
  if(i.statut==='nouveau') btns.push(`<button class="btn btn-grey" onclick="updateIncidentStatut(${i.id},'en_analyse',this)">🔍 En analyse</button>`);
  if(!['resolu','clos'].includes(i.statut)) btns.push(`<button class="btn btn-green" onclick="updateIncidentStatut(${i.id},'resolu',this)">✅ Marquer résolu</button>`);
  if(i.statut==='resolu') btns.push(`<button class="btn btn-grey" onclick="updateIncidentStatut(${i.id},'clos',this)">🗄️ Clore</button>`);
  return btns.length ? `<div class="row-actions">${btns.join('')}</div>` : '';
}
async function loadIncidents(){
  const zone = document.getElementById('tab-incidents');
  zone.innerHTML = loading();
  try{
    const r = await fetch(API('admin-incidents'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'list'})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    const pt = d.par_type_30j || {};
    const total30j = Object.values(pt).reduce((s,v)=>s+(v||0),0);
    const statHtml = `
      <div class="stat-grid" style="margin-bottom:16px">
        <div class="stat-tile"><div class="n" style="${total30j?'color:var(--amber)':''}">${total30j}</div><div class="l">Incidents (30j)</div></div>
        <div class="stat-tile"><div class="n" style="${pt.materiel_endommage?'color:var(--red)':''}">${pt.materiel_endommage||0}</div><div class="l">Matériel endommagé (30j)</div></div>
        <div class="stat-tile" style="grid-column:1/-1"><div class="n" style="${pt.retard?'color:var(--amber)':''}">${pt.retard||0}</div><div class="l">Retards (30j)</div></div>
      </div>`;
    if(!d.incidents || !d.incidents.length){ zone.innerHTML = statHtml + '<p class="empty">🧯 Aucun incident enregistré.</p>'; return; }
    const list = d.incidents.map(i => {
      const res = i.reservation || {};
      return `
        <div class="row-item">
          <div class="row-top">
            <span class="row-title">${INCIDENT_TYPE_LABEL[i.type]||i.type}${res.ref?' · '+escHtml(res.ref):''}</span>
            <span class="chip ${INCIDENT_CHIP[i.statut]||''}">${INCIDENT_STATUT_LABEL[i.statut]||i.statut}</span>
          </div>
          <div class="row-meta">${escHtml((res.prenom||'')+' '+(res.nom||''))}${res.adresse?' · '+escHtml(res.adresse):''}${i.transporteur?.nom?' · 🚚 '+escHtml(i.transporteur.nom):''}<br/>${new Date(i.created_at).toLocaleString('fr-FR',{dateStyle:'medium',timeStyle:'short'})}${i.description?' · '+escHtml(i.description):''}${i.montant_facture_cents?' · '+euros(i.montant_facture_cents):''}</div>
          ${incidentActionsHtml(i)}
        </div>`;
    }).join('');
    zone.innerHTML = statHtml + list;
  }catch(e){
    zone.innerHTML = '<p class="empty">Erreur de chargement. Réessaie.</p>';
  }
}
async function updateIncidentStatut(id, statut, btnEl){
  if(btnEl) btnEl.disabled = true;

        </div>
      </div>`;
  }).join('') : '<p class="empty">Aucun email envoyé pour l\'instant.</p>';

  zone.innerHTML = `

      <div class="stat-tile"><div class="n" style="${nbErreurs?'color:var(--red)':''}">${nbErreurs}</div><div class="l">Erreurs</div></div>
    </div>

    <div style="display:flex;gap:8px;max-width:420px">
      <input type="text" id="test-email-addr" placeholder="ton@email.fr" style="flex:1"/>

    </div>
    <div class="err" id="test-email-err"></div>
    <p id="test-email-ok" style="display:none;color:var(--green);font-size:13px;margin-top:10px;line-height:1.5"></p>`;

async function sendTestEmails(){
  const email = document.getElementById('test-email-addr').value.trim();
  const errEl = document.getElementById('test-email-err');
  const okEl  = document.getElementById('test-email-ok');
  const btn   = document.getElementById('test-email-btn');
  errEl.style.display = 'none'; okEl.style.display = 'none';
  if(!email){ errEl.textContent = 'Adresse email requise'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Envoi…';
  try{
    const r = await fetch(API('admin-test-emails'), {method:'POST', headers:authHeaders(), body:JSON.stringify({action:'send_all', email})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Erreur');
    okEl.textContent = `${d.envoyes} email${d.envoyes>1?'s':''} envoyé${d.envoyes>1?'s':''} à ${email}${d.errors&&d.errors.length?` (${d.errors.length} en erreur — voir la console)`:''}`;
    okEl.style.display = 'block';
    if(d.errors && d.errors.length) console.error('[Test emails] erreurs', d.errors);
  }catch(e){
    errEl.textContent = e.message; errEl.style.display = 'block';
  }finally{
    btn.disabled = false; btn.textContent = 'Envoyer';
  }
}
