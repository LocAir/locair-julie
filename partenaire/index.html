<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Espace ambassadeur — Loc'Air</title>
<meta name="robots" content="noindex,nofollow"/>
<meta name="theme-color" content="#1b3a5f"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Palette identique à index.html (site vitrine), admin/index.html et transporteur/index.html */
  --blue:#1b3a5f; --blue-d:#142d4a; --blue-lt:#dce8f5;
  --black:#141e30; --black2:#1e2d45; --bg:#eef1f5; --white:#ffffff;
  --grey:#5a6577; --grey2:#6b7785; --grey-soft:#707a8a; --rule:#dde3ea; --gold:#c5a96c; --gold-lt:#f3ead9;
  --green:#2d6a4f; --green-bg:#e6f0ea; --red:#9b2c1a; --red-bg:#f8e9e6; --amber:#9c6a17; --amber-bg:#f6eed9;
  --disp:'Cormorant Garamond',Georgia,serif;
  --body:'Inter',system-ui,sans-serif;
  --r-sm:8px; --r:12px; --r-lg:20px;
  --sh-xs:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
  --sh-sm:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --sh-md:0 8px 40px rgba(0,0,0,.09),0 2px 10px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--black);font-family:var(--body);font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh}
.hidden{display:none!important}
.wrap{max-width:520px;margin:0 auto;padding:20px 16px 60px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 20px}
.logo{font-family:var(--disp);font-size:21px;font-weight:600;color:var(--blue)}
.logo em{font-style:normal;color:var(--gold)}
.who{font-size:12px;color:var(--grey);font-weight:600}
.who button{background:none;border:none;color:var(--grey);text-decoration:underline;font-size:12px;font-family:var(--body);cursor:pointer;padding:0;margin-left:8px}
.eyebrow{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--grey);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--blue);flex-shrink:0}
.card{background:var(--white);border:1px solid var(--rule);border-radius:var(--r-lg);padding:26px 22px;box-shadow:var(--sh-sm);margin-bottom:14px}
h1{font-family:var(--disp);font-size:25px;font-weight:600;margin-bottom:6px}
h2{font-family:var(--disp);font-size:19px;font-weight:600;margin-bottom:6px}
.sub{font-size:14px;color:var(--grey);margin-bottom:20px;line-height:1.55}
label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);margin-bottom:7px}
input[type=text],input[type=password]{
  width:100%;padding:16px;border:1.5px solid var(--rule);border-radius:var(--r-sm);font-size:17px;
  font-family:var(--body);background:var(--white);color:var(--black);outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
input:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-lt)}
input[readonly]{background:var(--bg);color:var(--black2);font-size:14px}
.btn{
  width:100%;padding:18px;border:none;border-radius:100px;font-family:var(--body);
  font-size:16.5px;font-weight:700;letter-spacing:-.005em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  min-height:58px;text-align:center;transition:transform .1s ease, opacity .15s ease;
}
.btn-blue{background:var(--blue);color:#fff;box-shadow:var(--sh-xs)}
.btn-green{background:var(--green);color:#fff;box-shadow:var(--sh-xs)}
.btn-grey{background:var(--white);color:var(--grey);border:1.5px solid var(--rule)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.98)}
.btn+.btn{margin-top:12px}
.err{background:var(--red-bg);color:var(--red);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;margin-top:14px;display:none;line-height:1.5}
.ok-msg{background:var(--green-bg);color:var(--green);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;margin-top:14px;display:none;line-height:1.5}
.forgot-link{display:block;width:100%;background:none;border:none;color:var(--grey);text-decoration:underline;font-size:13px;font-family:var(--body);cursor:pointer;text-align:center;margin-top:16px;padding:4px}
.overlay{position:fixed;inset:0;background:rgba(13,24,41,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.link-row{display:flex;gap:8px}
.link-row input{flex:1}
.link-row button{flex-shrink:0;width:auto;padding:0 18px;min-height:auto;border-radius:var(--r-sm)}
.stat-big{background:linear-gradient(150deg,var(--blue) 0%,var(--blue-d) 60%,#0a1424 100%);color:#fff;border-radius:var(--r-lg);padding:26px 22px;margin-bottom:14px;box-shadow:var(--sh-md)}
.stat-big .amount{font-family:var(--disp);font-size:42px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.stat-big .caption{font-size:13px;opacity:.8;margin-top:8px;font-weight:500;line-height:1.5}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat-tile{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh-xs)}
.stat-tile .n{font-family:var(--disp);font-size:26px;font-weight:400;color:var(--black);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.stat-tile .l{font-size:11px;color:var(--grey);font-weight:600;margin-top:5px;text-transform:uppercase;letter-spacing:.03em}
.section-title{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grey-soft);margin:24px 2px 10px}
.vlist{margin-top:6px}
.vrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--rule);font-size:14px}
.vrow:last-child{border-bottom:none}
.vchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:4px 10px 4px 8px;border-radius:100px}
.vchip::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.vchip.demande{background:var(--amber-bg);color:var(--amber)}
.vchip.verse{background:var(--green-bg);color:var(--green)}
.empty{text-align:center;color:var(--grey);font-size:14px;padding:44px 10px}
.month-details summary::-webkit-details-marker{display:none}
.month-details summary{list-style:none}
.spinner-wrap{display:flex;justify-content:center;padding:60px 0}
.spinner{width:28px;height:28px;border:3px solid var(--rule);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="logo">Loc<em>'Air</em> · Ambassadeur</div>
    <div class="who hidden" id="who-badge"></div>
  </div>

  <!-- Écran 1 : code personnel -->
  <div id="login-screen">
    <div class="card">
      <div class="eyebrow">Espace ambassadeur</div>
      <h1>Bonjour 👋</h1>
      <p class="sub">Entre ton code personnel pour voir ton lien d'affiliation et tes gains.</p>
      <label for="lg-code">Ton code (6 chiffres)</label>
      <input type="password" id="lg-code" inputmode="numeric" autocomplete="off" placeholder="••••••" maxlength="6"/>
      <div style="height:16px"></div>
      <button class="btn btn-blue" id="lg-btn" onclick="doLogin()">Entrer →</button>
      <div class="err" id="lg-err"></div>
      <button class="forgot-link" onclick="openForgotPin()">Code oublié ?</button>
    </div>
  </div>

  <!-- Écran 2 : tableau de bord -->
  <div id="dashboard-screen" class="hidden">
    <div id="dashboard-content"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>

</div>
<script>
const API = (path) => '/api/' + path;
// localStorage plutôt que sessionStorage : le jeton ne périme jamais côté
// serveur tant que le code ne change pas, donc pas de raison de le redemander
// à chaque fermeture de l'onglet.
let STATE = {
  token: localStorage.getItem('p_token') || '',
  partenaireId: localStorage.getItem('p_id') ? parseInt(localStorage.getItem('p_id')) : null,
  nom: localStorage.getItem('p_nom') || '',
  code: localStorage.getItem('p_code') || '',
  taux: localStorage.getItem('p_taux') ? parseInt(localStorage.getItem('p_taux')) : 10,
};
function escHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function show(id){
  ['login-screen','dashboard-screen'].forEach(s => document.getElementById(s).classList.toggle('hidden', s!==id));
}
function updateWhoBadge(){
  const el = document.getElementById('who-badge');
  if(STATE.token){ el.classList.remove('hidden'); el.innerHTML = `${escHtml(STATE.nom)}<button onclick="logout()">Changer</button>`; }
  else{ el.classList.add('hidden'); el.innerHTML=''; }
}
function logout(){
  STATE = { token:'', partenaireId:null, nom:'', code:'', taux:10 };
  localStorage.removeItem('p_token'); localStorage.removeItem('p_id'); localStorage.removeItem('p_nom'); localStorage.removeItem('p_code'); localStorage.removeItem('p_taux');
  document.getElementById('lg-code').value = '';
  updateWhoBadge();
  show('login-screen');
}
async function doLogin(){
  const pin = document.getElementById('lg-code').value.trim();
  const errEl = document.getElementById('lg-err');
  const btn = document.getElementById('lg-btn');
  errEl.style.display = 'none';
  if(!pin){ errEl.textContent = 'Entre ton code.'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try{
    const r = await fetch(API('partenaire-login'), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pin})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Erreur');
    STATE = { token: d.token, partenaireId: d.partenaire_id, nom: d.nom, code: d.code, taux: d.taux_commission_pct };
    localStorage.setItem('p_token', d.token);
    localStorage.setItem('p_id', d.partenaire_id);
    localStorage.setItem('p_nom', d.nom);
    localStorage.setItem('p_code', d.code);
    localStorage.setItem('p_taux', d.taux_commission_pct);
    updateWhoBadge();
    loadDashboard();
  }catch(e){
    errEl.textContent = e.message; errEl.style.display = 'block';
  }finally{
    btn.disabled = false; btn.textContent = 'Entrer →';
  }
}
function authHeaders(){ return {'Content-Type':'application/json','x-partenaire-token':STATE.token}; }
function openForgotPin(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'forgot-overlay';
  overlay.innerHTML = `
    <div class="card" style="max-width:380px;width:100%">
      <h2 style="margin-bottom:6px">Code oublié ?</h2>
      <p class="sub">Entre l'email connu par Loc'Air, on t'envoie ton code.</p>
      <label for="forgot-email">Email</label>
      <input type="text" id="forgot-email" placeholder="ton@email.fr" autocomplete="email"/>
      <div style="height:14px"></div>
      <button class="btn btn-blue" id="forgot-send-btn" onclick="sendForgotPin()">Envoyer</button>
      <button class="forgot-link" onclick="closeForgotPin()">Annuler</button>
      <p class="ok-msg" id="forgot-ok"></p>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeForgotPin(); });
}
function closeForgotPin(){
  document.getElementById('forgot-overlay')?.remove();
}
async function sendForgotPin(){
  const email = document.getElementById('forgot-email').value.trim();
  if(!email) return;
  const okEl = document.getElementById('forgot-ok');
  const btn = document.getElementById('forgot-send-btn');
  if(btn.disabled) return;
  btn.disabled = true; btn.textContent = 'Envoi…';
  try{
    await fetch(API('partenaire-forgot-pin'), {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email})});
  }catch(e){}
  document.getElementById('forgot-email').style.display = 'none';
  document.querySelectorAll('#forgot-overlay .btn, #forgot-overlay .forgot-link').forEach(b=>b.style.display='none');
  okEl.textContent = "Si cet email est connu, ton code vient d'être envoyé. Vérifie ta boîte mail.";
  okEl.style.display = 'block';
}
async function loadDashboard(){
  show('dashboard-screen');
  const zone = document.getElementById('dashboard-content');
  zone.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  try{
    const r = await fetch(API('partenaire-earnings'), {method:'POST', headers: authHeaders(), body: JSON.stringify({action:'resume'})});
    const d = await r.json();
    if(!r.ok){
      if(r.status === 401){ logout(); return; }
      throw new Error(d.error || 'Erreur');
    }
    renderDashboard(d);
  }catch(e){
    zone.innerHTML = '<p class="empty">Impossible de charger ton activité. Réessaie.</p>';
  }
}
function euros(v){ return (v||0).toFixed(2).replace('.',',') + ' €'; }
const VIREMENT_LABEL = {demande:'Demandé', verse:'Versé'};
function renderDashboard(d){
  const zone = document.getElementById('dashboard-content');
  const link = location.origin + '/?p=' + encodeURIComponent(STATE.code);
  const enCours = (d.virements||[]).some(v => v.statut==='demande');
  zone.innerHTML = `
    <div class="card">
      <h2>🔗 Ton lien d'affiliation</h2>
      <p class="sub" style="margin-bottom:14px">Mets ce lien sur ton site pour que tes clients réservent directement chez Loc'Air — chaque réservation faite depuis ce lien t'est automatiquement rattachée.</p>
      <div class="link-row">
        <input type="text" id="aff-link" value="${escHtml(link)}" readonly onclick="this.select()"/>
        <button class="btn btn-blue" onclick="copyLink()">Copier</button>
      </div>
      <p class="ok-msg" id="copy-ok">Lien copié !</p>
    </div>
    <div class="stat-big">
      <div class="amount">${euros(d.non_verse_euros)}</div>
      <div class="caption">Commission à verser (${STATE.taux}% de chaque réservation confirmée)</div>
    </div>
    <div class="stat-row">
      <div class="stat-tile"><div class="n">${d.reservations_aujourdhui||0}</div><div class="l">Réservation${(d.reservations_aujourdhui||0)>1?'s':''} aujourd'hui</div></div>
      <div class="stat-tile"><div class="n" style="color:var(--green);font-weight:700">${euros(d.gain_aujourdhui_euros)}</div><div class="l">Gagné aujourd'hui</div></div>
      <div class="stat-tile"><div class="n">${d.reservations_mois||0}</div><div class="l">Réservation${(d.reservations_mois||0)>1?'s':''} ce mois</div></div>
      <div class="stat-tile"><div class="n" style="color:var(--green);font-weight:700">${euros(d.gain_mois_euros)}</div><div class="l">Gagné ce mois</div></div>
    </div>
    <button class="btn btn-green" id="demander-virement-btn" ${(d.non_verse_euros>0 && !enCours)?'':'disabled'} onclick="demanderVirement()">💰 ${enCours?'Demande en cours…':'Demander mon virement'}</button>
    ${(!d.non_verse_euros && !enCours)?`<p style="text-align:center;font-size:12.5px;color:var(--grey);margin-top:-6px">Pas de commission à verser pour l'instant</p>`:''}
    <div class="err" id="dash-err"></div>
    ${reservationsHistoryHtml(d.reservations)}
    ${(d.virements&&d.virements.length)?`
      <div class="section-title">Historique des virements</div>
      <div class="card vlist">${d.virements.map(v => `
        <div class="vrow"><span>${new Date(v.created_at).toLocaleDateString('fr-FR')}</span><span>${euros(v.montant_cents/100)}</span><span class="vchip ${v.statut}">${VIREMENT_LABEL[v.statut]||v.statut}</span></div>
      `).join('')}</div>` : ''}
  `;
}
// Historique réservation par réservation, groupé par mois (comme l'espace
// transporteur) — seul le mois en cours est ouvert par défaut.
function reservationsHistoryHtml(reservations){
  if(!reservations || !reservations.length) return '<p class="empty">Aucune réservation apportée pour l\'instant.</p>';
  const groups = {};
  reservations.forEach(r => {
    const key = (r.created_at||'').slice(0,7); // YYYY-MM
    (groups[key] = groups[key] || []).push(r);
  });
  const keys = Object.keys(groups).sort().reverse();
  const monthLabel = key => {
    const [y,mo] = key.split('-').map(Number);
    return new Date(y, mo-1, 1).toLocaleDateString('fr-FR', {month:'long', year:'numeric'});
  };
  return `
    <div class="section-title">Réservations apportées</div>
    ${keys.map((key,i) => {
      const items = groups[key];
      const total = items.reduce((s,r)=>s+(r.commission_cents||0),0);
      return `
      <details class="card month-details" ${i===0?'open':''} style="margin-bottom:10px;padding:16px 18px">
        <summary style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:700">
          <span style="text-transform:capitalize">${monthLabel(key)}</span>
          <span style="font-weight:600;color:var(--grey)">${items.length} réservation${items.length>1?'s':''} · ${euros(total/100)}</span>
        </summary>
        <div class="vlist">
          ${items.map(r => `
            <div class="vrow" style="align-items:flex-start">
              <span>
                ${escHtml(r.client||'Client')}
                <div style="font-size:12px;color:var(--grey-soft);margin-top:2px">${r.date_debut?new Date(r.date_debut).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):''}${r.ref?' · '+escHtml(r.ref):''}</div>
              </span>
              <span style="text-align:right;flex-shrink:0">
                <div style="font-weight:700">${euros(r.commission_cents/100)}</div>
                <span class="vchip ${r.payee?'verse':'demande'}" style="margin-top:4px">${r.payee?'Versé':'À verser'}</span>
              </span>
            </div>`).join('')}
        </div>
      </details>`;
    }).join('')}
  `;
}
async function copyLink(){
  const input = document.getElementById('aff-link');
  try{
    await navigator.clipboard.writeText(input.value);
  }catch(e){
    input.select();
    document.execCommand('copy');
  }
  const ok = document.getElementById('copy-ok');
  ok.style.display = 'block';
  setTimeout(() => { ok.style.display = 'none'; }, 2000);
}
async function demanderVirement(){
  const errEl = document.getElementById('dash-err');
  const btn = document.getElementById('demander-virement-btn');
  if(errEl) errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = '💰 Envoi…'; }
  try{
    const r = await fetch(API('partenaire-earnings'), {method:'POST', headers: authHeaders(), body: JSON.stringify({action:'demander_virement'})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Erreur');
    await loadDashboard(); // reconstruit le bouton avec le bon état ("Demande en cours…")
  }catch(e){
    if(errEl){ errEl.textContent = e.message; errEl.style.display = 'block'; }
    if(btn){ btn.disabled = false; btn.textContent = '💰 Demander mon virement'; }
  }
}
document.getElementById('lg-code').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
updateWhoBadge();
if(STATE.token) loadDashboard(); else show('login-screen');
</script>
</body>
</html>
