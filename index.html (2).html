<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loc'Air — Julie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0D1B2A;
    --orange: #E8811A;
    --orange-light: #FFF0E0;
    --gray: #F7F7F7;
    --gray2: #E8E8E8;
    --text: #1a1a2e;
    --muted: #888;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F2F2F2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--navy);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), #ff6b35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: white;
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    position: absolute;
    bottom: 1px;
    right: 1px;
    border: 2px solid var(--navy);
  }

  .header-info h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: white;
    line-height: 1.2;
  }

  .header-info p {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .header-badge {
    margin-left: auto;
    background: rgba(232, 129, 26, 0.15);
    border: 1px solid rgba(232, 129, 26, 0.3);
    color: var(--orange);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  .msg.julie .msg-avatar {
    background: linear-gradient(135deg, var(--orange), #ff6b35);
    color: white;
    font-family: 'DM Serif Display', serif;
  }

  .msg.user .msg-avatar {
    background: var(--navy);
    color: white;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.julie .bubble {
    background: white;
    color: #1a1a2e;
    border-bottom-left-radius: 4px;
    border: 1px solid #e0e0e0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .msg.user .bubble {
    background: var(--orange);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble strong {
    color: var(--orange);
    font-weight: 600;
  }

  .msg.user .bubble strong {
    color: white;
  }

  /* TYPING */
  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--orange);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.7;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* SUGGESTIONS */
  #suggestions {
    padding: 0 20px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .suggestion {
    background: white;
    border: 1px solid #ddd;
    color: #444;
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .suggestion:hover {
    background: var(--orange-light);
    border-color: var(--orange);
    color: var(--orange);
  }

  /* INPUT */
  #input-area {
    padding: 12px 20px 20px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 24px;
    padding: 8px 8px 8px 18px;
    transition: border-color 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .input-row:focus-within {
    border-color: var(--orange);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #1a1a2e;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: #aaa; }

  #send-btn {
    width: 38px;
    height: 38px;
    background: var(--orange);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.2s;
  }

  #send-btn:hover { transform: scale(1.08); background: #d4741a; }
  #send-btn:active { transform: scale(0.95); }

  #send-btn svg { width: 16px; height: 16px; fill: white; }
</style>
</head>
<body>

<header>
  <div class="avatar">J</div>
  <div class="header-info">
    <h1>Julie</h1>
    <p>Directrice Générale — Loc'Air</p>
  </div>
  <div class="header-badge">🟢 En ligne</div>
</header>

<div id="messages"></div>

<div id="suggestions">
  <button class="suggestion" onclick="sendSuggestion(this)">📊 Où en est la boîte ?</button>
  <button class="suggestion" onclick="sendSuggestion(this)">🎯 Quoi faire cette semaine ?</button>
  <button class="suggestion" onclick="sendSuggestion(this)">💰 Comment gagner plus ?</button>
  <button class="suggestion" onclick="sendSuggestion(this)">⚠️ Quels sont nos risques ?</button>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Parle à Julie..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Tu es Julie, la Directrice Générale et N°2 de Loc'Air, une startup de location de climatiseurs mobiles basée à Nice.

Ton patron s'appelle Aly. Il a environ 15-16 ans, aucune connaissance en finance, marketing ou gestion d'entreprise. Il donne la direction, toi tu gères et tu structures.

TU CONNAIS LOC'AIR PAR COEUR :
- Service : location de climatiseurs mobiles (modèle Rowenta AU6020), 19€/jour, minimum 3 jours, installation incluse
- Zone : Nice (French Riviera), expansion nationale prévue
- Clients : particuliers ET professionnels (conciergeries, agences immobilières)
- SIRET : 853 730 562 00024 | Site : locair.fr
- Pas de TVA (article 293B) | Pas de dépôt de garantie
- Paiement AVANT livraison — règle absolue
- Outils : Netlify (formulaire), Make (automatisation), SumUp (paiements), Brevo (emails), Google Sheets (stock)

OBJECTIF 2026 : Phase test — organiser, prouver que ça marche, avoir des vrais chiffres propres pour aller lever des fonds en 2027 et recruter une vraie équipe.

TON RÔLE :
- Tu parles à Aly comme une vraie DG parle à son fondateur : directe, bienveillante, claire
- Tu expliques TOUT simplement, comme à un ado de 15 ans — zéro jargon
- Quand tu utilises un terme technique, tu l'expliques en une phrase simple
- Tu ne dis jamais "optimise ta stratégie" — tu dis "appelle 3 conciergeries demain matin"
- Tu anticipes, tu alertes, tu proposes — pas juste répondre
- Tu rappelles toujours les priorités concrètes
- Tu es honnête même si c'est pas ce qu'Aly veut entendre
- Tes réponses sont courtes et percutantes — maximum 150 mots sauf si Aly demande plus de détails
- Tu utilises des emojis avec parcimonie pour rendre ça vivant
- Tu tutoies Aly

CHIFFRES CLÉS À AVOIR EN TÊTE :
- Revenus min par unité louée : 57€ (3 jours) → max théorique : 190€/semaine par unité
- 2 unités actuellement = 380€/semaine max si tout est loué
- Canal prouvé : conciergeries (1ère livraison faite via ce canal)
- Priorité immédiate : appeler 10+ conciergeries pour remplir le calendrier

Réponds toujours en français.`;

const messages = [];

async function addMessage(role, content, isHTML = false) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'julie'}`;

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = role === 'user' ? 'A' : 'J';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHTML) bubble.innerHTML = content;
  else bubble.textContent = content;

  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg julie typing';
  div.id = 'typing-indicator';

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = 'J';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

async function callClaude(userMessage) {
  messages.push({ role: 'user', content: userMessage });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');

    messages.push({ role: 'assistant', content: reply });

    removeTyping();
    await addMessage('julie', formatResponse(reply), true);
  } catch (err) {
    removeTyping();
    await addMessage('julie', "Désolée, j'ai eu un problème de connexion. Réessaie dans quelques secondes.", false);
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  await addMessage('user', text);
  await callClaude(text);
}

function sendSuggestion(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/, '');
  document.getElementById('user-input').value = text;
  sendMessage();
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Message de bienvenue
window.onload = () => {
  setTimeout(() => {
    addMessage('julie', formatResponse("Salut Aly 👋\n\nJe suis Julie, ta DG. Je connais Loc'Air par coeur — les clims, les clients, les chiffres, tout.\n\nDis-moi où t'en es ou ce que tu veux attaquer. Je suis là pour qu'on structure cette phase test ensemble et qu'on ait de beaux chiffres à montrer à des investisseurs d'ici la fin de l'année. 🎯"), true);
  }, 500);
};
</script>
</body>
</html>
