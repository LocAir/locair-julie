<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Contact — Stère & Feu</title>
<meta name="robots" content="index,follow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1a1a1a;--muted:#6b6b6b;--rule:#e9e7e2;--wash:#f6f3ee;--font:'Manrope',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:#fff;line-height:1.65}
a{color:var(--ink)}
.nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 24px}
.nav-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px}
.nav-logo .mark{width:28px;height:28px;border-radius:7px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.nav-back{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none}
.nav-back:hover{color:var(--ink)}
.page-wrap{max-width:560px;margin:0 auto;padding:48px 24px 90px}
.page-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#a8863f;margin-bottom:10px}
h1{font-size:clamp(26px,4vw,38px);font-weight:800;letter-spacing:-.01em;margin-bottom:10px}
.sub{font-size:14.5px;color:var(--muted);margin-bottom:32px}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;margin-top:16px}
input,textarea{width:100%;padding:12px 14px;border:1px solid var(--rule);border-radius:10px;font-family:inherit;font-size:14.5px;background:var(--wash)}
textarea{resize:vertical;min-height:120px}
button{margin-top:24px;background:var(--ink);color:#fff;border:none;padding:14px 26px;border-radius:100px;font-weight:700;font-size:15px;width:100%}
.direct{margin-top:36px;padding-top:24px;border-top:1px solid var(--rule);font-size:14px;color:#3a3a3a}
footer{background:var(--ink);color:#a8a5a0;padding:28px 24px;text-align:center;font-size:12.5px}
footer a{color:#a8a5a0}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><span class="mark">S&amp;F</span> STÈRE &amp; FEU</a>
  <a href="index.html" class="nav-back">← Retour à l'accueil</a>
</nav>
<div class="page-wrap">
  <div class="page-label">Nous écrire</div>
  <h1>Contact</h1>
  <p class="sub">Une question sur une commande, un produit ou une livraison ? Écrivez-nous, on répond du lundi au vendredi, 9h–18h.</p>
  <form onsubmit="alert('Formulaire de démonstration — à connecter à votre messagerie ou CRM.');return false;">
    <label for="name">Nom</label>
    <input id="name" type="text" required/>
    <label for="email">E-mail</label>
    <input id="email" type="email" required/>
    <label for="message">Message</label>
    <textarea id="message" required></textarea>
    <button type="submit">Envoyer le message</button>
  </form>
  <div class="direct">Vous pouvez aussi nous écrire directement à <strong>contact@stere-et-feu.fr</strong></div>
</div>
<footer>© 2026 Stère &amp; Feu — <a href="index.html">stere-et-feu.fr</a></footer>
</body>
</html>
