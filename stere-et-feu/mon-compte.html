<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mon compte — Stère & Feu</title>
<meta name="robots" content="noindex,follow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1a1a1a;--muted:#6b6b6b;--rule:#e9e7e2;--wash:#f6f3ee;--font:'Manrope',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:#fff;line-height:1.65}
a{color:var(--ink)}
.nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 24px}
.nav-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px}
.nav-logo .mark{width:28px;height:28px;border-radius:7px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.nav-back{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none}
.nav-back:hover{color:var(--ink)}
.page-wrap{max-width:480px;margin:0 auto;padding:80px 24px;text-align:center}
h1{font-size:clamp(24px,4vw,32px);font-weight:800;margin-bottom:12px}
p{font-size:14.5px;color:var(--muted);margin-bottom:24px}
.btn{display:inline-block;background:var(--ink);color:#fff;padding:13px 24px;border-radius:100px;font-weight:700;font-size:14.5px}
footer{background:var(--ink);color:#a8a5a0;padding:28px 24px;text-align:center;font-size:12.5px}
footer a{color:#a8a5a0}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><span class="mark">S&amp;F</span> STÈRE &amp; FEU</a>
  <a href="index.html" class="nav-back">← Retour à l'accueil</a>
</nav>
<div class="page-wrap">
  <h1>Espace client bientôt disponible</h1>
  <p>La création de compte et le suivi de vos commandes en ligne arrivent prochainement. En attendant, contactez-nous directement pour toute question.</p>
  <a href="contact.html" class="btn">Nous contacter</a>
</div>
<footer>© 2026 Stère &amp; Feu — <a href="index.html">stere-et-feu.fr</a></footer>
</body>
</html>
